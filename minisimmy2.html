                  const prefixes = ['Kael','Vex','Thorne','Zyl','Ryn','Syl','Drak','Nyx','Korr','Vael','Sylas','Myr','Zor'];
                  const suffixes = ['-9','-12','ara','ith','on','yx','ar','en','os','ix','ael','or'];

              function getAudioContext() {
                  if (!audioCtx) {
                      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                      masterGain = audioCtx.createGain();
                      compressor = audioCtx.createDynamicsCompressor();

                      compressor.threshold.value = -18;
                      compressor.knee.value = 8;
                      compressor.ratio.value = 12;
                      compressor.attack.value = 0.003;
                      compressor.release.value = 0.25;

                      masterGain.gain.value = masterVolume;
                      masterGain.connect(compressor);
                      compressor.connect(audioCtx.destination);
                  }

                  if (audioCtx.state === 'suspended') {
                      audioCtx.resume();
                  }
                  return audioCtx;
              }

              function startCursorHum() {
                  const ctx = getAudioContext();
                  if (cursorHumOsc) return;

                  cursorHumOsc = ctx.createOscillator();
                  cursorHumGain = ctx.createGain();
                  cursorHumFilter = ctx.createBiquadFilter();

                  cursorHumOsc.type = 'sine';
                  cursorHumOsc.frequency.value = 48;
                  cursorHumFilter.type = 'lowpass';
                  cursorHumFilter.frequency.value = 180;
                  cursorHumGain.gain.value = 0;

                  cursorHumOsc.connect(cursorHumFilter);
                  cursorHumFilter.connect(cursorHumGain);
                  cursorHumGain.connect(masterGain);
                  cursorHumOsc.start();

                  const targetVol = 0.015 * effectsVolume;
                  cursorHumGain.gain.linearRampToValueAtTime(targetVol, ctx.currentTime + 0.8);
              }

              function stopCursorHum() {
                  if (!cursorHumOsc || !cursorHumGain) return;

              class FloatingText {
                  constructor(x, y, text, color = '#34d399') {
                      this.x = x;
                      this.y = y;
                      this.text = text;
                      this.color = color;
                      this.life = 52;
                      this.vy = -1.35;
                      this.alpha = 255;
                  }
                  update() {
                      this.y += this.vy;
                      this.life--;
                      this.alpha = map(this.life, 0, 52, 0, 255);
                  }
                  show() {
                      if (this.life <= 0) return;
                      push();
                      translate(this.x, this.y);
                      fill(red(this.color), green(this.color), blue(this.color), this.alpha);
                      textAlign(CENTER);
                      textSize(12);
                      textFont('Inter, system-ui');
                      text(this.text, 0, 0);
                      pop();
                  }
              }

          listContainer.innerHTML = '';

          // Live balance header

          `;
          listContainer.appendChild(balanceDiv);

          // Get current top 10
          let sorted = [...creatures].sort((a, b) => {
              let scoreA = (a.modules?.length || 0) * 3 + (a.killCount || 0) * 2 + (a.childrenCount || 0);
              let scoreB = (b.modules?.length || 0) * 3 + (b.killCount || 0) * 2 + (b.childrenCount || 0);
              return scoreB - scoreA;
          }).slice(0, 10);

          if (sorted.length === 0) {
              listContainer.innerHTML += `<div class="text-center text-white/60 py-8">No creatures available yet.</div>`;
          } else {
              sorted.forEach(creature => {
                  const div = document.createElement('div');
                  div.className = 'flex items-center justify-between bg-white/5 hover:bg-white/10 rounded-2xl px-4 py-3 cursor-pointer transition-colors mb-1';

                  listContainer.appendChild(div);
              });

          modal.classList.add('flex');

    function drawCreaturePreview(creature, canvas) {
        if (!creature || !canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const scale = 2.8;

        ctx.fillStyle = 'rgba(255,255,255,0.03)';
        ctx.beginPath();
        ctx.arc(cx, cy, 38, 0, Math.PI * 2);
        ctx.fill();

        let coreColor = creature.isPredator ? '#f87171' : '#facc15';
        if (creature.specialization === 'harvester') coreColor = '#34d399';
        if (creature.specialization === 'sensor') coreColor = '#38bdf8';
        if (creature.specialization === 'mover') coreColor = '#a78bfa';
        if (creature.specialization === 'resistant') coreColor = '#f472b6';
        if (creature.specialization === 'explorer') coreColor = '#fbbf24';
        if (creature.specialization === 'communicator') coreColor = '#c084fc';

        ctx.fillStyle = coreColor;
        ctx.strokeStyle = creature.isPredator ? '#fecaca' : '#fef08c';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(cx, cy, 11, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        for (let m of creature.modules) {
            const x = cx + (m.offsetX || 0) * scale;
            const y = cy + (m.offsetY || 0) * scale;
            const tier = m.tier || 1;
            const size = 5.5 + (tier - 1) * 1.1;

            ctx.fillStyle = m.color;
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            if (tier > 1) {
                ctx.strokeStyle = tier === 5 ? '#fde047' : '#fbbf24';
                ctx.lineWidth = tier === 2 ? 1.2 : tier === 3 ? 1.6 : 2.0;
                ctx.beginPath();
                ctx.arc(x, y, size + 2.2, 0, Math.PI * 2);
                ctx.stroke();
            }
        }
    }

   // ==================== Alpha Tracking ====================
function getCurrentAlpha() {
    if (creatures.length === 0) return null;

    let best = null;
    let bestScore = -Infinity;

    for (let c of creatures) {
        let score = (c.modules.length * 2.5) +
                    (c.killCount * 4) +
                    (c.childrenCount * 3) +
                    (c.energy * 0.6);

        let tierBonus = 0;
        for (let m of c.modules) {
            tierBonus += (m.tier || 1) * 1.2;
        }
        score += tierBonus;

        if (score > bestScore) {
            bestScore = score;
            best = c;
        }
    }
    return best;
}

function selectCurrentAlpha() {
    const alpha = getCurrentAlpha();
    if (alpha) {
        selectCreature(alpha);
    }
}

function updateInspectorAlphaBadge(c) {
    const nameEl = document.getElementById('inspect-name');
    if (!nameEl) return;

    const currentAlpha = getCurrentAlpha();
    const isAlpha = currentAlpha && currentAlpha === c;

    if (isAlpha) {
        nameEl.style.color = '#facc15';
        nameEl.innerHTML = `${c.name} <span class="text-yellow-400 text-xs font-bold ml-1">★ CURRENT ALPHA</span>`;
    } else {
        nameEl.style.color = '#34d399';
        nameEl.innerHTML = c.name;
    }
}

// Distance from point to line segment (for Energy Wall collision)
function distToLineSegment(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const lenSq = dx*dx + dy*dy;
    if (lenSq === 0) return dist(px, py, x1, y1);
    let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
    t = constrain(t, 0, 1);
    const projX = x1 + t * dx;
    const projY = y1 + t * dy;
    return dist(px, py, projX, projY);
}

function recordEvolutionStats() {
    if (!graphData || creatures.length === 0) return;
    if (creatures.length === 0) return;
    let totalModules = 0, totalEnergy = 0, explorerCount = 0;
    for (let c of creatures) {
        totalModules += c.modules.length;
        totalEnergy += c.energy;
        if (c.getModuleCount('explorer') > 0) explorerCount++;
    }
    evolutionHistory.push({
        frame: frameCount,
        avgModules: totalModules / creatures.length,
        avgEnergy: totalEnergy / creatures.length,
        explorerPercent: (explorerCount / creatures.length) * 100
    });
    if (evolutionHistory.length > 100) evolutionHistory.shift();
}

function handleMousePress() {
    for (let c of creatures) {
        if (dist(mouseX, mouseY, c.x, c.y) < 13) {
            selectCreature(c);
            return;
        }
    }
    if (selectedCreature) deselectCreature();

    // Click on Energy Wall to delete it (only on left click)
    if (mouseButton === LEFT && energyWalls.length > 0) {
        let closestDist = 18;
        let closestIndex = -1;

        for (let i = 0; i < energyWalls.length; i++) {
            let w = energyWalls[i];
            let d = distToLineSegment(mouseX, mouseY, w.x1, w.y1, w.x2, w.y2);
            if (d < closestDist) {
                closestDist = d;
                closestIndex = i;
            }
        }

        if (closestIndex !== -1) {
            energyWalls.splice(closestIndex, 1);
            return;
        }
    }

    // Click to place / move Hazard spots
    if (cursorHazardActive) {
        let nearCreature = false;
        for (let c of creatures) {
            if (dist(mouseX, mouseY, c.x, c.y) < 18) {
                nearCreature = true;
                break;
            }
        }
        if (!nearCreature) {
            if (placedHazards.length < maxPlacedHazards) {
                placedHazards.push({
                    x: mouseX,
                    y: mouseY,
                    timer: 99999,
                    shakeTimer: 0,
                    exploding: false
                });
                if (beamCharge > 0) beamCharge--;
            } else {
                if (placedHazards.length > 0) {
                    placedHazards.shift();
                    placedHazards.push({
                        x: mouseX,
                        y: mouseY,
                        timer: 99999,
                        shakeTimer: 0,
                        exploding: false
                    });
                    if (beamCharge > 0) beamCharge--;
                }
            }
        }
    }
}

function mousePressed() {

                w.filterMode = modes[(currentIndex + 1) % modes.length];
                addFloatingText(mouseX, mouseY - 20, w.filterMode.replace("_", " "), '#a5b4fc');

            }

    if (!energyWallMode || !isDrawingWall) return;

function mouseReleased() {
    if (!energyWallMode || !isDrawingWall) return;

    const dx = mouseX - wallStartX;
    const dy = mouseY - wallStartY;
    const length = sqrt(dx*dx + dy*dy);

    if (length > 18) {

            totalScore -= totalCost;

                vx: 0,
                vy: 0,
                originalLength: length,

class VortexParticle {
    constructor(fromEdge = false) {
        if (fromEdge) {
            let angle = random(TWO_PI);
            let d = random(450, 570);
            this.x = centerX + cos(angle) * d;
            this.y = centerY + sin(angle) * d;
        } else {
            this.x = random(width);
            this.y = random(height);
        }
        this.life = 9999;
        this.size = random(1.6, 2.8);
    }
    update(vortexDir, vortexStrength) {
        let dx = this.x - centerX;
        let dy = this.y - centerY;
        let distToCenter = sqrt(dx * dx + dy * dy) || 1;
        if (distToCenter < 3.5) { this.life = 0; return; }

        let tangentX = -dy, tangentY = dx;
        let len = sqrt(tangentX * tangentX + tangentY * tangentY) || 1;

        this.x += (tangentX / len) * 1.25 * vortexStrength * vortexDir;
        this.y += (tangentY / len) * 1.25 * vortexStrength * vortexDir;

        let pull = 0.82 * vortexStrength;
        this.x += (centerX - this.x) * pull / (distToCenter + 0.8);
        this.y += (centerY - this.y) * pull / (distToCenter + 0.8);

        if (musicEnabled && musicData.bass > 0.35) {
            let jerk = (musicData.bass - 0.35) * 2.8;
            this.x += random(-jerk, jerk);
            this.y += random(-jerk, jerk);
        }
    }
    show() {
        fill(255, 255, 255, 185);
        noStroke();
        circle(this.x, this.y, this.size);
    }
}

// === Wall Filter Helper ===
function creatureMatchesWallFilter(creature, wall) {
    const isFilterWall = wall.wallType === "filter" || wall.filterMode === "custom_filter";
    if (!isFilterWall || !wall.filterSettings) {
        return false;
    }

    const types = wall.filterSettings.types || [];
    if (types.length === 0) return false;

    if (types.includes('white') || types.includes('red')) {
        return false;
    }

    const moduleCount = creature.modules ? creature.modules.length : 0;
    const isActualPredator = creature.isPredator === true;
    const isHighModule = moduleCount >= 15;
    const isLowModule = moduleCount <= 2;

    if (types.includes('predator') && isActualPredator) return true;
    if (types.includes('high_module') && isHighModule) return true;
    if (types.includes('low_module') && isLowModule) return true;

    return false;
}

class Creature {
    constructor(x, y, parentModules = null, generation = 1, parentTraits = null) {
        this.x = x; this.y = y;
        this.vx = random(-0.4, 0.4); this.vy = random(-0.4, 0.4);
        this.energy = parentModules ? 39 : 50 + random(18);
        this.name = generateSciFiName();
        this.isPredator = false; this.honey = 0;
        this.generation = generation; this.children = []; this.childrenCount = 0;
        this.killCount = 0; this.reproCooldown = 0; this.currentThought = "Exploring...";
        this.damageFlash = 0;
        this.purpleFlash = 0;
        this.mustEatWhite = false;
        this.ateWhiteParticle = false;
        this.hazardsAvoided = 0;
        this.hazardDamageTaken = 0;
        this.adaptationLevel = 0;
        this.role = 'Balanced';

        if (parentTraits) {
            this.traits = {
                pheromoneSensitivity: constrain(parentTraits.pheromoneSensitivity + random(-0.07, 0.07), 0.62, 1.55),
                explorationBias: constrain(parentTraits.explorationBias + random(-0.07, 0.07), 0.62, 1.55),
                vortexResistance: constrain(parentTraits.vortexResistance + random(-0.07, 0.07), 0.62, 1.55),
                hazardAvoidance: constrain(parentTraits.hazardAvoidance + random(-0.07, 0.07), 0.62, 1.55)
            };
        } else {
            this.traits = {
                pheromoneSensitivity: 1.0 + random(-0.13, 0.13),
                explorationBias: 1.0 + random(-0.13, 0.13),
                vortexResistance: 1.0 + random(-0.13, 0.13),
                hazardAvoidance: 1.0 + random(-0.13, 0.13)
            };
        }

        let types = ['harvester', 'sensor', 'mover', 'resistant', 'explorer', 'communicator'];
        let colors = { 'harvester': '#34d399', 'sensor': '#38bdf8', 'mover': '#a78bfa', 'resistant': '#f472b6', 'explorer': '#fbbf24', 'communicator': '#c084fc' };

        if (parentModules) {
            this.modules = parentModules.map(m => ({ ...m }));
            if (random() < 0.42 && this.modules.length < 7) {
                let nt = random(types), ang = random(TWO_PI), di = random(5, 9);
                this.modules.push({ type: nt, color: colors[nt], offsetX: cos(ang) * di, offsetY: sin(ang) * di, tier: 1 });
            }
        } else {
            this.modules = [];
            if (random() < 0.48) {
                let t = random(types), ang = random(TWO_PI), di = random(5, 9);
                this.modules.push({ type: t, color: colors[t], offsetX: cos(ang) * di, offsetY: sin(ang) * di, tier: 1 });
            }
        }

        this.updateSpecialization();
    }

    getModuleCount(type) { return this.modules.filter(m => m.type === type).length; }

    getTieredModuleCount(type) {
        return this.modules.filter(m => m.type === type).reduce((sum, m) => sum + (m.tier || 1), 0);
    }

    getEfficiencyBonus() {
        let bonus = 0;
        const harv = this.getTieredModuleCount('harvester');
        const res = this.getTieredModuleCount('resistant');
        bonus += harv * 0.0035;
        bonus += res * 0.0025;
        return bonus;
    }

    getSimilarNeighborCount() {
        let count = 0;
        const myTypes = new Set(this.modules.map(m => m.type));
        for (let o of creatures) {
            if (o === this) continue;
            const otherTypes = new Set(o.modules.map(m => m.type));
            let shared = 0;
            for (let t of myTypes) if (otherTypes.has(t)) shared++;
            if (shared >= 1 && dist(this.x, this.y, o.x, o.y) < 50) count++;
        }
        return count;
    }

    getLocalGroup(radius) {
        let group = [];
        for (let o of creatures) {
            if (o !== this && dist(this.x, this.y, o.x, o.y) < radius) {
                group.push(o);
            }
        }
        return group;
    }

    getNearestHazardInfo() {
        let nearestDist = Infinity;
        let nearestAngle = 0;
        let nearbyCount = 0;
        const dangerRadius = 130;

        for (let h of redHazards) {
            let d = dist(this.x, this.y, h.x, h.y);
            if (d < dangerRadius) nearbyCount++;
            if (d < nearestDist) {
                nearestDist = d;
                nearestAngle = atan2(h.y - this.y, h.x - this.x);
            }
        }

        let normDist = (nearestDist < Infinity) ? constrain(1 - (nearestDist / dangerRadius), 0, 1) : 0;

        return {
            dist: normDist,
            angle: nearestAngle,
            count: nearbyCount
        };
    }

    pruneExcessModules() {
        const maxModules = 11;
        if (this.modules.length <= maxModules) return;

        let byType = {};
        for (let m of this.modules) {
            if (!byType[m.type]) byType[m.type] = [];
            byType[m.type].push(m);
        }

        let newModules = [];

        for (let type in byType) {
            byType[type].sort((a, b) => (b.tier || 1) - (a.tier || 1));
            newModules.push(byType[type][0]);
        }

        const dominant = this.specialization;
        if (dominant && byType[dominant]) {
            let extras = byType[dominant].slice(1);
            while (newModules.length < maxModules && extras.length > 0) {
                newModules.push(extras.shift());
            }
        }

        if (newModules.length < maxModules) {
            let remaining = [];
            for (let type in byType) {
                if (type === dominant) continue;
                remaining = remaining.concat(byType[type].slice(1));
            }
            remaining.sort((a, b) => (b.tier || 1) - (a.tier || 1));
            while (newModules.length < maxModules && remaining.length > 0) {
                newModules.push(remaining.shift());
            }
        }

        this.modules = newModules;
        this.updateSpecialization();
    }

    updateSpecialization() {
        if (this.modules.length === 0) {
            this.specialization = 'balanced';
            this.role = 'Balanced';
            return;
        }

        let counts = {};
        for (let m of this.modules) {
            counts[m.type] = (counts[m.type] || 0) + (m.tier || 1);
        }

        let maxType = null;
        let maxCount = 0;
        for (let type in counts) {
            if (counts[type] > maxCount) {
                maxCount = counts[type];
                maxType = type;
            }
        }

        this.specialization = maxType || 'balanced';

        const tieredCount = this.getTieredModuleCount(this.specialization);
        if (tieredCount >= 4) {
            if (this.specialization === 'harvester') this.role = 'Master Harvester';
            else if (this.specialization === 'sensor') this.role = 'Hazard Warden';
            else if (this.specialization === 'mover') this.role = 'Vortex Runner';
            else if (this.specialization === 'resistant') this.role = 'Survivor Core';
            else if (this.specialization === 'explorer') this.role = 'Wanderer Elite';
            else if (this.specialization === 'communicator') this.role = 'Signal Leader';
            else this.role = 'Elite ' + this.specialization;
        } else if (tieredCount >= 2) {
            this.role = 'Specialized ' + this.specialization;
        } else {
            this.role = this.specialization.charAt(0).toUpperCase() + this.specialization.slice(1);
        }
    }

    reproduce() {
        let newModules = this.modules.map(m => ({...m}));

        let typeTierCounts = {};
        for (let m of newModules) {
            const key = m.type + '-' + (m.tier || 1);
            typeTierCounts[key] = (typeTierCounts[key] || 0) + 1;
        }

        for (let key in typeTierCounts) {
            if (typeTierCounts[key] >= 3) {
                const [type, tierStr] = key.split('-');
                const currentTier = parseInt(tierStr);
                const nextTier = Math.min(5, currentTier + 1);

                for (let m of newModules) {
                    if (m.type === type && (m.tier || 1) === currentTier) {
                        m.tier = nextTier;
                        break;
                    }
                }
            }
        }

        let child = new Creature(this.x + random(-6, 6), this.y + random(-6, 6), newModules, this.generation + 1, this.traits);
        return child;
    }

    update(isDay, vortexDir, vortexStrength, timeScale = 1, envMods = null) {
        if (this.reproCooldown > 0) this.reproCooldown--;
        if (!this.isPredator && this.energy < 14) this.isPredator = true;

        let baseDrain = settings.energyDrain - this.getEfficiencyBonus();
        let finalDrain = baseDrain;
        if (envMods) finalDrain *= envMods.drainMult;

        this.energy -= Math.max(0.004, finalDrain * timeScale);

        let hazardInfo = this.getNearestHazardInfo();
        let sensorLevel = this.getTieredModuleCount('sensor');

        let detectionQuality = 0.58 + (sensorLevel * 0.11);
        let effectiveHazardDist = hazardInfo.dist * detectionQuality;

        let dodgedThisFrame = false;

        if (effectiveHazardDist > 0.14) {
            let avoidAngle = hazardInfo.angle + PI;
            let avoidStrength = effectiveHazardDist * 2.6;

            if (effectiveHazardDist > 0.62) {
                avoidStrength *= 1.7;
                this.currentThought = "Dodging hazard!";
            }

            if (spaceshipActive && bullets.length > 0) {
                for (let b of bullets) {
                    let d = dist(this.x, this.y, b.x, b.y);
                    if (d < 65) {
                        let dx = this.x - b.x;
                        let dy = this.y - b.y;
                        let len = sqrt(dx*dx + dy*dy) || 1;
                        let avoid = map(d, 0, 65, 2.8, 0.4);
                        this.vx += (dx / len) * avoid * 0.045 * timeScale;
                        this.vy += (dy / len) * avoid * 0.045 * timeScale;
                        if (d < 35 && this.currentThought.length < 14) {
                            this.currentThought = "Dodging bullets!";
                        }
                    }
                }
            }

            let adaptationBoost = this.adaptationLevel * 0.016;
            avoidStrength += adaptationBoost;

            this.vx += cos(avoidAngle) * avoidStrength * 0.032 * timeScale;
            this.vy += sin(avoidAngle) * avoidStrength * 0.032 * timeScale;

            let traitBonus = (this.traits.hazardAvoidance - 1) * 0.55;
            this.vx += cos(avoidAngle) * traitBonus * 0.018 * timeScale;
            this.vy += sin(avoidAngle) * traitBonus * 0.018 * timeScale;

            dodgedThisFrame = true;
        }

        if (dodgedThisFrame && effectiveHazardDist > 0.24) {
            this.hazardsAvoided = (this.hazardsAvoided || 0) + 1;
            this.adaptationLevel = min(11, (this.adaptationLevel || 0) + 0.04);
        }

        if (effectiveHazardDist > 0.07 && effectiveHazardDist < 0.52) {
            this.adaptationLevel = min(11, (this.adaptationLevel || 0) + 0.007 * timeScale);
        }

        const tieredSensor = this.getTieredModuleCount('sensor');
        const tieredMover = this.getTieredModuleCount('mover');
        const tieredHarv = this.getTieredModuleCount('harvester');
        const tieredComm = this.getTieredModuleCount('communicator');
        const tieredExpl = this.getTieredModuleCount('explorer');
        const tieredRes = this.getTieredModuleCount('resistant');

        if (tieredSensor >= 3 && effectiveHazardDist > 0.11) {
            let avoidAngle = hazardInfo.angle + PI;
            let avoidStrength = effectiveHazardDist * 3.2;

            let predictive = sin(frameCount * 0.07) * 0.55;
            avoidAngle += predictive * 0.35;

            this.vx += cos(avoidAngle) * avoidStrength * 0.038 * timeScale;
            this.vy += sin(avoidAngle) * avoidStrength * 0.038 * timeScale;

            if (effectiveHazardDist > 0.52) {
                this.currentThought = "Elegant dodge";
            }

            if (frameCount % 7 === 0 && effectiveHazardDist > 0.38) {
                this.adaptationLevel = min(11, this.adaptationLevel + 0.013);
            }
        }

        if (tieredHarv >= 3 && this.honey > 4.5 && random() < 0.0035 * timeScale) {
            this.honey -= 3.5;
            let targetIsGreen = isDay;
            foodBlooms.push({ x: this.x, y: this.y, radius: 18, life: 350, targetIsGreen, age: 0 });
            this.currentThought = "Creating bloom";
            playDepositSound();
        }

        if (tieredComm >= 3 && effectiveHazardDist > 0.48) {
            if (random() < 0.29 * timeScale) {
                pheromones.push({
                    x: this.x,
                    y: this.y,
                    life: 100,
                    isGreen: isDay,
                    isHazardWarning: true
                });
                this.currentThought = "Warning group";
            }
        }

        if ((tieredMover >= 3 || tieredExpl >= 3) && dist(this.x, this.y, centerX, centerY) < 150) {
            let dx = this.x - centerX;
            let dy = this.y - centerY;
            let len = sqrt(dx*dx + dy*dy) || 1;
            let escape = (tieredMover * 0.025 + tieredExpl * 0.02) * timeScale;
            this.vx += (dx / len) * escape;
            this.vy += (dy / len) * escape;

            if (random() < 0.07 * timeScale) {
                this.vx += random(-1.1, 1.1) * 0.55 * timeScale;
                this.vy += random(-1.1, 1.1) * 0.55 * timeScale;
                this.currentThought = "Spiral escape";
            }
        }

        if (tieredMover >= 2 || tieredExpl >= 2) {
            if (dist(this.x, this.y, centerX, centerY) < 170) {
                let escapeForce = (tieredMover * 0.023 + tieredExpl * 0.016) * timeScale;
                let dx = this.x - centerX;
                let dy = this.y - centerY;
                let len = sqrt(dx*dx + dy*dy) || 1;
                this.vx += (dx / len) * escapeForce;
                this.vy += (dy / len) * escapeForce;
            }
            if (this.specialization === 'explorer' || this.specialization === 'mover') {
                this.vx += random(-0.55, 0.55) * 0.22 * timeScale;
                this.vy += random(-0.55, 0.55) * 0.22 * timeScale;
            }
        }

        if (tieredHarv >= 2 && this.honey > 3.5 && random() < 0.0055 * timeScale) {
            this.honey -= 3;
            let targetIsGreen = isDay;
            foodBlooms.push({ x: this.x, y: this.y, radius: 15, life: 310, targetIsGreen, age: 0 });
            this.currentThought = "Depositing bloom";
            playDepositSound();
        }

        if (effectiveHazardDist > 0.52 && this.getModuleCount('communicator') > 0) {
            if (random() < 0.22 * timeScale) {
                pheromones.push({
                    x: this.x,
                    y: this.y,
                    life: 82,
                    isGreen: isDay,
                    isHazardWarning: true
                });
                if (this.currentThought !== "Dodging hazard!") {
                    this.currentThought = "Warning others!";
                }
            }
        }

        if (this.isPredator) {
            let target = null;
            let lowest = Infinity;
            for (let o of creatures) {
                if (o === this) continue;
                if (!o.isPredator && o.energy < lowest) {
                    lowest = o.energy;
                    target = o;
                }
            }
            if (!target) {
                for (let o of creatures) {
                    if (o === this || !o.isPredator) continue;
                    if (o.energy < lowest) {
                        lowest = o.energy;
                        target = o;
                    }
                }
            }
            if (target) {
                let d = dist(this.x, this.y, target.x, target.y);
                if (d > 3 && d < 125) {
                    let dx = target.x - this.x;
                    let dy = target.y - this.y;
                    this.vx += (dx / d) * 0.085 * timeScale;
                    this.vy += (dy / d) * 0.085 * timeScale;
                }
                if (d < 6.5) {
                    let stolen = Math.min(2, target.modules.length);
                    for (let i = 0; i < stolen; i++) if (target.modules.length > 0) this.modules.push(target.modules.pop());
                    this.energy = 72;
                    target.energy = 0;
                    this.killCount++;
                    this.isPredator = false;
                    this.currentThought = "Just fed";
                    playPredatorFeedSound();

                    totalPredatorKills++;

                    this.updateSpecialization();

                    addFloatingText(this.x, this.y - 10, '+25', '#f87171');
                }
            }
        } else {
            let tgt = isDay ? greenZone : blueZone;
            let dx = tgt.x - this.x;
            let dy = tgt.y - this.y;
            let d = dist(this.x, this.y, tgt.x, tgt.y);
            if (d > 7) {
                let hungerFactor = map(this.energy, 0, 58, 1.5, 0.88);
                let pull = settings.zonePullStrength * hungerFactor + this.getModuleCount('harvester') * 0.022;
                this.vx += (dx / d) * pull * timeScale;
                this.vy += (dy / d) * pull * timeScale;
                this.currentThought = isDay ? "Going to Green" : "Going to Blue";
            }

            let explorerBonus = (this.getModuleCount('explorer') * 0.16) + (this.traits.explorationBias - 1) * 0.22;
            let similarNeighbors = this.getSimilarNeighborCount();
            let inGroup = similarNeighbors >= 3;

            if (inGroup) {
                this.currentThought = "With allies";
                this.energy += 0.0035 * timeScale;
            }

            if (similarNeighbors > 0) {
                let avgVx = 0, avgVy = 0, avgX = 0, avgY = 0, count = 0;
                const myTypes = new Set(this.modules.map(m => m.type));

                for (let o of creatures) {
                    if (o === this) continue;
                    const otherTypes = new Set(o.modules.map(m => m.type));
                    let shared = 0;
                    for (let t of myTypes) if (otherTypes.has(t)) shared++;

                    if (shared >= 1 && dist(this.x, this.y, o.x, o.y) < 50) {
                        avgVx += o.vx;
                        avgVy += o.vy;
                        avgX += o.x;
                        avgY += o.y;
                        count++;
                    }
                }

                if (count > 0) {
                    avgVx /= count;
                    avgVy /= count;
                    avgX /= count;
                    avgY /= count;
                    let alignStrength = 0.032 * Math.min(similarNeighbors / 3, 1.4) * timeScale;
                    this.vx += (avgVx - this.vx) * alignStrength;
                    this.vy += (avgVy - this.vy) * alignStrength;

                    let cohesionStrength = 0.025 * Math.min(similarNeighbors / 3, 1.4) * timeScale;
                    let cdx = avgX - this.x;
                    let cdy = avgY - this.y;
                    let clen = sqrt(cdx*cdx + cdy*cdy) || 1;
                    this.vx += (cdx / clen) * cohesionStrength;
                    this.vy += (cdy / clen) * cohesionStrength;
                }
            }

            let bestNeighbor = null;
            let bestFitness = 0;
            for (let o of creatures) {
                if (o === this) continue;
                let fit = o.energy + (o.childrenCount * 7);
                if (fit > bestFitness && dist(this.x, this.y, o.x, o.y) < 65) {
                    bestFitness = fit;
                    bestNeighbor = o;
                }
            }
            if (bestNeighbor) {
                let d2 = dist(this.x, this.y, bestNeighbor.x, bestNeighbor.y);
                if (d2 > 3.5 && d2 < 60) {
                    let dx2 = bestNeighbor.x - this.x;
                    let dy2 = bestNeighbor.y - this.y;
                    let fireflyForce = 0;
                    this.vx += (dx2 / d2) * fireflyForce;
                    this.vy += (dy2 / d2) * fireflyForce;
                }
            }

            let neighbors = 0;
            for (let o of creatures) {
                if (o !== this && dist(this.x, this.y, o.x, o.y) < 42) neighbors++;
            }
            let socialResist = Math.min(0.48, neighbors * settings.socialResist);

            let cdist = dist(this.x, this.y, centerX, centerY);
            if (cdist > 14 && cdist < 400) {
                let tx = -(this.y - centerY);
                let ty = (this.x - centerX);
                let tlen = sqrt(tx * tx + ty * ty) || 1;
                let vForce = 0.68 * vortexStrength * vortexDir * (1 - socialResist);
                vForce *= (1 - (this.traits.vortexResistance - 1) * 0.32);
                this.vx += (tx / tlen) * vForce * timeScale;
                this.vy += (ty / tlen) * vForce * timeScale;

                let pull = 0.36 * vortexStrength * (1 - socialResist);
                this.vx += (centerX - this.x) * pull / (cdist + 5) * timeScale;
                this.vy += (centerY - this.y) * pull / (cdist + 5) * timeScale;
            }

            if (cdist < 140) {
                this.vx += random(-0.78, 0.78) * 0.44 * (1) * timeScale;
                this.vy += random(-0.78, 0.78) * 0.44 * (1) * timeScale;
                this.currentThought = "Escaping vortex";
            } else if (d > 85) {
                this.vx += random(-0.38, 0.38) * 0.29 * (1) * timeScale;
                this.vy += random(-0.38, 0.38) * 0.29 * (1) * timeScale;
                this.currentThought = isDay ? "Seeking Green" : "Seeking Blue";
            }

            if (this.honey > 4.5 && random() < 0.0015 * timeScale) {
                this.honey -= 4;
                let targetIsGreen = isDay;
                foodBlooms.push({
                    x: this.x,
                    y: this.y,
                    radius: 15,
                    life: 310,
                    targetIsGreen: targetIsGreen,
                    age: 0
                });
                this.currentThought = "Depositing bloom";
                playDepositSound();
            }

            let localGroup = this.getLocalGroup(58);
            if (localGroup.length >= 5) {
                let mySpec = this.specialization;
                let specCounts = {};
                for (let o of localGroup) {
                    specCounts[o.specialization] = (specCounts[o.specialization] || 0) + 1;
                }

                let myCount = specCounts[mySpec] || 1;
                let groupSize = localGroup.length;
                let myRatio = myCount / groupSize;

                let pressureChance = (0.004 + (groupSize * 0.0008)) * timeScale;

                if (myRatio < 0.22) {
                    pressureChance *= 2.8;
                    if (myRatio < 0.12) pressureChance *= 1.8;
                    if (myRatio < 0.08) pressureChance *= 1.6;
                }

                if (groupSize > 12) {
                    pressureChance *= 1.4;
                }
                if (groupSize > 18) {
                    pressureChance *= 1.5;
                }

                if (random() < pressureChance) {
                    if (!this.isPredator && this.energy > 18) {
                        this.isPredator = true;
                        this.currentThought = (myRatio < 0.18) ? "Outcast..." : "Internal pressure";
                    }
                }
            }
        }

        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.81;
        this.vy *= 0.81;
        this.x = constrain(this.x, 7, width - 7);

        if (isDrawingWall && typeof wallStartX === 'number') {
            const settings = window.currentFilterWallSettings;
            const isFilterMode = currentWallFilterMode === "custom_filter" && settings && settings.types && settings.types.length > 0;
            const targetTypes = isFilterMode ? settings.types : null;

            if (isFilterMode && (targetTypes.includes('white') || targetTypes.includes('red'))) {
                // Skip creature deflection
            } else {
                let d = distToLineSegment(this.x, this.y, wallStartX, wallStartY, mouseX, mouseY);
                if (d < 28) {
                    let shouldAffect = true;

                    if (isFilterMode) {
                        const moduleCount = this.modules ? this.modules.length : 0;
                        const isActualPred = this.isPredator === true;
                        const isHigh = moduleCount >= 15;
                        const isLow = moduleCount <= 2;

                        shouldAffect = false;
                        if (targetTypes.includes('predator') && isActualPred) shouldAffect = true;
                        if (targetTypes.includes('high_module') && isHigh) shouldAffect = true;
                        if (targetTypes.includes('low_module') && isLow) shouldAffect = true;
                    }

                    if (shouldAffect) {
                        let mx = (wallStartX + mouseX) / 2;
                        let my = (wallStartY + mouseY) / 2;
                        let dx = this.x - mx;
                        let dy = this.y - my;
                        let len = sqrt(dx*dx + dy*dy) || 1;
                        let push = 5.2;
                        this.vx += (dx / len) * push;
                        this.vy += (dy / len) * push;
                        this.vx += (dx / len) * 2.2;
                        this.vy += (dy / len) * 2.2;
                    }
                }
            }
        }

        if (isDrawingWall && typeof wallStartX === 'number') {
            const sweepSettings = window.currentFilterWallSettings;
            const isSweepFilter = currentWallFilterMode === "custom_filter" && sweepSettings && sweepSettings.types && sweepSettings.types.length > 0;

            if (isSweepFilter) {
                const targetTypes = sweepSettings.types;

                if (targetTypes.includes('white')) {
                    for (let p of vortexParticles) {
                        let d = distToLineSegment(p.x, p.y, wallStartX, wallStartY, mouseX, mouseY);
                        if (d < 32) {
                            let mx = (wallStartX + mouseX) / 2;
                            let my = (wallStartY + mouseY) / 2;
                            let dx = p.x - mx;
                            let dy = p.y - my;
                            let len = sqrt(dx*dx + dy*dy) || 1;

                            p.x += (dx / len) * 6.5;
                            p.y += (dy / len) * 6.5;
                            p.vx = (p.vx || 0) * 0.25;
                            p.vy = (p.vy || 0) * 0.25;
                        }
                    }
                }

                if (targetTypes.includes('red')) {
                    for (let r of redHazards) {
                        let d = distToLineSegment(r.x, r.y, wallStartX, wallStartY, mouseX, mouseY);
                        if (d < 32) {
                            let mx = (wallStartX + mouseX) / 2;
                            let my = (wallStartY + mouseY) / 2;
                            let dx = r.x - mx;
                            let dy = r.y - my;
                            let len = sqrt(dx*dx + dy*dy) || 1;

                            r.x += (dx / len) * 7.0;
                            r.y += (dy / len) * 7.0;
                            r.vx = (r.vx || 0) * 0.2;
                            r.vy = (r.vy || 0) * 0.2;
                        }
                    }
                }
            }
        }

        this.y = constrain(this.y, 7, height - 7);

        if (energyWalls.length > 0 && this.getTieredModuleCount('sensor') > 0) {
            for (let w of energyWalls) {
                let d = distToLineSegment(this.x, this.y, w.x1, w.y1, w.x2, w.y2);
                if (d < 55) {
                    let mx = (w.x1 + w.x2) / 2;
                    let my = (w.y1 + w.y2) / 2;
                    let dx = this.x - mx;
                    let dy = this.y - my;
                    let len = sqrt(dx*dx + dy*dy) || 1;
                    let avoid = map(d, 0, 55, 1.8, 0.3);
                    this.vx += (dx / len) * avoid * 0.035 * timeScale;
                    this.vy += (dy / len) * avoid * 0.035 * timeScale;
                    if (d < 25 && this.currentThought.length < 12) {
                        this.currentThought = "Avoiding wall";
                    }
                }
            }
        }

        if (energyWalls.length > 0) {
            for (let w of energyWalls) {
                let d = distToLineSegment(this.x, this.y, w.x1, w.y1, w.x2, w.y2);
                if (d < 14) {

                    const effectiveWallType = w.wallType || (w.filterMode === "custom_filter" ? "filter" : "solid");

                    if (effectiveWallType === "solid") {
                        let mx = (w.x1 + w.x2) / 2;
                        let my = (w.y1 + w.y2) / 2;
                        let dx = this.x - mx;
                        let dy = this.y - my;
                        let len = sqrt(dx*dx + dy*dy) || 1;

                        let force = 4.2;
                        this.vx += (dx / len) * force;
                        this.vy += (dy / len) * force;

                        if (w.offensive) {
                            this.purpleFlash = 55;
                            this.mustEatWhite = true;
                            this.energy = Math.max(0, this.energy - 5.5 * timeScale);
                            w.life -= 22;
                        } else {
                            w.life -= 9;
                        }
                        w.hitFlash = 12;
                    }

                    else if (effectiveWallType === "filter") {
                        const matches = creatureMatchesWallFilter(this, w);

                        if (matches) {
                            let mx = (w.x1 + w.x2) / 2;
                            let my = (w.y1 + w.y2) / 2;
                            let dx = this.x - mx;
                            let dy = this.y - my;
                            let len = sqrt(dx*dx + dy*dy) || 1;

                            let force = 5.8;
                            this.vx += (dx / len) * force;
                            this.vy += (dy / len) * force;

                            if (w.offensive) {
                                this.purpleFlash = 65;
                                this.mustEatWhite = true;
                                this.energy = Math.max(0, this.energy - 4.8 * timeScale);
                                w.life -= 5;
                            } else {
                                w.life -= 2;
                            }
                            w.hitFlash = 12;

                            if (w.empowered && !this.isPredator) {
                                this.isPredator = true;
                            }
                        }
                    }

                    if (this.energy > 8) {
                        this.currentThought = (effectiveWallType === "filter") ? "Filtered by wall" : "Hit energy wall";
                    }
                    break;
                }
            }
        }

        let inG = dist(this.x, this.y, greenZone.x, greenZone.y) < greenZone.baseR;
        let inB = dist(this.x, this.y, blueZone.x, blueZone.y) < blueZone.baseR;

        let gainMult = envMods ? envMods.energyGainMult : 1.0;

        if (inG && isDay && greenZone.food > 0) {
            let g = (0.26 + this.getModuleCount('harvester') * 0.09) * gainMult;
            this.energy = min(100, this.energy + g * timeScale);
            greenZone.food = max(0, greenZone.food - 0.3 * timeScale);
            if (this.energy > 74) this.honey = min(26, this.honey + 0.32 * timeScale);
            let pheroChance = this.getModuleCount('communicator') > 0 ? 0.12 : 0.08;
            if (inG && this.getSimilarNeighborCount() >= 3) pheroChance *= 1.35;
            if (random() < pheroChance * timeScale) {
                pheromones.push({ x: this.x, y: this.y, life: 200, isGreen: true });
            }

            if (random() < 0.08) {
                addFloatingText(this.x, this.y - 8, '+1', '#34d399');
            }
        }

        if (inB && !isDay && blueZone.food > 0) {
            let g = (0.26 + this.getModuleCount('sensor') * 0.08) * gainMult;
            this.energy = min(100, this.energy + g * timeScale);
            blueZone.food = max(0, blueZone.food - 0.3 * timeScale);
            if (this.energy > 74) this.honey = min(26, this.honey + 0.32 * timeScale);
            let pheroChance = this.getModuleCount('communicator') > 0 ? 0.12 : 0.08;
            if (inB && this.getSimilarNeighborCount() >= 3) pheroChance *= 1.35;
            if (random() < pheroChance * timeScale) {
                pheromones.push({ x: this.x, y: this.y, life: 200, isGreen: false });
            }

            if (random() < 0.08) {
                addFloatingText(this.x, this.y - 8, '+1', '#38bdf8');
            }
        }

        if (frameCount % 170 === 0) {
            this.checkForTierUpgrades();
            this.pruneExcessModules();
        }
    }

    checkForTierUpgrades() {
        let typeTierCounts = {};
        for (let m of this.modules) {
            const key = m.type + '-' + (m.tier || 1);
            typeTierCounts[key] = (typeTierCounts[key] || 0) + 1;
        }

        for (let key in typeTierCounts) {
            if (typeTierCounts[key] >= 3) {
                const [type, tierStr] = key.split('-');
                const currentTier = parseInt(tierStr);
                const nextTier = Math.min(5, currentTier + 1);

                for (let m of this.modules) {
                    if (m.type === type && (m.tier || 1) === currentTier) {
                        m.tier = nextTier;
                        this.updateSpecialization();
                        break;
                    }
                }
            }
        }
    }

    show() {
        push();
        translate(this.x, this.y);
        let s = 7 + this.modules.length * 0.16;

        if (selectedCreature === this) {
            stroke(255, 255, 255, 170);
            strokeWeight(2.2);
            circle(0, 0, s + 6);
            stroke(52, 211, 153, 110);
            strokeWeight(1.3);
            circle(0, 0, s + 10);
        }

        let coreColor = this.isPredator ? '#f87171' : '#facc15';
        if (this.specialization === 'harvester') coreColor = '#34d399';
        if (this.specialization === 'sensor') coreColor = '#38bdf8';
        if (this.specialization === 'mover') coreColor = '#a78bfa';
        if (this.specialization === 'resistant') coreColor = '#f472b6';
        if (this.specialization === 'explorer') coreColor = '#fbbf24';
        if (this.specialization === 'communicator') coreColor = '#c084fc';

        fill(coreColor);
        stroke(this.isPredator ? '#fecaca' : '#fef08c');
        strokeWeight(1);
        circle(0, 0, s);
        noStroke();
        fill(255, 255, 255, 42);
        circle(-s * 0.08, -s * 0.08, s * 0.15);

        if (this.honey > 2.5) {
            fill('#f59e0b');
            circle(2.5, -2.5, 2.3 + min(this.honey * 0.07, 5.5));
        }

        if (this.damageFlash > 0 || this.purpleFlash > 0) {
            let alpha = this.purpleFlash > 0 ? 190 + sin(frameCount * 0.6) * 40 : 150 + sin(frameCount * 0.55) * 35;
            fill(167, 139, 250, alpha);
            circle(0, 0, s * 1.15);
        }

        if (this.role.includes('Master') || this.role.includes('Warden') || this.role.includes('Leader')) {
            noFill();
            stroke(255, 255, 255, 32);
            strokeWeight(1.3);
            circle(0, 0, s + 8 + sin(frameCount * 0.13) * 1.8);
        }

        for (let m of this.modules) {
            fill(m.color);
            stroke(255, 255, 255, 3);
            strokeWeight(0.12);

            const tier = m.tier || 1;
            const size = 3.2 + (tier - 1) * 0.6;

            circle(m.offsetX, m.offsetY, size);

            if (tier > 1) {
                if (tier === 5) {
                    stroke('#fde047');
                    strokeWeight(1.9);
                    noFill();
                    circle(m.offsetX, m.offsetY, size + 1.9);
                    fill(m.color);
                } else {
                    stroke('#fbbf24');
                    strokeWeight(tier === 2 ? 1 : tier === 3 ? 1.4 : 1.7);
                    noFill();
                    circle(m.offsetX, m.offsetY, size + 1.3);
                    fill(m.color);
                }
            }
        }
        pop();
    }
}

function showPrestigeWarningModal() {
    const modal = document.createElement('div');
    modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-[200]';
    modal.innerHTML = `
        <div class="bg-[#121218] border border-white/10 rounded-3xl max-w-sm w-full mx-4 p-6 text-center">
            <div class="text-xl font-semibold mb-3 text-orange-400">Furnace is Active</div>
            <p class="text-white/80 mb-5">Prestiging now will stop the furnace early.<br>You will lose <span class="text-red-400 font-semibold">15% of your burning dust</span>.</p>

            <div class="flex items-center justify-center gap-x-2 mb-6">
                <input type="checkbox" id="hide-warning-checkbox" class="accent-orange-500">
                <label for="hide-warning-checkbox" class="text-sm text-white/70 cursor-pointer">Don't show this warning again</label>
            </div>

            <div class="flex gap-3">
                <button onclick="this.closest('.fixed').remove()"

function handlePrestigeWarningConfirm(button) {
    const checkbox = document.getElementById('hide-warning-checkbox');
    if (checkbox && checkbox.checked) {
        hidePrestigeWarning = true;
    }
    button.closest('.fixed').remove();
    forcePrestige();
}

function forcePrestige() {
    if (burningCrystals > 0) {
        const loss = burningCrystals * 0.15;
        aetheriumDust += Math.floor(burningCrystals - loss);
        burningCrystals = 0;
        furnaceEndTime = 0;
        addFloatingText(width/2, 90, `Furnace stopped (-15% Dust)`, '#f87171');
    }

    const dustGained = totalScore / 100000;
    aetheriumDust += dustGained;

    addFloatingText(width/2, 70, `+${formatDust(dustGained)} from Prestige`, '#34d399');

    resetSim();
    totalScore = 0;
    updateMainStats();
    updateAetheriumUI();
    updateFurnaceUI();
}

// ==================== SPACESHIP CONTROLS ====================

document.addEventListener('keydown', function(e) {
    if (!spaceshipActive) return;

    if (e.key === 'ArrowLeft') {
        shipX -= 18;
    }
    if (e.key === 'ArrowRight') {
        shipX += 18;
    }
    if (e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        shootFromShip();
    }

    shipX = constrain(shipX, 30, width - 30);
});

let mouseControlActive = false;

document.addEventListener('click', function(e) {
    if (!spaceshipActive) return;

    const rect = document.querySelector('canvas').getBoundingClientRect();
    if (e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom) {
        mouseControlActive = true;
        shootFromShip();
    }
});

document.addEventListener('mousemove', function(e) {
    if (!spaceshipActive || !mouseControlActive) return;

    const rect = document.querySelector('canvas').getBoundingClientRect();
    shipX = e.clientX - rect.left;
    shipX = constrain(shipX, 30, width - 30);
});

function shootFromShip() {
    if (!spaceshipActive) return;
    const now = Date.now();

    if (now - lastShotTime < 130) return;

    lastShotTime = now;
    bullets.push({ x: shipX - 7, y: shipY - 12, vx: 0, vy: -12 });
    bullets.push({ x: shipX + 7, y: shipY - 12, vx: 0, vy: -12 });

    playShipShootSound();
}

function createBulletExplosion(x, y) {
    explosions.push(new Explosion(x, y));

    for (let c of creatures) {
        let d = dist(c.x, c.y, x, y);
        if (d < 55) {
            let falloff = map(d, 0, 55, 1.0, 0.3);

            c.energy -= 35 * falloff;
            c.damageFlash = 65;

            c.purpleFlash = max(c.purpleFlash || 0, 110);
            c.vx *= (0.4 + falloff * 0.3);
            c.vy *= (0.4 + falloff * 0.3);

            let dx = c.x - x;
            let dy = c.y - y;
            let len = sqrt(dx*dx + dy*dy) || 1;
            let knock = map(d, 0, 55, 4.5, 1.2);
            c.vx += (dx / len) * knock;
            c.vy += (dy / len) * knock;

            if (c.energy > 5 && c.energy < 35 && !c.isPredator && random() < 0.38) {
                c.isPredator = true;
                c.currentThought = "Blown into predator";
            }
        }
    }

    playExplosionSound();
}

function showExtractEggModal() {
    const modal = document.getElementById('extract-egg-modal');
    const listContainer = document.getElementById('extract-egg-list');
    if (!modal || !listContainer) return;

    listContainer.innerHTML = '';

    const balanceDiv = document.createElement('div');
    balanceDiv.className = 'mb-4 px-1 flex justify-between items-center text-sm border-b border-white/10 pb-3';
    balanceDiv.innerHTML = `
        <span class="text-white/60">Your Balance</span>
        <span class="font-mono text-2xl text-violet-400 font-semibold">${formatScore(totalScore)}</span>
    `;
    listContainer.appendChild(balanceDiv);

    let sorted = [...creatures].sort((a, b) => {
        let scoreA = (a.modules?.length || 0) * 3 + (a.killCount || 0) * 2 + (a.childrenCount || 0);
        let scoreB = (b.modules?.length || 0) * 3 + (b.killCount || 0) * 2 + (b.childrenCount || 0);
        return scoreB - scoreA;
    }).slice(0, 10);

    if (sorted.length === 0) {
        listContainer.innerHTML += `<div class="text-center text-white/60 py-8">No creatures available yet.</div>`;
    } else {
        sorted.forEach(creature => {
            const div = document.createElement('div');
            div.className = 'flex items-center justify-between bg-white/5 hover:bg-white/10 rounded-2xl px-4 py-3 cursor-pointer transition-colors mb-1';
            div.innerHTML = `
                <div>
                    <div class="font-semibold text-emerald-400">${creature.name}</div>
                    <div class="text-xs text-white/60">Gen ${creature.generation} • ${creature.modules?.length || 0} modules • ${creature.killCount || 0} kills</div>
                </div>
                <button class="px-4 py-1.5 text-sm rounded-xl bg-amber-500 hover:bg-amber-600 text-white font-medium">Extract</button>
            `;
            div.onclick = () => extractCreatureToEgg(creature);
            listContainer.appendChild(div);
        });
    }

    modal.classList.remove('hidden');
    modal.classList.add('flex');
}

function hideExtractEggModal() {
    const modal = document.getElementById('extract-egg-modal');
    if (modal) {
        modal.classList.remove('flex');
        modal.classList.add('hidden');
    }
}

function extractCreatureToEgg(creature) {
    if (eggs.length >= MAX_EGGS) {
        alert(`Your Egg Inventory is full (${MAX_EGGS} max).`);
        return;
    }

    if (totalScore < 250000) {
        alert("You need 250,000 High Roller Points.");
        return;
    }

    totalScore -= 250000;
    updateMainStats();
    updateEggCountBadge();

    addFloatingText(creature.x, creature.y - 30, "-250,000", '#fbbf24');
    playTone(620, 'sine', 0.18, 0.6);
    setTimeout(() => playTone(880, 'sine', 0.12, 0.4), 110);

    const eggData = {
        name: creature.name,
        generation: creature.generation,
        modules: JSON.parse(JSON.stringify(creature.modules)),
        killCount: creature.killCount || 0,
        childrenCount: creature.childrenCount || 0,
        traits: JSON.parse(JSON.stringify(creature.traits || {}))
    };
    eggs.push(eggData);

    const index = creatures.indexOf(creature);
    if (index > -1) creatures.splice(index, 1);

    if (selectedCreature === creature) {
        deselectCreature();
    }

    showExtractEggModal();
}

                            <div><span class="text-white/50 text-xs">Modules</span><br><span class="font-mono text-emerald-400">${egg.modules ? egg.modules.length : 0}</span></div>

function hideInventory() {

    }
}

function prestige() {
    if (burningCrystals > 0 && !hidePrestigeWarning) {
        showPrestigeWarningModal();
        return;
    }

    if (burningCrystals > 0) {
        const loss = burningCrystals * 0.15;
        aetheriumDust += Math.floor(burningCrystals - loss);
        burningCrystals = 0;
        furnaceEndTime = 0;
        addFloatingText(width/2, 90, `Furnace stopped (-15% Dust)`, '#f87171');
    }

    if (totalScore < 1000) {
        addFloatingText(width/2, height/2 - 40, "Need at least 1,000 points to prestige", '#f87171');
        return;
    }

    const dustGained = totalScore / 100000;
    aetheriumDust += dustGained;

    playTone(660, 'sine', 0.18, 0.6);
    setTimeout(() => playTone(880, 'sine', 0.22, 0.55), 90);
    setTimeout(() => playTone(1100, 'sine', 0.28, 0.5), 200);

    const dustBtn = document.getElementById('top-dust-btn');
    if (dustBtn) {
        dustBtn.style.transition = 'all 0.1s ease';
        dustBtn.style.transform = 'scale(1.2)';
        dustBtn.style.boxShadow = '0 0 20px #fb923c, 0 0 35px #f59e0b';
        setTimeout(() => {
            if (dustBtn) {
                dustBtn.style.transform = 'scale(1)';
                dustBtn.style.boxShadow = '';
            }
        }, 450);
    }

    resetSim();
    totalScore = 0;
    updateMainStats();
    updateAetheriumUI();
    updateFurnaceUI();
}

function updateAetheriumUI() {
    const crystalEl = document.getElementById('aetherium-crystals');
    const dustEl = document.getElementById('aetherium-dust');

    if (crystalEl) crystalEl.innerText = aetheriumCrystals;
    if (dustEl) dustEl.innerText = aetheriumDust.toFixed(2);

    const topDust = document.getElementById('top-dust');
    const topCrystals = document.getElementById('top-crystals');

    if (topDust) topDust.innerText = aetheriumDust.toFixed(2);
    if (topCrystals) topCrystals.innerText = aetheriumCrystals;
}

function updateTopFurnaceUI() {
    const timerEl = document.getElementById('top-furnace-timer');
    const bonusEl = document.getElementById('top-furnace-bonus');
    const pointsWrapper = document.getElementById('top-points-wrapper');

    const isBurning = burningCrystals > 0 && furnaceEndTime > Date.now();
    const mult = getBurningMultiplier();

    if (timerEl) {
        if (isBurning) {
            const remaining = Math.max(0, Math.floor((furnaceEndTime - Date.now()) / 1000));
            const min = Math.floor(remaining / 60);
            const sec = remaining % 60;
            timerEl.innerText = `${min}:${sec.toString().padStart(2, '0')}`;
            timerEl.classList.remove('hidden');
            timerEl.classList.add('flex');
        } else {
            timerEl.classList.add('hidden');
            timerEl.classList.remove('flex');
        }
    }

    if (bonusEl) {
        if (isBurning && mult > 1) {
            bonusEl.innerText = `x${mult}`;
            bonusEl.classList.remove('hidden');
            bonusEl.classList.add('flex');
        } else {
            bonusEl.classList.add('hidden');
            bonusEl.classList.remove('flex');
        }
    }

    if (pointsWrapper) {
        if (isBurning) {
            pointsWrapper.style.boxShadow = '0 0 18px #f59e0b, 0 0 32px #fb923c';
            pointsWrapper.style.animation = 'pulse-orange 1.6s infinite ease-in-out';
        } else {
            pointsWrapper.style.boxShadow = '';
            pointsWrapper.style.animation = '';
        }
    }
}

function updatePrestigePreview() {
    const el = document.getElementById('prestige-dust-preview');
    if (!el) return;

    const dustAmount = totalScore / 100000;
    el.innerText = formatDust(dustAmount);
}

function updatePrestigeButtonGlow() {
    const btn = document.getElementById('prestige-btn');
    if (!btn) return;

    const isBurning = burningCrystals > 0 && furnaceEndTime > Date.now();

    if (!isBurning) {
        btn.style.boxShadow = '0 0 12px #c026ff, 0 0 24px #a21caf';
        btn.style.animation = 'prestige-glow 1.8s infinite ease-in-out';
    } else {
        btn.style.boxShadow = '';
        btn.style.animation = '';
    }
}

function formatScore(n) {
    if (n >= 100000000) {
        return n.toExponential(2);
    }
    return Math.floor(n).toLocaleString();
}

if (!document.getElementById('pulse-orange-style')) {
    const style = document.createElement('style');
    style.id = 'pulse-orange-style';
    style.innerHTML = `

            0%, 100% { box-shadow: 0 0 18px #f59e0b, 0 0 32px #fb923c; }
            50% { box-shadow: 0 0 28px #fb923c, 0 0 48px #f59e0b; }
        }
    `;
    document.head.appendChild(style);
}
