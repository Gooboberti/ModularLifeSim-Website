<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniSimmy2 • v0.51</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-[#0a0a0f] text-[#e0e0ea]">
    <nav class="border-b border-white/10 bg-[#0a0a0f]/95 backdrop-blur sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-violet-400 to-indigo-500 flex items-center justify-center">
                    <i class="fa-solid fa-atom text-[#0a0a0f]"></i>
                </div>
                <div>
                    <span class="font-display text-2xl tracking-tighter">MiniSimmy2</span>
                    <span class="ml-2 text-xs px-2 py-0.5 rounded-full bg-emerald-500/20 text-emerald-400">v0.51 • Visual Fix</span>
                </div>
            </div>
            <div class="flex items-center gap-x-4 text-sm">
                <a href="index.html" class="hover:text-white">Main Site</a>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 pt-6">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="font-display text-3xl tracking-tighter">MiniSimmy2</h1>
                <p class="text-white/60 text-sm">Modular evolution • Yellow cores with growing raspberry-style clusters</p>
            </div>
            <div class="flex items-center gap-x-4 text-sm">
                <div id="stats" class="font-mono px-4 py-1.5 bg-white/5 rounded-2xl text-xs flex gap-x-4"></div>
                <button onclick="resetSim()" class="px-4 py-1.5 bg-white/10 hover:bg-white/20 rounded-2xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-undo"></i> <span>Reset</span>
                </button>
            </div>
        </div>

        <div id="canvas-container" class="rounded-3xl overflow-hidden border border-white/10 shadow-2xl"></div>

        <div class="mt-3 text-xs text-white/50">
            Yellow core = main creature. Colored dots = modules. Clusters grow larger through reproduction. Predators (red) hunt the weakest.
        </div>
    </div>

    <script>
        let creatures = [];
        let greenZone, blueZone;
        let timeOfDay = 0;
        let dayLength = 1400;
        let globalReproCooldown = 0;

        function generateSciFiName() {
            const prefixes = ['Kael','Vex','Thorne','Zyl','Ryn','Syl','Drak','Nyx','Korr','Vael','Sylas','Myr','Zor','Kael'];
            const suffixes = ['-9','-12','ara','ith','on','yx','ar','en','os','ix','ael','or'];
            return prefixes[Math.floor(Math.random()*prefixes.length)] + suffixes[Math.floor(Math.random()*suffixes.length)];
        }

        function setup() {
            let canvas = createCanvas(920, 640);
            canvas.parent('canvas-container');

            greenZone = { x: 220, y: 320, r: 125, food: 160 };
            blueZone  = { x: 700, y: 320, r: 125, food: 160 };

            for (let i = 0; i < 10; i++) {
                creatures.push(new Creature(random(width), random(height)));
            }
        }

        function draw() {
            background(15, 18, 28);

            timeOfDay = (frameCount % dayLength) / dayLength;
            let isDay = timeOfDay < 0.5;

            if (isDay) fill(20, 38, 28, 28);
            else fill(15, 28, 48, 38);
            rect(0, 0, width, height);

            // Zones
            fill(16, 185, 129, isDay ? 145 : 42);
            circle(greenZone.x, greenZone.y, greenZone.r * 2);
            fill(255); textAlign(CENTER); textSize(10);
            text(`GREEN ${Math.floor(greenZone.food)}`, greenZone.x, greenZone.y - greenZone.r - 10);

            fill(56, 189, 248, isDay ? 42 : 145);
            circle(blueZone.x, blueZone.y, blueZone.r * 2);
            fill(255);
            text(`BLUE ${Math.floor(blueZone.food)}`, blueZone.x, blueZone.y - blueZone.r - 10);

            if (globalReproCooldown > 0) globalReproCooldown -= 0.55;

            for (let i = creatures.length - 1; i >= 0; i--) {
                let c = creatures[i];
                c.update(isDay);

                if (c.energy > 82 && globalReproCooldown <= 0 && random() < 0.0075) {
                    let offspring = c.reproduce();
                    if (offspring) {
                        creatures.push(offspring);
                        globalReproCooldown = 16;
                        c.energy -= 17;
                    }
                }

                if (c.energy <= 0) {
                    creatures.splice(i, 1);
                } else {
                    c.show();
                }
            }

            // Population pressure
            let pressure = Math.max(0, (creatures.length - 17) * 0.007);
            for (let c of creatures) c.energy -= pressure;

            updateStats();
        }

        function updateStats() {
            if (creatures.length === 0) return;
            let totalModules = 0;
            let predators = 0;
            for (let c of creatures) {
                totalModules += c.modules.length;
                if (c.isPredator) predators++;
            }
            let avg = (totalModules / creatures.length).toFixed(1);
            document.getElementById('stats').innerHTML = `
                <span>Pop: <span class="text-emerald-400">${creatures.length}</span></span>
                <span>Predators: <span class="text-red-400">${predators}</span></span>
                <span>Avg Modules: <span class="text-violet-400">${avg}</span></span>
            `;
        }

        class Creature {
            constructor(x, y, parentModules = null) {
                this.x = x;
                this.y = y;
                this.vx = random(-0.7, 0.7);
                this.vy = random(-0.7, 0.7);
                this.energy = parentModules ? 52 : 65 + random(15);
                this.name = generateSciFiName();
                this.isPredator = false;
                this.honey = 0;

                let types = ['harvester', 'sensor', 'mover', 'resistant'];
                let colors = { 'harvester': '#34d399', 'sensor': '#38bdf8', 'mover': '#a78bfa', 'resistant': '#f472b6' };

                if (parentModules) {
                    this.modules = parentModules.map(m => ({...m}));
                    if (random() < 0.52 && this.modules.length < 8) {
                        let newType = random(types);
                        let angle = random(TWO_PI);
                        let dist = random(7, 11);
                        this.modules.push({ type: newType, color: colors[newType], offsetX: cos(angle)*dist, offsetY: sin(angle)*dist });
                    }
                } else {
                    this.modules = [];
                    if (random() < 0.55) {
                        let type = random(types);
                        let angle = random(TWO_PI);
                        let dist = random(7, 11);
                        this.modules.push({ type: type, color: colors[type], offsetX: cos(angle)*dist, offsetY: sin(angle)*dist });
                    }
                }
            }

            getModuleCount(type) { return this.modules.filter(m => m.type === type).length; }

            reproduce() {
                return new Creature(this.x + random(-14,14), this.y + random(-14,14), this.modules);
            }

            update(isDay) {
                if (!this.isPredator && this.energy < 15) this.isPredator = true;

                if (this.isPredator) {
                    let weakest = null;
                    let lowest = Infinity;
                    for (let other of creatures) {
                        if (other === this) continue;
                        if (other.energy < lowest) { lowest = other.energy; weakest = other; }
                    }
                    if (weakest) {
                        let d = dist(this.x, this.y, weakest.x, weakest.y);
                        if (d > 6 && d < 200) {
                            let dx = weakest.x - this.x;
                            let dy = weakest.y - this.y;
                            this.vx += (dx / d) * 0.16;
                            this.vy += (dy / d) * 0.16;
                        }
                        if (d < 13) {
                            let stolen = Math.min(2, weakest.modules.length);
                            for (let i = 0; i < stolen; i++) if (weakest.modules.length > 0) this.modules.push(weakest.modules.pop());
                            this.energy = 92;
                            weakest.energy = 0;
                        }
                    }
                } else {
                    let target = isDay ? greenZone : blueZone;
                    let dx = target.x - this.x;
                    let dy = target.y - this.y;
                    let d = dist(this.x, this.y, target.x, target.y);
                    if (d > 8 && target.food > 3) {
                        this.vx += (dx / d) * 0.065;
                        this.vy += (dy / d) * 0.065;
                    }

                    if (this.honey > 7 && random() < 0.007) {
                        this.honey -= 7;
                        if (dist(this.x, this.y, greenZone.x, greenZone.y) < 160) greenZone.food = min(200, greenZone.food + 10);
                        else if (dist(this.x, this.y, blueZone.x, blueZone.y) < 160) blueZone.food = min(200, blueZone.food + 10);
                    }
                }

                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.90;
                this.vy *= 0.90;
                this.x = constrain(this.x, 16, width-16);
                this.y = constrain(this.y, 16, height-16);

                this.energy -= 0.03;

                let inGreen = dist(this.x, this.y, greenZone.x, greenZone.y) < greenZone.r;
                let inBlue = dist(this.x, this.y, blueZone.x, blueZone.y) < blueZone.r;

                if (inGreen && isDay && greenZone.food > 0) {
                    let gain = 0.42 + this.getModuleCount('harvester') * 0.17;
                    this.energy = min(100, this.energy + gain);
                    greenZone.food = max(0, greenZone.food - 0.7);
                    if (this.energy > 90) this.honey = min(22, this.honey + 0.5);
                }
                if (inBlue && !isDay && blueZone.food > 0) {
                    let gain = 0.42 + this.getModuleCount('harvester') * 0.17;
                    this.energy = min(100, this.energy + gain);
                    blueZone.food = max(0, blueZone.food - 0.7);
                    if (this.energy > 90) this.honey = min(22, this.honey + 0.5);
                }
            }

            show() {
                push();
                translate(this.x, this.y);

                // Prominent yellow core (raspberry style)
                let coreSize = 11 + this.modules.length * 0.35;
                if (this.isPredator) {
                    fill(248, 113, 113);
                    stroke(255, 180, 180);
                } else {
                    fill(250, 204, 21);
                    stroke(255, 255, 220);
                }
                strokeWeight(2.2);
                circle(0, 0, coreSize);

                // Inner highlight on core
                noStroke();
                fill(255, 255, 255, 85);
                circle(-coreSize * 0.18, -coreSize * 0.18, coreSize * 0.32);

                // Honey ball
                if (this.honey > 4) {
                    fill(245, 158, 11, 210);
                    circle(7, -7, 5 + this.honey * 0.12);
                }

                // Name
                fill(255, 255, 255, 200);
                textAlign(CENTER);
                textSize(7.5);
                text(this.name, 0, -coreSize - 5);

                // Modules attached to core (smaller, raspberry style)
                for (let m of this.modules) {
                    fill(m.color);
                    stroke(255, 255, 255, 20);
                    strokeWeight(0.7);
                    circle(m.offsetX, m.offsetY, 5.8);

                    noStroke();
                    fill(255, 255, 255, 60);
                    circle(m.offsetX - 1.3, m.offsetY - 1.3, 2.2);
                }

                pop();
            }
        }

        function resetSim() {
            creatures = [];
            greenZone.food = 160;
            blueZone.food = 160;
            globalReproCooldown = 0;
            for (let i = 0; i < 10; i++) {
                creatures.push(new Creature(random(width), random(height)));
            }
        }
    </script>
</body>
</html>
