<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniSimmy2 • Vortex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-[#0a0a0f] text-[#e0e0ea]">
    <nav class="border-b border-white/10 bg-[#0a0a0f]/95 backdrop-blur sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-violet-400 to-indigo-500 flex items-center justify-center">
                    <i class="fa-solid fa-atom text-[#0a0a0f]"></i>
                </div>
                <div>
                    <span class="font-display text-2xl tracking-tighter">MiniSimmy2</span>
                    <span class="ml-2 text-xs px-2 py-0.5 rounded-full bg-violet-500/20 text-violet-400">Vortex v0.61</span>
                </div>
            </div>
            <div class="flex items-center gap-x-4 text-sm">
                <a href="minisimmy2-roadmap.html" class="hover:text-white">Roadmap</a>
                <a href="index.html" class="hover:text-white">Main Site</a>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 pt-6">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="font-display text-3xl tracking-tighter">MiniSimmy2 — Vortex</h1>
                <p class="text-white/60 text-sm">Stronger spiral drain • Particles stay bright until center • Creatures feel the pull</p>
            </div>
            <div class="flex items-center gap-x-4 text-sm">
                <div id="stats" class="font-mono px-4 py-1.5 bg-white/5 rounded-2xl text-xs flex gap-x-4"></div>
                <button onclick="resetSim()" class="px-4 py-1.5 bg-white/10 hover:bg-white/20 rounded-2xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-undo"></i> <span>Reset</span>
                </button>
            </div>
        </div>

        <div id="canvas-container" class="rounded-3xl overflow-hidden border border-white/10 shadow-2xl"></div>

        <div class="mt-3 text-xs text-white/50">
            White particles spiral toward the black center. They stay bright until consumed or reach the drain. Creatures feel a gentle pull toward the vortex.
        </div>
    </div>

    <script>
        let creatures = [];
        let vortexParticles = [];
        let greenZone, blueZone;
        let timeOfDay = 0;
        let dayLength = 1600;
        let lastIsDay = true;
        let globalReproCooldown = 0;
        let centerX, centerY;

        function generateSciFiName() {
            const prefixes = ['Kael','Vex','Thorne','Zyl','Ryn','Syl','Drak','Nyx','Korr','Vael','Sylas','Myr','Zor'];
            const suffixes = ['-9','-12','ara','ith','on','yx','ar','en','os','ix','ael','or'];
            return prefixes[Math.floor(Math.random()*prefixes.length)] + suffixes[Math.floor(Math.random()*suffixes.length)];
        }

        function setup() {
            let canvas = createCanvas(920, 640);
            canvas.parent('canvas-container');

            centerX = width / 2;
            centerY = height / 2;

            greenZone = { x: 200, y: 320, r: 120, food: 140 };
            blueZone  = { x: 720, y: 320, r: 120, food: 140 };

            for (let i = 0; i < 9; i++) {
                creatures.push(new Creature(random(width), random(height)));
            }

            // More initial particles
            for (let i = 0; i < 85; i++) {
                vortexParticles.push(new VortexParticle());
            }
        }

        function draw() {
            background(12, 14, 22);

            timeOfDay = (frameCount % dayLength) / dayLength;
            let isDay = timeOfDay < 0.5;

            if (isDay !== lastIsDay) lastIsDay = isDay;

            if (isDay) fill(18, 35, 26, 25);
            else fill(12, 25, 42, 35);
            rect(0, 0, width, height);

            // Vortex strength (peaks at noon/midnight)
            let vortexPhase = (timeOfDay + 0.25) % 1;
            let vortexStrength = sin(vortexPhase * TWO_PI) * 0.5 + 0.5;
            let vortexDir = isDay ? 1 : -1;

            // Subtle vortex field rings
            stroke(255, 255, 255, 10);
            strokeWeight(1);
            noFill();
            for (let r = 70; r < 450; r += 50) {
                ellipse(centerX, centerY, r * 2, r * 2);
            }

            // Shiny black center sphere
            fill(18, 20, 28);
            stroke(55, 60, 75);
            strokeWeight(3.5);
            circle(centerX, centerY, 24);
            noStroke();
            fill(75, 80, 90, 55);
            circle(centerX - 6, centerY - 6, 9);

            // Vortex particles
            for (let i = vortexParticles.length - 1; i >= 0; i--) {
                let p = vortexParticles[i];
                p.update(vortexDir, vortexStrength);
                p.show();

                // Feed creatures
                for (let c of creatures) {
                    if (dist(p.x, p.y, c.x, c.y) < 12) {
                        c.energy = min(100, c.energy + 2.5);
                        p.life = 0;
                    }
                }

                if (p.life <= 0 || dist(p.x, p.y, centerX, centerY) < 10) {
                    vortexParticles.splice(i, 1);
                }
            }

            // Spawn more particles from edges
            if (frameCount % 2 === 0 && vortexParticles.length < 110) {
                vortexParticles.push(new VortexParticle(true));
            }

            // Zones
            fill(16, 185, 129, isDay ? 130 : 35);
            circle(greenZone.x, greenZone.y, greenZone.r * 2);
            fill(255); textAlign(CENTER); textSize(10);
            text(`GREEN ${Math.floor(greenZone.food)}`, greenZone.x, greenZone.y - greenZone.r - 9);

            fill(56, 189, 248, isDay ? 35 : 130);
            circle(blueZone.x, blueZone.y, blueZone.r * 2);
            fill(255);
            text(`BLUE ${Math.floor(blueZone.food)}`, blueZone.x, blueZone.y - blueZone.r - 9);

            if (globalReproCooldown > 0) globalReproCooldown -= 0.45;

            // Creatures
            for (let i = creatures.length - 1; i >= 0; i--) {
                let c = creatures[i];
                c.update(isDay, vortexDir, vortexStrength);

                if (c.energy > 79 && globalReproCooldown <= 0 && random() < 0.006) {
                    let offspring = c.reproduce();
                    if (offspring) {
                        creatures.push(offspring);
                        globalReproCooldown = 14;
                        c.energy -= 15;
                    }
                }

                if (c.energy <= 0) {
                    creatures.splice(i, 1);
                } else {
                    c.show();
                }
            }

            let pressure = Math.max(0, (creatures.length - 15) * 0.0085);
            for (let c of creatures) c.energy -= pressure;

            updateStats();
        }

        function updateStats() {
            if (creatures.length === 0) return;
            let totalModules = 0;
            let predators = 0;
            for (let c of creatures) {
                totalModules += c.modules.length;
                if (c.isPredator) predators++;
            }
            let avg = (totalModules / creatures.length).toFixed(1);
            document.getElementById('stats').innerHTML = `
                <span>Pop: <span class="text-emerald-400">${creatures.length}</span></span>
                <span>Predators: <span class="text-red-400">${predators}</span></span>
                <span>Avg Modules: <span class="text-violet-400">${avg}</span></span>
            `;
        }

        class VortexParticle {
            constructor(fromEdge = false) {
                if (fromEdge) {
                    let angle = random(TWO_PI);
                    let distFromCenter = random(400, 530);
                    this.x = centerX + cos(angle) * distFromCenter;
                    this.y = centerY + sin(angle) * distFromCenter;
                } else {
                    this.x = random(width);
                    this.y = random(height);
                }
                this.life = random(120, 220); // longer life
                this.size = random(2.4, 3.6);
            }

            update(vortexDir, vortexStrength) {
                let dx = this.x - centerX;
                let dy = this.y - centerY;
                let distToCenter = sqrt(dx*dx + dy*dy) || 1;

                if (distToCenter < 9) {
                    this.life = 0;
                    return;
                }

                // Strong tangential vortex force
                let tangentX = -dy;
                let tangentY = dx;
                let len = sqrt(tangentX*tangentX + tangentY*tangentY) || 1;
                tangentX /= len;
                tangentY /= len;

                let vortexForce = 1.35 * vortexStrength * vortexDir; // stronger
                this.x += tangentX * vortexForce;
                this.y += tangentY * vortexForce;

                // Strong spiral pull toward center
                let pull = 0.85 * vortexStrength;
                this.x += (centerX - this.x) * pull / (distToCenter + 8);
                this.y += (centerY - this.y) * pull / (distToCenter + 8);

                this.life -= 1;
            }

            show() {
                // Stay bright until very close to center
                let alpha = 220;
                if (dist(this.x, this.y, centerX, centerY) < 35) {
                    alpha = map(dist(this.x, this.y, centerX, centerY), 0, 35, 40, 220);
                }
                fill(255, 255, 255, alpha);
                noStroke();
                circle(this.x, this.y, this.size);
            }
        }

        class Creature {
            constructor(x, y, parentModules = null) {
                this.x = x;
                this.y = y;
                this.vx = random(-0.6, 0.6);
                this.vy = random(-0.6, 0.6);
                this.energy = parentModules ? 48 : 60 + random(14);
                this.name = generateSciFiName();
                this.isPredator = false;
                this.honey = 0;

                let types = ['harvester', 'sensor', 'mover', 'resistant'];
                let colors = { 'harvester': '#34d399', 'sensor': '#38bdf8', 'mover': '#a78bfa', 'resistant': '#f472b6' };

                if (parentModules) {
                    this.modules = parentModules.map(m => ({...m}));
                    if (random() < 0.48 && this.modules.length < 7) {
                        let newType = random(types);
                        let angle = random(TWO_PI);
                        let dist = random(6, 10);
                        this.modules.push({ type: newType, color: colors[newType], offsetX: cos(angle)*dist, offsetY: sin(angle)*dist });
                    }
                } else {
                    this.modules = [];
                    if (random() < 0.48) {
                        let type = random(types);
                        let angle = random(TWO_PI);
                        let dist = random(6, 10);
                        this.modules.push({ type: type, color: colors[type], offsetX: cos(angle)*dist, offsetY: sin(angle)*dist });
                    }
                }
            }

            getModuleCount(type) { return this.modules.filter(m => m.type === type).length; }

            reproduce() {
                return new Creature(this.x + random(-11,11), this.y + random(-11,11), this.modules);
            }

            update(isDay, vortexDir, vortexStrength) {
                if (!this.isPredator && this.energy < 15) this.isPredator = true;

                this.energy -= 0.037;

                if (this.isPredator) {
                    let target = null;
                    let lowest = Infinity;
                    let hasPrey = false;

                    for (let other of creatures) {
                        if (other === this) continue;
                        if (!other.isPredator && other.energy < lowest) {
                            lowest = other.energy;
                            target = other;
                            hasPrey = true;
                        }
                    }
                    if (!hasPrey) {
                        for (let other of creatures) {
                            if (other === this || !other.isPredator) continue;
                            if (other.energy < lowest) {
                                lowest = other.energy;
                                target = other;
                            }
                        }
                    }

                    if (target) {
                        let d = dist(this.x, this.y, target.x, target.y);
                        if (d > 5 && d < 170) {
                            let dx = target.x - this.x;
                            let dy = target.y - this.y;
                            this.vx += (dx / d) * 0.14;
                            this.vy += (dy / d) * 0.14;
                        }
                        if (d < 11) {
                            let stolen = Math.min(2, target.modules.length);
                            for (let i = 0; i < stolen; i++) if (target.modules.length > 0) this.modules.push(target.modules.pop());
                            this.energy = 88;
                            target.energy = 0;
                        }
                    }
                } else {
                    let target = isDay ? greenZone : blueZone;
                    let dx = target.x - this.x;
                    let dy = target.y - this.y;
                    let d = dist(this.x, this.y, target.x, target.y);

                    if (d > 6 && target.food > 1) {
                        this.vx += (dx / d) * 0.05;
                        this.vy += (dy / d) * 0.05;
                    }

                    // Wandering
                    if (d > 110) {
                        this.vx += random(-0.7, 0.7) * 0.55;
                        this.vy += random(-0.7, 0.7) * 0.55;
                    }

                    // Vortex pull on creatures (gentle spiral drain)
                    let cdx = this.x - centerX;
                    let cdy = this.y - centerY;
                    let cdist = sqrt(cdx*cdx + cdy*cdy) || 1;

                    if (cdist > 30 && cdist < 380) {
                        // Tangential
                        let tX = -cdy;
                        let tY = cdx;
                        let tLen = sqrt(tX*tX + tY*tY) || 1;
                        this.vx += (tX / tLen) * 0.35 * vortexStrength * vortexDir;
                        this.vy += (tY / tLen) * 0.35 * vortexStrength * vortexDir;

                        // Inward pull
                        let pull = 0.28 * vortexStrength;
                        this.vx += (centerX - this.x) * pull / (cdist + 20);
                        this.vy += (centerY - this.y) * pull / (cdist + 20);
                    }

                    // Food deposition
                    if (this.honey > 8 && random() < 0.0055) {
                        this.honey -= 7;
                        if (random() < 0.5) greenZone.food = min(210, greenZone.food + 12);
                        else blueZone.food = min(210, blueZone.food + 12);
                    }
                }

                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.88;
                this.vy *= 0.88;
                this.x = constrain(this.x, 13, width-13);
                this.y = constrain(this.y, 13, height-13);

                let inGreen = dist(this.x, this.y, greenZone.x, greenZone.y) < greenZone.r;
                let inBlue = dist(this.x, this.y, blueZone.x, blueZone.y) < blueZone.r;

                if (inGreen && isDay && greenZone.food > 0) {
                    let gain = 0.38 + this.getModuleCount('harvester') * 0.15;
                    this.energy = min(100, this.energy + gain);
                    greenZone.food = max(0, greenZone.food - 0.6);
                    if (this.energy > 87) this.honey = min(18, this.honey + 0.4);
                }
                if (inBlue && !isDay && blueZone.food > 0) {
                    let gain = 0.38 + this.getModuleCount('harvester') * 0.15;
                    this.energy = min(100, this.energy + gain);
                    blueZone.food = max(0, blueZone.food - 0.6);
                    if (this.energy > 87) this.honey = min(18, this.honey + 0.4);
                }
            }

            show() {
                push();
                translate(this.x, this.y);

                let coreSize = 10 + this.modules.length * 0.3;
                if (this.isPredator) {
                    fill(248, 113, 113);
                    stroke(255, 180, 180);
                } else {
                    fill(250, 204, 21);
                    stroke(255, 255, 220);
                }
                strokeWeight(1.8);
                circle(0, 0, coreSize);

                noStroke();
                fill(255, 255, 255, 75);
                circle(-coreSize * 0.16, -coreSize * 0.16, coreSize * 0.28);

                if (this.honey > 2.5) {
                    fill(245, 158, 11, 195);
                    circle(5.5, -5.5, 4 + this.honey * 0.09);
                }

                fill(255, 255, 255, 180);
                textAlign(CENTER);
                textSize(6.5);
                text(this.name, 0, -coreSize - 3.5);

                for (let m of this.modules) {
                    fill(m.color);
                    stroke(255, 255, 255, 15);
                    strokeWeight(0.5);
                    circle(m.offsetX, m.offsetY, 5.2);
                }

                pop();
            }
        }

        function resetSim() {
            creatures = [];
            vortexParticles = [];
            greenZone.food = 140;
            blueZone.food = 140;
            globalReproCooldown = 0;
            for (let i = 0; i < 9; i++) {
                creatures.push(new Creature(random(width), random(height)));
            }
            for (let i = 0; i < 80; i++) {
                vortexParticles.push(new VortexParticle());
            }
        }
    </script>
</body>
</html>
