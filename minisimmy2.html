<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniSimmy2 • Dawn/Dusk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        .neural-canvas { border: 1px solid #334155; border-radius: 12px; background: #0f111a; }
    </style>
</head>
<body class="bg-[#0a0a0f] text-[#e0e0ea]">
    <nav class="border-b border-white/10 bg-[#0a0a0f]/95 backdrop-blur sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-violet-400 to-indigo-500 flex items-center justify-center">
                    <i class="fa-solid fa-atom text-[#0a0a0f]"></i>
                </div>
                <div>
                    <span class="font-display text-2xl tracking-tighter">MiniSimmy2</span>
                    <span class="ml-2 text-xs px-2 py-0.5 rounded-full bg-emerald-500/20 text-emerald-400">v0.11 • Dawn/Dusk Cycle</span>
                </div>
            </div>
            <div class="flex items-center gap-x-4 text-sm">
                <a href="minisimmy2-roadmap.html" class="hover:text-white">Roadmap</a>
                <a href="index.html" class="hover:text-white">Main Site</a>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 pt-6 flex gap-6">
        <div class="flex-1">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="font-display text-3xl tracking-tighter">MiniSimmy2</h1>
                    <p class="text-white/60 text-sm">Dawn/Dusk food reset • Green favors Harvesters • Blue favors social/signalers</p>
                </div>
                <div class="flex items-center gap-x-4 text-sm">
                    <div class="flex items-center gap-x-2 bg-white/5 px-3 py-1.5 rounded-2xl">
                        <i class="fa-solid fa-volume-low text-white/60"></i>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.12" class="w-24 accent-emerald-400">
                        <span id="volume-value" class="text-xs w-8 text-right font-mono">12%</span>
                    </div>
                    <div id="stats" class="font-mono px-4 py-1.5 bg-white/5 rounded-2xl text-xs flex gap-x-4"></div>
                    <button onclick="resetSim()" class="px-4 py-1.5 bg-white/10 hover:bg-white/20 rounded-2xl text-sm flex items-center gap-x-2">
                        <i class="fa-solid fa-undo"></i> <span>Reset</span>
                    </button>
                </div>
            </div>

            <div id="canvas-container" class="rounded-3xl overflow-hidden border border-white/10 shadow-2xl"></div>
        </div>

        <!-- Inspector -->
        <div id="inspector" class="w-80 bg-[#121218] border border-white/10 rounded-3xl p-5 hidden flex-col">
            <div class="flex justify-between items-center mb-3">
                <div class="font-semibold text-lg" id="inspect-name"></div>
                <button onclick="closeInspector()" class="text-white/50 hover:text-white text-xl leading-none">&times;</button>
            </div>

            <div class="mb-4">
                <div class="flex justify-between text-xs mb-1">
                    <div>Energy</div>
                    <div id="inspect-energy-text" class="font-mono"></div>
                </div>
                <div class="h-3 bg-[#1f2937] rounded-full overflow-hidden relative">
                    <div id="inspect-energy-bar" class="h-3 bg-gradient-to-r from-red-400 via-yellow-400 to-emerald-400 transition-all" style="width:60%"></div>
                    <div class="absolute top-0 h-3 w-0.5 bg-red-500" style="left:15%"></div>
                    <div class="absolute top-0 h-3 w-0.5 bg-violet-400" style="left:80%"></div>
                </div>
                <div class="flex justify-between text-[10px] text-white/40 mt-0.5">
                    <div>Predation</div>
                    <div>Reproduction</div>
                </div>
            </div>

            <div class="bg-[#0a0a0f] rounded-2xl p-3 mb-4 text-sm">
                <div class="grid grid-cols-2 gap-y-1 text-xs">
                    <div class="text-white/50">Generation</div>
                    <div id="inspect-gen" class="font-mono text-emerald-400"></div>
                    <div class="text-white/50">Children</div>
                    <div id="inspect-children" class="font-mono"></div>
                    <div class="text-white/50">Kills</div>
                    <div id="inspect-kills" class="font-mono text-red-400"></div>
                    <div class="text-white/50">Repro Cooldown</div>
                    <div id="inspect-repro" class="font-mono text-amber-400"></div>
                </div>
            </div>

            <div class="mb-4">
                <div class="text-xs text-white/50 mb-1">Current Thought</div>
                <div id="inspect-thought" class="text-sm bg-[#0a0a0f] rounded-2xl px-3 py-2 text-white/80"></div>
            </div>

            <div class="mb-4">
                <div class="text-xs text-white/50 mb-1.5">Neural Net (animated)</div>
                <canvas id="neural-canvas" width="280" height="170" class="neural-canvas w-full"></canvas>
            </div>

            <div>
                <div class="text-xs text-white/50 mb-1">Children</div>
                <div id="inspect-children-list" class="text-xs bg-[#0a0a0f] rounded-2xl p-2 max-h-16 overflow-auto"></div>
            </div>
        </div>
    </div>

    <script>
        let creatures = [];
        let vortexParticles = [];
        let greenZone, blueZone;
        let timeOfDay = 0;
        let dayLength = 1600;
        let lastIsDay = true;
        let globalReproCooldown = 0;
        let centerX, centerY;
        let selectedCreature = null;
        let neuralCtx;
        let masterVolume = 0.12;

        function generateSciFiName() {
            const prefixes = ['Kael','Vex','Thorne','Zyl','Ryn','Syl','Drak','Nyx','Korr','Vael','Sylas','Myr','Zor'];
            const suffixes = ['-9','-12','ara','ith','on','yx','ar','en','os','ix','ael','or'];
            return prefixes[Math.floor(Math.random()*prefixes.length)] + suffixes[Math.floor(Math.random()*suffixes.length)];
        }

        function setup() {
            let canvas = createCanvas(920, 640);
            canvas.parent('canvas-container');
            canvas.mousePressed(handleMousePress);

            centerX = width / 2;
            centerY = height / 2;

            greenZone = { x: 200, y: 320, r: 125, food: 150 };
            blueZone  = { x: 720, y: 320, r: 125, food: 150 };

            for (let i = 0; i < 9; i++) {
                creatures.push(new Creature(random(width), random(height)));
            }

            for (let i = 0; i < 105; i++) {
                vortexParticles.push(new VortexParticle());
            }

            const slider = document.getElementById('volume-slider');
            const valueDisplay = document.getElementById('volume-value');
            slider.value = masterVolume;
            valueDisplay.innerText = Math.round(masterVolume * 100) + '%';

            slider.oninput = () => {
                masterVolume = parseFloat(slider.value);
                valueDisplay.innerText = Math.round(masterVolume * 100) + '%';
            };

            let neuralCanvas = document.getElementById('neural-canvas');
            neuralCtx = neuralCanvas.getContext('2d');
        }

        function playSound(freq, type = 'sine', duration = 0.2, vol = 0.06, detune = 0, filterFreq = null) {
            if (!window.AudioContext) return;
            if (!window.audioCtx) window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const ctx = window.audioCtx;

            const o = ctx.createOscillator();
            const g = ctx.createGain();
            const filter = ctx.createBiquadFilter();

            o.type = type;
            o.frequency.value = freq;
            if (detune) o.detune.value = detune;

            filter.type = 'lowpass';
            filter.frequency.value = filterFreq || 2000;

            g.gain.value = vol * masterVolume;

            o.connect(filter);
            filter.connect(g);
            g.connect(ctx.destination);

            o.start();
            g.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + duration);
            setTimeout(() => { try { o.stop(); } catch(e){} }, duration * 1000 + 40);
        }

        function playLayeredTone(baseFreq, duration = 0.26, vol = 0.045) {
            playSound(baseFreq, 'sine', duration, vol * 0.75);
            playSound(baseFreq * 1.48, 'sine', duration * 0.75, vol * 0.45, 8);
        }

        function draw() {
            background(12, 14, 22);

            timeOfDay = (frameCount % dayLength) / dayLength;
            let isDay = timeOfDay < 0.5;

            // Dawn / Dusk food reset
            if (isDay !== lastIsDay) {
                if (isDay) {
                    // Dawn - Green gets 200 food
                    greenZone.food = 200;
                } else {
                    // Dusk - Blue gets 200 food
                    blueZone.food = 200;
                }
                lastIsDay = isDay;
            }

            if (isDay) fill(18, 35, 26, 25);
            else fill(12, 25, 42, 35);
            rect(0, 0, width, height);

            let vortexPhase = (timeOfDay + 0.25) % 1;
            let vortexStrength = sin(vortexPhase * TWO_PI) * 0.5 + 0.5;
            let vortexDir = isDay ? 1 : -1;

            stroke(255, 255, 255, 6);
            strokeWeight(1);
            noFill();
            for (let r = 48; r < 490; r += 42) {
                ellipse(centerX, centerY, r * 2, r * 2);
            }

            fill(16, 18, 26);
            stroke(50, 55, 70);
            strokeWeight(4);
            circle(centerX, centerY, 26);
            noStroke();
            fill(70, 75, 85, 48);
            circle(centerX - 6, centerY - 6, 10);

            // Vortex particles
            for (let i = vortexParticles.length - 1; i >= 0; i--) {
                let p = vortexParticles[i];
                p.update(vortexDir, vortexStrength);
                p.show();

                for (let c of creatures) {
                    if (dist(p.x, p.y, c.x, c.y) < 10) {
                        c.energy = min(100, c.energy + 2.4);
                        p.life = 0;
                    }
                }

                if (dist(p.x, p.y, centerX, centerY) < 5) {
                    vortexParticles.splice(i, 1);
                }
            }

            if (frameCount % 2 === 0 && vortexParticles.length < 135) {
                vortexParticles.push(new VortexParticle(true));
            }

            // Zones
            fill(16, 185, 129, isDay ? 105 : 24);
            circle(greenZone.x, greenZone.y, greenZone.r * 2);
            fill(255); textAlign(CENTER); textSize(10);
            text(`GREEN ${Math.floor(greenZone.food)}`, greenZone.x, greenZone.y - greenZone.r - 7);

            fill(56, 189, 248, isDay ? 24 : 105);
            circle(blueZone.x, blueZone.y, blueZone.r * 2);
            fill(255);
            text(`BLUE ${Math.floor(blueZone.food)}`, blueZone.x, blueZone.y - blueZone.r - 7);

            if (globalReproCooldown > 0) globalReproCooldown -= 0.28;

            // Creatures
            for (let i = creatures.length - 1; i >= 0; i--) {
                let c = creatures[i];
                c.update(isDay, vortexDir, vortexStrength);

                if (c.energy > 75 && c.reproCooldown <= 0 && globalReproCooldown <= 0 && random() < 0.0042) {
                    let offspring = c.reproduce();
                    if (offspring) {
                        creatures.push(offspring);
                        globalReproCooldown = 9;
                        c.reproCooldown = 38;
                        c.energy -= 10;
                        c.children.push(offspring.name);
                        c.childrenCount++;
                        playLayeredTone(900 + random(-15,15), 0.26, 0.04);
                    }
                }

                if (c.energy < 26 && random() < 0.011) {
                    playSound(210 + random(-12,12), 'sawtooth', 0.15, 0.022, 0, 750);
                    c.currentThought = "Hungry";
                }

                if (random() < 0.0028) {
                    let neighbors = 0;
                    for (let o of creatures) {
                        if (o !== c && dist(c.x, c.y, o.x, o.y) < 46) neighbors++;
                    }
                    if (neighbors >= 2) {
                        playSound(1260 + random(-30,30), 'sine', 0.11, 0.016);
                        c.currentThought = "Near others";
                    }
                }

                if (c.energy <= 0) {
                    playSound(125, 'sawtooth', 0.3, 0.05);
                    creatures.splice(i, 1);
                } else {
                    c.show();
                }
            }

            let pressure = Math.max(0, (creatures.length - 12) * 0.006);
            for (let c of creatures) c.energy -= pressure;

            updateStats();

            if (selectedCreature && !creatures.includes(selectedCreature)) closeInspector();
            if (selectedCreature) updateInspector();
        }

        function handleMousePress() {
            for (let c of creatures) {
                if (dist(mouseX, mouseY, c.x, c.y) < 15) {
                    selectedCreature = c;
                    document.getElementById('inspector').classList.remove('hidden');
                    document.getElementById('inspector').classList.add('flex');
                    updateInspector();
                    return;
                }
            }
        }

        function closeInspector() {
            selectedCreature = null;
            document.getElementById('inspector').classList.remove('flex');
            document.getElementById('inspector').classList.add('hidden');
        }

        function updateInspector() {
            if (!selectedCreature) return;
            let c = selectedCreature;

            document.getElementById('inspect-name').innerText = c.name;
            document.getElementById('inspect-gen').innerText = c.generation;
            document.getElementById('inspect-children').innerText = c.childrenCount;
            document.getElementById('inspect-kills').innerText = c.killCount;

            let energyPct = Math.max(0, Math.min(100, c.energy));
            document.getElementById('inspect-energy-bar').style.width = energyPct + '%';
            document.getElementById('inspect-energy-text').innerText = Math.floor(c.energy);

            let reproText = c.reproCooldown > 0 ? `Cooldown (${c.reproCooldown})` : 'Ready';
            document.getElementById('inspect-repro').innerText = reproText;

            document.getElementById('inspect-thought').innerText = c.currentThought;

            let list = document.getElementById('inspect-children-list');
            list.innerHTML = c.children.length > 0 ? c.children.join(', ') : 'None yet';

            drawAnimatedNeuralNet(c);
        }

        function drawAnimatedNeuralNet(creature) {
            let ctx = neuralCtx;
            ctx.clearRect(0, 0, 280, 170);

            let t = frameCount * 0.075;

            let layers = [6, 4, 6];
            let positions = [];

            for (let l = 0; l < layers.length; l++) {
                let x = 36 + l * 100;
                positions[l] = [];
                for (let n = 0; n < layers[l]; n++) {
                    let y = 24 + n * (122 / (layers[l] - 1));
                    positions[l].push({x, y});
                }
            }

            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 1;
            for (let l = 0; l < positions.length - 1; l++) {
                for (let a of positions[l]) for (let b of positions[l+1]) {
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }

            for (let l = 0; l < positions.length; l++) {
                for (let i = 0; i < positions[l].length; i++) {
                    let p = positions[l][i];
                    let activation = Math.sin(t + i * 0.95 + l * 0.55) * 0.5 + 0.5;

                    let size = 5.8 + activation * 3.8;
                    ctx.fillStyle = l === 0 ? '#38bdf8' : (l === 2 ? '#f472b6' : '#a78bfa');
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
                    ctx.lineWidth = 0.9;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size + Math.sin(t * 1.8 + i) * 1.8, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }

        function updateStats() {
            if (creatures.length === 0) return;
            let totalModules = 0, predators = 0;
            for (let c of creatures) {
                totalModules += c.modules.length;
                if (c.isPredator) predators++;
            }
            document.getElementById('stats').innerHTML = `
                <span>Pop: <span class="text-emerald-400">${creatures.length}</span></span>
                <span>Predators: <span class="text-red-400">${predators}</span></span>
                <span>Avg Modules: <span class="text-violet-400">${(totalModules/creatures.length).toFixed(1)}</span></span>
            `;
        }

        class VortexParticle {
            constructor(fromEdge = false) {
                if (fromEdge) {
                    let angle = random(TWO_PI);
                    let d = random(460, 580);
                    this.x = centerX + cos(angle) * d;
                    this.y = centerY + sin(angle) * d;
                } else {
                    this.x = random(width);
                    this.y = random(height);
                }
                this.life = 9999;
                this.size = random(1.9, 3.1);
            }

            update(vortexDir, vortexStrength) {
                let dx = this.x - centerX;
                let dy = this.y - centerY;
                let distToCenter = sqrt(dx*dx + dy*dy) || 1;

                if (distToCenter < 4.5) { this.life = 0; return; }

                let tangentX = -dy, tangentY = dx;
                let len = sqrt(tangentX*tangentX + tangentY*tangentY) || 1;
                this.x += (tangentX / len) * 1.45 * vortexStrength * vortexDir;
                this.y += (tangentY / len) * 1.45 * vortexStrength * vortexDir;

                let pull = 0.95 * vortexStrength;
                this.x += (centerX - this.x) * pull / (distToCenter + 2);
                this.y += (centerY - this.y) * pull / (distToCenter + 2);
            }

            show() {
                fill(255, 255, 255, 200);
                noStroke();
                circle(this.x, this.y, this.size);
            }
        }

        class Creature {
            constructor(x, y, parentModules = null, generation = 1) {
                this.x = x; this.y = y;
                this.vx = random(-0.48, 0.48);
                this.vy = random(-0.48, 0.48);
                this.energy = parentModules ? 42 : 53 + random(20);
                this.name = generateSciFiName();
                this.isPredator = false;
                this.honey = 0;
                this.generation = generation;
                this.children = [];
                this.childrenCount = 0;
                this.killCount = 0;
                this.reproCooldown = 0;
                this.currentThought = "Exploring...";

                let types = ['harvester','sensor','mover','resistant'];
                let colors = {'harvester':'#34d399','sensor':'#38bdf8','mover':'#a78bfa','resistant':'#f472b6'};

                if (parentModules) {
                    this.modules = parentModules.map(m => ({...m}));
                    if (random() < 0.45 && this.modules.length < 7) {
                        let nt = random(types);
                        let ang = random(TWO_PI), di = random(5.5, 9.5);
                        this.modules.push({type:nt, color:colors[nt], offsetX:cos(ang)*di, offsetY:sin(ang)*di});
                    }
                } else {
                    this.modules = [];
                    if (random() < 0.45) {
                        let t = random(types), ang = random(TWO_PI), di = random(5.5, 9.5);
                        this.modules.push({type:t, color:colors[t], offsetX:cos(ang)*di, offsetY:sin(ang)*di});
                    }
                }
            }

            getModuleCount(type){ return this.modules.filter(m=>m.type===type).length; }

            reproduce() {
                return new Creature(this.x + random(-7,7), this.y + random(-7,7), this.modules, this.generation + 1);
            }

            update(isDay, vortexDir, vortexStrength) {
                if (this.reproCooldown > 0) this.reproCooldown--;

                if (!this.isPredator && this.energy < 15) this.isPredator = true;

                this.energy -= 0.03;

                if (this.isPredator) {
                    let target = null, lowest = Infinity, hasPrey = false;
                    for (let o of creatures) {
                        if (o === this) continue;
                        if (!o.isPredator && o.energy < lowest) { lowest = o.energy; target = o; hasPrey = true; }
                    }
                    if (!hasPrey) {
                        for (let o of creatures) {
                            if (o === this || !o.isPredator) continue;
                            if (o.energy < lowest) { lowest = o.energy; target = o; }
                        }
                    }

                    if (target) {
                        let d = dist(this.x, this.y, target.x, target.y);
                        if (d > 4 && d < 140) {
                            let dx = target.x - this.x, dy = target.y - this.y;
                            this.vx += (dx/d) * 0.095; this.vy += (dy/d) * 0.095;
                        }
                        if (d < 7.5) {
                            let stolen = Math.min(2, target.modules.length);
                            for (let i=0; i<stolen; i++) if (target.modules.length>0) this.modules.push(target.modules.pop());
                            this.energy = 76;
                            target.energy = 0;
                            this.killCount++;
                            this.isPredator = false;
                            this.currentThought = "Just fed";
                            playSound(130, 'sawtooth', 0.2, 0.045);
                        }
                    }
                } else {
                    let tgt = isDay ? greenZone : blueZone;
                    let dx = tgt.x - this.x, dy = tgt.y - this.y;
                    let d = dist(this.x, this.y, tgt.x, tgt.y);

                    // Very strong attraction to food nodes
                    if (d > 3 && tgt.food > 0) {
                        let basePull = 0.075;
                        if (isDay && tgt === greenZone) basePull += this.getModuleCount('harvester') * 0.018;
                        if (!isDay && tgt === blueZone) basePull += this.getModuleCount('sensor') * 0.015;

                        this.vx += (dx/d) * basePull;
                        this.vy += (dy/d) * basePull;
                    }

                    // Social resistance to vortex
                    let neighbors = 0;
                    for (let o of creatures) {
                        if (o !== this && dist(this.x, this.y, o.x, o.y) < 48) neighbors++;
                    }
                    let socialResist = Math.min(0.5, neighbors * 0.14);

                    let cdist = dist(this.x, this.y, centerX, centerY);
                    if (cdist > 18 && cdist < 400) {
                        let tx = - (this.y - centerY), ty = (this.x - centerX);
                        let tlen = sqrt(tx*tx + ty*ty) || 1;
                        let vForce = 0.75 * vortexStrength * vortexDir * (1 - socialResist);
                        this.vx += (tx / tlen) * vForce;
                        this.vy += (ty / tlen) * vForce;

                        let pull = 0.42 * vortexStrength * (1 - socialResist);
                        this.vx += (centerX - this.x) * pull / (cdist + 8);
                        this.vy += (centerY - this.y) * pull / (cdist + 8);
                    }

                    if (cdist < 160) {
                        this.vx += random(-0.9,0.9)*0.5;
                        this.vy += random(-0.9,0.9)*0.5;
                        this.currentThought = "Escaping vortex";
                    } else if (d > 80) {
                        this.vx += random(-0.45,0.45)*0.35;
                        this.vy += random(-0.45,0.45)*0.35;
                        this.currentThought = "Wandering";
                    } else {
                        this.currentThought = "Seeking resources";
                    }

                    if (this.honey > 5 && random() < 0.0035) {
                        this.honey -= 4.5;
                        if (random()<0.5) greenZone.food = min(180, greenZone.food+6);
                        else blueZone.food = min(180, blueZone.food+6);
                        this.currentThought = "Depositing food";
                        playSound(560, 'sine', 0.13, 0.028);
                    }
                }

                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.83; this.vy *= 0.83;
                this.x = constrain(this.x, 9, width-9);
                this.y = constrain(this.y, 9, height-9);

                let inG = dist(this.x,this.y,greenZone.x,greenZone.y) < greenZone.r;
                let inB = dist(this.x,this.y,blueZone.x,blueZone.y) < blueZone.r;

                // Green during day strongly favors Harvesters (reproduction + energy)
                if (inG && isDay && greenZone.food > 0) {
                    let harv = this.getModuleCount('harvester');
                    let g = 0.28 + harv * 0.14;
                    this.energy = min(100, this.energy + g);
                    greenZone.food = max(0, greenZone.food - 0.35);

                    // Green promotes reproduction for foragers
                    if (harv >= 1 && this.energy > 70 && random() < 0.008) {
                        this.currentThought = "Foraging + breeding";
                    }

                    if (this.energy > 78) this.honey = min(12, this.honey + 0.22);
                }

                // Blue during night supports signalers/social creatures
                if (inB && !isDay && blueZone.food > 0) {
                    let sens = this.getModuleCount('sensor');
                    let g = 0.28 + sens * 0.12;
                    this.energy = min(100, this.energy + g);
                    blueZone.food = max(0, blueZone.food - 0.35);

                    // Blue supports signalers (more social signaling)
                    if (sens >= 1 && random() < 0.006) {
                        this.currentThought = "Signaling";
                    }

                    if (this.energy > 78) this.honey = min(12, this.honey + 0.22);
                }
            }

            show() {
                push(); translate(this.x, this.y);
                let s = 7.8 + this.modules.length * 0.2;
                fill(this.isPredator ? '#f87171' : '#facc15');
                stroke(this.isPredator ? '#fecaca' : '#fef08c');
                strokeWeight(1.2);
                circle(0,0,s);
                noStroke(); fill(255,255,255,50);
                circle(-s*0.11, -s*0.11, s*0.18);

                if (this.honey > 0.6) {
                    fill('#f59e0b'); circle(3.2, -3.2, 2.8 + this.honey*0.04);
                }

                fill(255,255,255,140); textAlign(CENTER); textSize(4.8);
                text(this.name, 0, -s-1.6);

                for (let m of this.modules) {
                    fill(m.color); stroke(255,255,255,5); strokeWeight(0.2);
                    circle(m.offsetX, m.offsetY, 3.8);
                }
                pop();
            }
        }

        function resetSim() {
            creatures = []; vortexParticles = [];
            greenZone.food = 150; blueZone.food = 150;
            globalReproCooldown = 0; selectedCreature = null;
            document.getElementById('inspector').classList.remove('flex');
            document.getElementById('inspector').classList.add('hidden');

            for (let i=0; i<9; i++) creatures.push(new Creature(random(width), random(height)));
            for (let i=0; i<100; i++) vortexParticles.push(new VortexParticle());
        }
    </script>
</body>
