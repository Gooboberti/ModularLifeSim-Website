<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniSimmy — Living Lace Colony</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050810;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      width: 100vw;
      height: 100vh;
      user-select: none;
    }

    #canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      cursor: default;
    }

    /* ── OVERLAY UI ── */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 32px 40px 40px;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #ui.hidden { opacity: 0; pointer-events: none; }

    /* top bar */
    #top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: auto;
    }

    #logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 0.25em;
      color: rgba(220,240,255,0.5);
      text-transform: uppercase;
    }

    #minimize-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(200,220,255,0.6);
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s, color 0.3s;
      flex-shrink: 0;
    }
    #minimize-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* hero text */
    #hero {
      text-align: center;
      pointer-events: none;
    }
    #hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 13vw, 180px);
      line-height: 0.9;
      color: #e8f4f0;
      letter-spacing: 0.02em;
      text-shadow: 0 0 80px rgba(0,255,180,0.12);
    }
    #hero h1 span {
      display: block;
      background: linear-gradient(135deg, #a8ffec 0%, #6ee7ff 50%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #hero p {
      margin-top: 16px;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(180,220,255,0.45);
      font-weight: 300;
    }

    /* bottom nav */
    #bottom-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }

    .nav-pill {
      background: rgba(8,16,32,0.75);
      border: 1px solid rgba(100,200,255,0.15);
      backdrop-filter: blur(20px);
      border-radius: 100px;
      padding: 6px 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-pill a {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: rgba(200,230,255,0.7);
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 100px;
      transition: background 0.3s, color 0.3s;
      cursor: pointer;
    }
    .nav-pill a:hover { background: rgba(100,200,255,0.1); color: #e8f4f0; }

    .nav-icon {
      width: 44px; height: 44px;
      background: rgba(0,255,180,0.08);
      border: 1px solid rgba(0,255,180,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    /* action buttons */
    #actions {
      display: flex;
      gap: 12px;
      align-items: center;
      pointer-events: auto;
      margin-bottom: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(0,255,180,0.15), rgba(100,200,255,0.1));
      border: 1px solid rgba(0,255,180,0.4);
      color: #a8ffec;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.12em;
      padding: 14px 40px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(0,255,180,0.25), rgba(100,200,255,0.18));
      border-color: rgba(0,255,180,0.7);
      box-shadow: 0 0 24px rgba(0,255,180,0.2);
      color: #e8fff8;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(200,220,255,0.6);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 14px 28px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.09);
      color: #e8f4f0;
      border-color: rgba(255,255,255,0.25);
    }

    /* restore btn */
    #restore-btn {
      position: fixed;
      bottom: 32px;
      right: 40px;
      z-index: 20;
      background: rgba(8,16,32,0.75);
      border: 1px solid rgba(100,200,255,0.2);
      color: rgba(200,230,255,0.6);
      width: 40px; height: 40px;
      border-radius: 50%;
      display: none;
      align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 15px;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    #restore-btn:hover { color: #fff; border-color: rgba(0,255,180,0.4); }
    #restore-btn.visible { display: flex; }

    /* hint */
    #hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(180,220,255,0.25);
      z-index: 5;
      pointer-events: none;
      transition: opacity 0.6s;
    }

    /* energy bar */
    #energy-bar {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }
    #energy-bar.visible { opacity: 1; }
    #energy-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(0,255,180,0.5);
    }
    #energy-track {
      width: 120px; height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    #energy-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ffa8, #6ee7ff);
      border-radius: 2px;
      transition: width 0.8s ease;
      box-shadow: 0 0 8px rgba(0,255,180,0.6);
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- Energy bar -->
<div id="energy-bar">
  <span id="energy-label">Lace Energy</span>
  <div id="energy-track"><div id="energy-fill" style="width:0%"></div></div>
</div>

<!-- Main UI -->
<div id="ui">
  <div id="top-bar">
    <div id="logo">MiniSimmy</div>
    <button id="minimize-btn" title="Hide UI">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 7C1 7 3 3 7 3C11 3 13 7 13 7C13 7 11 11 7 11C3 11 1 7 1 7Z" stroke="currentColor" stroke-width="1.2"/>
        <circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.2"/>
      </svg>
    </button>
  </div>

  <div id="hero">
    <h1>LIVING<br><span>LACE</span><br>COLONY</h1>
    <p>MiniSimmy Universe &nbsp;·&nbsp; Interactive Background</p>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
    <div id="actions">
      <button class="btn-primary" onclick="window.location.href='minisimmy8.html'">Start Game</button>

    <div id="bottom-nav">
      <div class="nav-pill">
        <div class="nav-icon">🕸️</div>
        <a href="minisimmy8.html">Colony</a>

      </div>

</div>

<button id="restore-btn" title="Show UI">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
    <path d="M1 7C1 7 3 3 7 3C11 3 13 7 13 7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="1" y1="11" x2="13" y2="3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  </svg>
</button>

<div id="hint">drag creatures · click space to spawn predator</div>

<script>
// ═══════════════════════════════════════════════════
//  MiniSimmy — Living Lace Colony  (Canvas 2D)
// ═══════════════════════════════════════════════════

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Palette ──────────────────────────────────────
const PAL = {
  bg:         '#050810',
  lace:       '#00ffb2',
  laceGlow:   'rgba(0,255,178,',
  sensorBlue: '#6ee7ff',
  commPurple: '#c4b5fd',
  harvestGrn: '#4ade80',
  moverAmber: '#fbbf24',
  predator:   '#ff6b6b',
};

// ── Module types ─────────────────────────────────
const MODULE_TYPES = [
  { name:'harvester',    color:'#4ade80', glow:'rgba(74,222,128,', label:'H' },
  { name:'sensor',       color:'#6ee7ff', glow:'rgba(110,231,255,', label:'S' },
  { name:'communicator', color:'#c4b5fd', glow:'rgba(196,181,253,', label:'C' },
  { name:'mover',        color:'#fbbf24', glow:'rgba(251,191,36,',  label:'M' },
];

// ── Stars / dust ─────────────────────────────────
const STARS = Array.from({length:120}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.2 + 0.2,
  a: Math.random() * 0.4 + 0.05,
  twinkle: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.008 + 0.002,
}));

// ── Floating particles ───────────────────────────
class Particle {
  constructor(x, y, color) {
    this.x = x ?? Math.random() * W;
    this.y = y ?? Math.random() * H;
    this.color = color ?? PAL.lace;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.r  = Math.random() * 1.5 + 0.4;
    this.life = 1;
    this.decay = Math.random() * 0.003 + 0.001;
    this.maxLife = 1;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.life -= this.decay;
  }
  draw() {
    const a = Math.max(0, this.life) * 0.6;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = this.color.replace(')',`, ${a})`).replace('rgb','rgba');
    ctx.fill();
  }
  get dead() { return this.life <= 0; }
}

// ── Creature ─────────────────────────────────────
class Creature {
  constructor(opts = {}) {
    this.x  = opts.x  ?? Math.random() * W;
    this.y  = opts.y  ?? Math.random() * H;
    this.r  = opts.r  ?? (Math.random() * 28 + 18);
    this.isPredator = opts.isPredator ?? false;

    // gentle drift
    const angle = Math.random() * Math.PI * 2;
    const spd   = Math.random() * 0.18 + 0.04;
    this.vx = Math.cos(angle) * spd;
    this.vy = Math.sin(angle) * spd;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpd = (Math.random() * 0.008 + 0.004) * (Math.random()<0.5?1:-1);
    this.rotAngle  = Math.random() * Math.PI * 2;
    this.rotSpd    = (Math.random() * 0.006 + 0.002) * (Math.random()<0.5?1:-1);
    this.pulse = 0;
    this.energy = 0; // 0‑1, set by connection logic

    // modules
    const modCount = opts.isPredator ? 0
                   : (opts.modules ?? [1,1,1,2,2,2,3,3][Math.floor(Math.random()*8)]);
    this.modules = [];
    for (let i = 0; i < modCount; i++) {
      const t = MODULE_TYPES[Math.floor(Math.random()*MODULE_TYPES.length)];
      const a = (i / modCount) * Math.PI * 2 + Math.random() * 0.5;
      this.modules.push({ type:t, angle:a, dist: this.r * 0.75 });
    }

    this.dragging  = false;
    this.dragOffX  = 0;
    this.dragOffY  = 0;
  }

  update(t) {
    if (!this.dragging) {
      this.wobble += this.wobbleSpd;
      this.x += this.vx + Math.sin(this.wobble * 0.7) * 0.06;
      this.y += this.vy + Math.cos(this.wobble * 1.1) * 0.04;

      // soft bounce
      const pad = this.r + 40;
      if (this.x < pad)       { this.vx += 0.04; }
      if (this.x > W - pad)   { this.vx -= 0.04; }
      if (this.y < pad)       { this.vy += 0.04; }
      if (this.y > H - pad)   { this.vy -= 0.04; }

      // speed cap
      const spd = Math.hypot(this.vx, this.vy);
      const maxSpd = this.isPredator ? 0.55 : 0.28;
      if (spd > maxSpd) { this.vx *= maxSpd/spd; this.vy *= maxSpd/spd; }
    }

    this.rotAngle += this.rotSpd;
    this.pulse = (Math.sin(t * 0.002 + this.wobble) + 1) * 0.5;
  }

  draw(t) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotAngle);

    const gEnergy = this.energy;
    const glowR   = this.r * (1.8 + gEnergy * 1.2 + this.pulse * 0.15);

    if (this.isPredator) {
      // predator angular form
      this._drawPredator(t, glowR);
    } else {
      this._drawOrganic(t, glowR, gEnergy);
    }

    // modules
    for (const m of this.modules) {
      m.angle += 0.003;
      const mx = Math.cos(m.angle) * m.dist;
      const my = Math.sin(m.angle) * m.dist;
      const mr = this.r * 0.22 + this.energy * 2;

      // glow
      const mg = ctx.createRadialGradient(mx,my,0, mx,my,mr*2.5);
      mg.addColorStop(0, m.type.glow + '0.6)');
      mg.addColorStop(1, m.type.glow + '0)');
      ctx.beginPath();
      ctx.arc(mx, my, mr*2.5, 0, Math.PI*2);
      ctx.fillStyle = mg;
      ctx.fill();

      // diamond shape
      ctx.save();
      ctx.translate(mx, my);
      ctx.rotate(t * 0.001 + m.angle);
      ctx.beginPath();
      ctx.moveTo(0, -mr);
      ctx.lineTo(mr, 0);
      ctx.lineTo(0,  mr);
      ctx.lineTo(-mr, 0);
      ctx.closePath();
      ctx.fillStyle = m.type.color;
      ctx.globalAlpha = 0.85 + this.energy * 0.15;
      ctx.fill();
      ctx.restore();
    }

    ctx.restore();
  }

  _drawOrganic(t, glowR, gEnergy) {
    const baseColor = this.isPredator ? '#ff4444' : '#1a3a5c';
    // outer glow
    const g = ctx.createRadialGradient(0,0,this.r*0.3, 0,0,glowR);
    const gc = gEnergy > 0.3 ? `rgba(0,255,178,` : `rgba(40,120,200,`;
    g.addColorStop(0, gc + (0.12 + gEnergy * 0.15) + ')');
    g.addColorStop(1, gc + '0)');
    ctx.beginPath(); ctx.arc(0,0,glowR,0,Math.PI*2);
    ctx.fillStyle = g; ctx.fill();

    // body — blob shape
    const segs = 7;
    ctx.beginPath();
    for (let i = 0; i <= segs; i++) {
      const angle = (i / segs) * Math.PI * 2;
      const noise = Math.sin(angle * 2.3 + t * 0.001) * this.r * 0.12
                  + Math.sin(angle * 3.7 + t * 0.0007) * this.r * 0.07;
      const rr = this.r + noise;
      if (i === 0) ctx.moveTo(Math.cos(angle)*rr, Math.sin(angle)*rr);
      else         ctx.lineTo(Math.cos(angle)*rr, Math.sin(angle)*rr);
    }
    ctx.closePath();

    const bodyG = ctx.createRadialGradient(0,0,0, 0,0,this.r);
    bodyG.addColorStop(0, '#0d2a44');
    bodyG.addColorStop(0.6, '#0a1f35');
    bodyG.addColorStop(1,   '#071629');
    ctx.fillStyle = bodyG;
    ctx.fill();

    // rim
    ctx.strokeStyle = gEnergy > 0.4
      ? `rgba(0,255,178,${0.3 + gEnergy * 0.5})`
      : `rgba(100,200,255,0.2)`;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  _drawPredator(t, glowR) {
    // angular / hexagonal predator
    const g = ctx.createRadialGradient(0,0,this.r*0.2, 0,0,glowR);
    g.addColorStop(0, 'rgba(255,80,80,0.15)');
    g.addColorStop(1, 'rgba(255,80,80,0)');
    ctx.beginPath(); ctx.arc(0,0,glowR,0,Math.PI*2);
    ctx.fillStyle = g; ctx.fill();

    const sides = 6;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const a = (i / sides) * Math.PI * 2;
      const rr = this.r * (0.9 + Math.sin(a * 3 + t * 0.002) * 0.1);
      if (i===0) ctx.moveTo(Math.cos(a)*rr, Math.sin(a)*rr);
      else       ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
    }
    ctx.closePath();
    const bg = ctx.createRadialGradient(0,0,0,0,0,this.r);
    bg.addColorStop(0,'#3d1010'); bg.addColorStop(1,'#1e0808');
    ctx.fillStyle = bg; ctx.fill();
    ctx.strokeStyle = `rgba(255,90,90,${0.4 + this.pulse*0.2})`;
    ctx.lineWidth = 1.5; ctx.stroke();

    // inner cross
    ctx.strokeStyle = 'rgba(255,120,120,0.3)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(-this.r*0.5,0); ctx.lineTo(this.r*0.5,0);
    ctx.moveTo(0,-this.r*0.5); ctx.lineTo(0,this.r*0.5);
    ctx.stroke();
  }

  hit(px, py) { return Math.hypot(px-this.x, py-this.y) < this.r + 10; }
}

// ── Lace Connection ──────────────────────────────
class LaceConnection {
  constructor(a, b) {
    this.a = a; this.b = b;
    this.strength = 0;
    this.flowOffset = Math.random();
  }

  update() {
    const dist = Math.hypot(this.a.x - this.b.x, this.a.y - this.b.y);
    const maxDist = 280;
    const target = dist < maxDist ? 1 - (dist / maxDist) : 0;
    this.strength += (target - this.strength) * 0.04;
    this.flowOffset += 0.004 + this.strength * 0.008;
    if (this.flowOffset > 1) this.flowOffset -= 1;
  }

  draw(t) {
    if (this.strength < 0.02) return;
    const { a, b } = this;
    const mx = (a.x + b.x) / 2 + Math.sin(t * 0.0008 + a.x * 0.01) * 30;
    const my = (a.y + b.y) / 2 + Math.cos(t * 0.0006 + b.y * 0.01) * 25;

    // curved line base
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.quadraticCurveTo(mx, my, b.x, b.y);

    const alpha = this.strength;
    ctx.strokeStyle = `rgba(0,255,178,${alpha * 0.35})`;
    ctx.lineWidth   = this.strength * 1.5;
    ctx.stroke();

    // bright core line
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.quadraticCurveTo(mx, my, b.x, b.y);
    ctx.strokeStyle = `rgba(0,255,220,${alpha * 0.7})`;
    ctx.lineWidth   = this.strength * 0.5;
    ctx.stroke();

    // flowing energy dot
    if (this.strength > 0.25) {
      for (let p = 0; p < 2; p++) {
        const fp = (this.flowOffset + p * 0.5) % 1;
        const fx = this._bezier(fp, a.x, mx, b.x);
        const fy = this._bezier(fp, a.y, my, b.y);
        const er = this.strength * 3.5;

        const eg = ctx.createRadialGradient(fx,fy,0, fx,fy,er*2);
        eg.addColorStop(0, `rgba(180,255,240,${alpha * 0.9})`);
        eg.addColorStop(1, 'rgba(0,255,178,0)');
        ctx.beginPath(); ctx.arc(fx,fy,er*2,0,Math.PI*2);
        ctx.fillStyle = eg; ctx.fill();
      }
    }
  }

  _bezier(t, p0, p1, p2) {
    return (1-t)*(1-t)*p0 + 2*(1-t)*t*p1 + t*t*p2;
  }
}

// ── Scene Setup ──────────────────────────────────
const creatures = [];
const PRESETS = [
  { r:26, modules:2 }, { r:32, modules:1 }, { r:22, modules:3 },
  { r:30, modules:2 }, { r:20, modules:1 }, { r:36, modules:3 },
  { r:24, modules:2 },
  { r:42, isPredator:true }, { r:38, isPredator:true },
];

function scatter() {
  const cols = 3, rows = 3;
  PRESETS.forEach((p, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const x = (col + 0.5 + (Math.random()-.5)*0.6) * (W / cols);
    const y = (row + 0.5 + (Math.random()-.5)*0.6) * (H / rows);
    creatures.push(new Creature({ x, y, ...p }));
  });
}

const connections = [];
function buildConnections() {
  for (let i = 0; i < creatures.length; i++)
    for (let j = i+1; j < creatures.length; j++)
      if (!creatures[i].isPredator && !creatures[j].isPredator)
        connections.push(new LaceConnection(creatures[i], creatures[j]));
}

scatter();
buildConnections();

const particles = [];

// ── Drag & interaction ───────────────────────────
let dragged = null;

canvas.addEventListener('mousedown', e => {
  const {x, y} = {x: e.clientX, y: e.clientY};
  for (let i = creatures.length-1; i >= 0; i--) {
    if (creatures[i].hit(x, y)) {
      dragged = creatures[i];
      dragged.dragging = true;
      dragged.dragOffX = x - dragged.x;
      dragged.dragOffY = y - dragged.y;
      return;
    }
  }
  // click empty space → spawn predator
  spawnPredatorAt(x, y);
});

canvas.addEventListener('mousemove', e => {
  if (!dragged) return;
  dragged.x = e.clientX - dragged.dragOffX;
  dragged.y = e.clientY - dragged.dragOffY;
  dragged.vx *= 0.3; dragged.vy *= 0.3;
});

canvas.addEventListener('mouseup', () => {
  if (dragged) { dragged.dragging = false; dragged = null; }
});

canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  const {x,y} = {x:t.clientX, y:t.clientY};
  for (let i = creatures.length-1; i >= 0; i--) {
    if (creatures[i].hit(x,y)) {
      dragged = creatures[i];
      dragged.dragging = true;
      dragged.dragOffX = x - dragged.x;
      dragged.dragOffY = y - dragged.y;
      return;
    }
  }
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!dragged) return;
  const t = e.touches[0];
  dragged.x = t.clientX - dragged.dragOffX;
  dragged.y = t.clientY - dragged.dragOffY;
}, {passive:false});
canvas.addEventListener('touchend', () => {
  if (dragged) { dragged.dragging = false; dragged = null; }
});

function spawnPredatorAt(x, y) {
  if (creatures.filter(c=>c.isPredator).length >= 3) return;
  const p = new Creature({ x, y, r: 28+Math.random()*14, isPredator:true });
  creatures.push(p);
  // flash
  for (let i = 0; i < 12; i++) particles.push(new Particle(x,y,'#ff6060'));
}

// ── UI wiring ─────────────────────────────────────
const ui         = document.getElementById('ui');
const minBtn     = document.getElementById('minimize-btn');
const restoreBtn = document.getElementById('restore-btn');
const hint       = document.getElementById('hint');
const energyBar  = document.getElementById('energy-bar');
const energyFill = document.getElementById('energy-fill');

minBtn.addEventListener('click', () => {
  ui.classList.add('hidden');
  restoreBtn.classList.add('visible');
});
restoreBtn.addEventListener('click', () => {
  ui.classList.remove('hidden');
  restoreBtn.classList.remove('visible');
});

// ── Main loop ─────────────────────────────────────
let lastPart = 0;
let hintShown = true;

function frame(t) {
  requestAnimationFrame(frame);

  // background
  ctx.fillStyle = '#050810';
  ctx.fillRect(0,0,W,H);

  // nebula vignette
  const vg = ctx.createRadialGradient(W*.5,H*.5,H*.1, W*.5,H*.5,H*.85);
  vg.addColorStop(0,'rgba(0,8,20,0)');
  vg.addColorStop(1,'rgba(0,4,12,0.55)');
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);

  // stars
  for (const s of STARS) {
    const tw = Math.sin(t * s.speed + s.twinkle);
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200,230,255,${s.a + tw * 0.08})`;
    ctx.fill();
  }

  // connections
  for (const c of connections) { c.update(); c.draw(t); }

  // energy calculation
  const activeConns = connections.filter(c=>c.strength > 0.3);
  const totalEnergy = Math.min(1, activeConns.length / 8);
  energyFill.style.width = (totalEnergy * 100) + '%';
  if (totalEnergy > 0.05) energyBar.classList.add('visible');

  // update creature energy
  for (const c of creatures) c.energy = 0;
  for (const c of connections) {
    if (c.strength > 0.15) {
      c.a.energy = Math.min(1, c.a.energy + c.strength * 0.6);
      c.b.energy = Math.min(1, c.b.energy + c.strength * 0.6);
    }
  }

  // spawn ambient particles near active connections
  if (t - lastPart > 120 && activeConns.length > 0) {
    const rc = activeConns[Math.floor(Math.random()*activeConns.length)];
    const px = (rc.a.x + rc.b.x) / 2 + (Math.random()-0.5)*40;
    const py = (rc.a.y + rc.b.y) / 2 + (Math.random()-0.5)*40;
    particles.push(new Particle(px, py, '#00ffb2'));
    lastPart = t;
  }

  // creatures
  for (const c of creatures) { c.update(t); c.draw(t); }

  // particles
  for (let i = particles.length-1; i >= 0; i--) {
    particles[i].update(); particles[i].draw();
    if (particles[i].dead) particles.splice(i,1);
  }

  // hint fade
  if (hintShown && t > 5000) {
    hint.style.opacity = '0';
    hintShown = false;
  }
}

requestAnimationFrame(frame);
</script>
</body>
</html>
