<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniSimmy2 • Phase 0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-[#0a0a0f] text-[#e0e0ea]">
    <nav class="border-b border-white/10 bg-[#0a0a0f]/95 backdrop-blur sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-violet-400 to-indigo-500 flex items-center justify-center">
                    <i class="fa-solid fa-atom text-[#0a0a0f]"></i>
                </div>
                <div>
                    <span class="font-display text-2xl tracking-tighter">MiniSimmy2</span>
                    <span class="ml-2 text-xs px-2 py-0.5 rounded-full bg-violet-500/20 text-violet-400">Phase 0</span>
                </div>
            </div>
            <div class="flex items-center gap-x-4 text-sm">
                <a href="index.html" class="hover:text-white">Main Site</a>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 pt-6">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="font-display text-3xl tracking-tighter">MiniSimmy2 — Phase 0</h1>
                <p class="text-white/60 text-sm">Day/Night cycle • Two resource zones • Basic molecule creatures</p>
            </div>
            <div class="flex items-center gap-x-4 text-sm">
                <div id="time-display" class="font-mono px-3 py-1 bg-white/5 rounded-2xl text-xs"></div>
                <button onclick="resetSim()" class="px-4 py-1.5 bg-white/10 hover:bg-white/20 rounded-2xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-undo"></i> <span>Reset</span>
                </button>
            </div>
        </div>

        <div id="canvas-container" class="rounded-3xl overflow-hidden border border-white/10 shadow-2xl"></div>

        <div class="mt-4 text-xs text-white/50 flex gap-x-6">
            <div><span class="text-emerald-400">●</span> Green Zone = Good in Day, Harmful at Night</div>
            <div><span class="text-sky-400">●</span> Blue Zone = Good in Night, Harmful in Day</div>
        </div>
    </div>

    <script>
        let creatures = [];
        let greenZone, blueZone;
        let timeOfDay = 0; // 0 = day, 1 = night (cycles)
        let dayLength = 1200; // frames per full cycle

        function setup() {
            let canvas = createCanvas(900, 620);
            canvas.parent('canvas-container');

            // Initialize zones
            greenZone = { x: 280, y: 310, r: 160 };
            blueZone = { x: 620, y: 310, r: 160 };

            // Create initial creatures
            for (let i = 0; i < 12; i++) {
                creatures.push(new Creature(random(width), random(height)));
            }
        }

        function draw() {
            background(15, 18, 28);

            // Update time of day
            timeOfDay = (frameCount % dayLength) / dayLength;
            let isDay = timeOfDay < 0.5;

            // Background gradient hint for day/night
            if (isDay) {
                fill(20, 35, 25, 40);
            } else {
                fill(15, 25, 45, 50);
            }
            rect(0, 0, width, height);

            // Draw resource zones
            // Green Zone
            let greenAlpha = isDay ? 180 : 60;
            fill(16, 185, 129, greenAlpha);
            noStroke();
            circle(greenZone.x, greenZone.y, greenZone.r * 2);

            // Blue Zone
            let blueAlpha = isDay ? 60 : 180;
            fill(56, 189, 248, blueAlpha);
            circle(blueZone.x, blueZone.y, blueZone.r * 2);

            // Zone labels
            fill(255);
            textAlign(CENTER);
            textSize(11);
            text("GREEN", greenZone.x, greenZone.y - greenZone.r - 12);
            text("BLUE", blueZone.x, blueZone.y - blueZone.r - 12);

            // Update and draw creatures
            for (let c of creatures) {
                c.update(isDay);
                c.show();
            }

            // UI - Time of day
            let timeStr = isDay ? "DAY" : "NIGHT";
            document.getElementById('time-display').innerHTML = 
                `${timeStr} <span class="text-white/40">(${nf(timeOfDay * 100, 2, 0)}%)</span>`;

            // Simple instructions
            fill(255, 255, 255, 40);
            textSize(10);
            textAlign(LEFT);
            text("Creatures seek the beneficial zone and avoid the harmful one", 20, height - 20);
        }

        class Creature {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = random(-1, 1);
                this.vy = random(-1, 1);
                this.energy = 80;
                this.size = 14;
                // Modules: array of {color, type}
                this.modules = [];
                let moduleColors = ['#34d399', '#38bdf8', '#a78bfa', '#f472b6'];
                for (let i = 0; i < floor(random(2, 5)); i++) {
                    this.modules.push({
                        color: moduleColors[floor(random(moduleColors.length))],
                        offsetX: random(-8, 8),
                        offsetY: random(-8, 8)
                    });
                }
            }

            update(isDay) {
                // Find which zone is currently beneficial
                let targetX, targetY;
                let avoidX, avoidY;

                if (isDay) {
                    targetX = greenZone.x;
                    targetY = greenZone.y;
                    avoidX = blueZone.x;
                    avoidY = blueZone.y;
                } else {
                    targetX = blueZone.x;
                    targetY = blueZone.y;
                    avoidX = greenZone.x;
                    avoidY = greenZone.y;
                }

                // Move toward good zone
                let dx = targetX - this.x;
                let dy = targetY - this.y;
                let distToGood = dist(this.x, this.y, targetX, targetY);

                if (distToGood > 5) {
                    this.vx += (dx / distToGood) * 0.08;
                    this.vy += (dy / distToGood) * 0.08;
                }

                // Slight avoidance of bad zone
                let distToBad = dist(this.x, this.y, avoidX, avoidY);
                if (distToBad < 180) {
                    let ax = this.x - avoidX;
                    let ay = this.y - avoidY;
                    this.vx += (ax / distToBad) * 0.12;
                    this.vy += (ay / distToBad) * 0.12;
                }

                // Apply velocity with damping
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.94;
                this.vy *= 0.94;

                // Boundary
                this.x = constrain(this.x, 20, width - 20);
                this.y = constrain(this.y, 20, height - 20);

                // Energy system
                this.energy -= 0.035;

                // Gain or lose energy based on zone
                let inGreen = dist(this.x, this.y, greenZone.x, greenZone.y) < greenZone.r;
                let inBlue = dist(this.x, this.y, blueZone.x, blueZone.y) < blueZone.r;

                if (inGreen && isDay) this.energy = min(100, this.energy + 0.6);
                if (inBlue && !isDay) this.energy = min(100, this.energy + 0.6);

                if (inGreen && !isDay) this.energy -= 0.25; // Harm at night
                if (inBlue && isDay) this.energy -= 0.25;  // Harm during day

                // Death & respawn
                if (this.energy <= 0) {
                    this.energy = 70;
                    this.x = random(width);
                    this.y = random(height);
                    // Chance to gain a new module on "rebirth"
                    if (random() < 0.35 && this.modules.length < 7) {
                        let colors = ['#34d399', '#38bdf8', '#a78bfa', '#f472b6'];
                        this.modules.push({
                            color: random(colors),
                            offsetX: random(-9, 9),
                            offsetY: random(-9, 9)
                        });
                    }
                }
            }

            show() {
                push();
                translate(this.x, this.y);

                // Yellow core (shiny)
                fill(250, 204, 21);
                stroke(255, 255, 200);
                strokeWeight(2);
                circle(0, 0, this.size);

                // Inner highlight
                noStroke();
                fill(255, 255, 255, 120);
                circle(-3, -3, this.size * 0.45);

                // Modules (colored nodules)
                for (let m of this.modules) {
                    fill(m.color);
                    noStroke();
                    circle(m.offsetX, m.offsetY, 7);
                    // Small highlight on module
                    fill(255, 255, 255, 90);
                    circle(m.offsetX - 1.5, m.offsetY - 1.5, 2.5);
                }

                pop();
            }
        }

        function resetSim() {
            creatures = [];
            for (let i = 0; i < 12; i++) {
                creatures.push(new Creature(random(width), random(height)));
            }
        }

        // Optional: Click to add a creature
        function mousePressed() {
            if (mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
                creatures.push(new Creature(mouseX, mouseY));
            }
        }
    </script>
</body>
</html>
