<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniSimmy2</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2334d399'/%3E%3Ccircle cx='50' cy='50' r='22' fill='%230a0a0f'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com">
        // v1.88 Hazard Fields Menu
        function showRedHazardsMenu() {
            document.querySelectorAll(".fixed").forEach(el => el.remove());
            const modal = document.createElement("div");
            modal.className = "fixed inset-0 bg-black/80 flex items-center justify-center z-[200]";
            modal.innerHTML = `
                <div class="bg-[#121218] border border-white/10 rounded-3xl w-full max-w-sm mx-4 p-6">
                    <div class="flex justify-between items-center mb-5">
                        <h3 class="text-xl font-semibold flex items-center gap-x-2">
                            <i class="fa-solid fa-bomb text-red-400"></i>
                            <span>Hazard Fields</span>
                        </h3>
                        <button onclick="this.closest('.fixed').remove()" class="text-3xl leading-none text-white/60 hover:text-white">×</button>
                    </div>
                    <div class="space-y-5">
                        <div class="flex items-center justify-between">
                            <div>
                                <div class="font-medium">Enable Hazard Fields</div>
                                <div class="text-xs text-white/60">Red particles spawn and deal damage</div>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="red-hazards-toggle" class="sr-only peer" ${redHazardsEnabled ? "checked" : ""} onchange="redHazardsEnabled = this.checked">
                                <div class="w-11 h-6 bg-white/20 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-500"></div>
                            </label>
                        </div>
                        <div>
                            <div class="flex justify-between mb-1">
                                <div class="font-medium text-sm">Intensity</div>
                                <div id="hazard-intensity-value" class="text-sm font-mono text-red-400">${Math.round((redHazardIntensity || 1) * 100)}%</div>
                            </div>
                            <input type="range" id="hazard-intensity-slider" class="w-full accent-red-500" min="0.2" max="3" step="0.1" value="${redHazardIntensity || 1}" oninput="updateHazardIntensity(this.value)">
                            <div class="flex justify-between text-xs text-white/50 mt-1">
                                <div>Low</div>
                                <div>High</div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-6 text-xs text-white/50">Higher intensity = more frequent and stronger red hazards.</div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function updateHazardIntensity(value) {
            redHazardIntensity = parseFloat(value);
            const display = document.getElementById("hazard-intensity-value");
            if (display) display.textContent = Math.round(redHazardIntensity * 100) + "%";
        }

    </script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        .time-btn { transition: all 0.1s ease; }
        .time-btn.active { background-color: #34d399; color: #0a0a0f; font-weight: 600; }
        .stat-value { font-variant-numeric: tabular-nums; }
        .inspector-label { font-size: 10px; color: #64748b; }
        .modal { animation: fadeInScale 0.2s ease forwards; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .hazard-cursor { cursor: none !important; }
        .env-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            z-index: 10;
        }
        .cheat-card {
            transition: all 0.2s ease;
        }
        .cheat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
        .unlock-btn {
            transition: all 0.15s ease;
        }
        .unlock-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-[#0a0a0f] text-[#e0e0ea]">
