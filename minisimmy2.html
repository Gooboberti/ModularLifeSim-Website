<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniSimmy — Living Lace Colony</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050810;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      width: 100vw;
      height: 100vh;
      user-select: none;
    }

    #canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      cursor: default;
    }

    #ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 32px 40px 40px;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #ui.hidden { opacity: 0; pointer-events: none; }

    #top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: auto;
    }

    #logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 0.25em;
      color: rgba(220,240,255,0.5);
      text-transform: uppercase;
    }

    #minimize-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(200,220,255,0.6);
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s, color 0.3s;
      flex-shrink: 0;
    }
    #minimize-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    #hero {
      text-align: center;
      pointer-events: none;
    }
    #hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 13vw, 180px);
      line-height: 0.9;
      color: #e8f4f0;
      letter-spacing: 0.02em;
      text-shadow: 0 0 80px rgba(0,255,180,0.12);
    }
    #hero h1 span {
      display: block;
      font-size: 0.48em;
      margin-top: 8px;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #a8ffec 0%, #6ee7ff 50%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(0,255,180,0.15), rgba(100,200,255,0.1));
      border: 1px solid rgba(0,255,180,0.4);
      color: #a8ffec;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.12em;
      padding: 14px 40px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
      text-decoration: none;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(0,255,180,0.25), rgba(100,200,255,0.18));
      border-color: rgba(0,255,180,0.7);
      box-shadow: 0 0 24px rgba(0,255,180,0.2);
      color: #e8fff8;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(200,220,255,0.6);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 14px 28px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
      text-decoration: none;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.09);
      color: #e8f4f0;
      border-color: rgba(255,255,255,0.25);
    }

    #restore-btn {
      position: fixed;
      bottom: 32px;
      right: 40px;
      z-index: 20;
      background: rgba(8,16,32,0.75);
      border: 1px solid rgba(100,200,255,0.2);
      color: rgba(200,230,255,0.6);
      width: 40px; height: 40px;
      border-radius: 50%;
      display: none;
      align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 15px;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    #restore-btn:hover { color: #fff; border-color: rgba(0,255,180,0.4); }
    #restore-btn.visible { display: flex; }

    #hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(180,220,255,0.25);
      z-index: 5;
      pointer-events: none;
      transition: opacity 0.6s;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <div id="top-bar">
    <div id="logo">MiniSimmy</div>
    <button id="minimize-btn" title="Hide UI">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 7C1 7 3 3 7 3C11 3 13 7 13 7C13 7 11 11 7 11C3 11 1 7 1 7Z" stroke="currentColor" stroke-width="1.2"/>
        <circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.2"/>
      </svg>
    </button>
  </div>

  <div id="hero">
    <h1>MINISIMMY<br><span>Neural Evolution Sim</span></h1>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
    <!-- Start Game (larger) -->
    <div id="actions">
      <button class="btn-primary" onclick="window.location.href='minisimmy8.html'"
              style="font-size: 22px; padding: 18px 52px; letter-spacing: 0.14em;">
        Start Game
      </button>
      <button class="btn-secondary" onclick="window.location.href='minisimmy2-guide.html'">Guide</button>
    </div>

    <!-- Bottom row: Neural Architecture + Neural Archive -->
    <div style="display:flex; gap:12px; align-items:center; margin-top: 4px;">
      <button class="btn-primary" onclick="window.location.href='NeuralArch.html'"
              style="font-size: 15px; padding: 13px 28px; letter-spacing: 0.08em; box-shadow: 0 0 20px rgba(0,255,180,0.35);">
        NEURAL ARCHITECTURE
      </button>

      <button class="btn-primary" onclick="window.location.href='module_neural_archive.html'"
              style="font-size: 15px; padding: 13px 28px; letter-spacing: 0.08em; box-shadow: 0 0 32px rgba(0,255,180,0.5), 0 10px 30px -10px rgba(0,0,0,0.4);">
        OPEN NEURAL ARCHIVE
      </button>
    </div>
  </div>
</div>

<button id="restore-btn" title="Show UI">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
    <path d="M1 7C1 7 3 3 7 3C11 3 13 7 13 7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="1" y1="11" x2="13" y2="3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  </svg>
</button>

<div id="hint">drag creatures · click space to spawn predator</div>

<script>
// Canvas + animation code (unchanged from original)
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const MODULE_TYPES = [
  { name:'harvester', color:'#4ade80', glow:'rgba(74,222,128,' },
  { name:'sensor', color:'#6ee7ff', glow:'rgba(110,231,255,' },
  { name:'communicator', color:'#c4b5fd', glow:'rgba(196,181,253,' },
  { name:'mover', color:'#fbbf24', glow:'rgba(251,191,36,' },
];

const STARS = Array.from({length:120}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.2 + 0.2,
  a: Math.random() * 0.4 + 0.05,
  twinkle: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.008 + 0.002,
}));

class Particle {
  constructor(x, y, color) {
    this.x = x ?? Math.random() * W;
    this.y = y ?? Math.random() * H;
    this.color = color ?? '#00ffb2';
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.r = Math.random() * 1.5 + 0.4;
    this.life = 1;
    this.decay = Math.random() * 0.003 + 0.001;
  }
  update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
  draw() {
    const a = Math.max(0, this.life) * 0.6;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = this.color.replace(')', `, ${a})`).replace('rgb','rgba');
    ctx.fill();
  }
  get dead() { return this.life <= 0; }
}

class Creature {
  constructor(opts = {}) {
    this.x = opts.x ?? Math.random() * W;
    this.y = opts.y ?? Math.random() * H;
    this.r = opts.r ?? (Math.random() * 28 + 18);
    this.isPredator = opts.isPredator ?? false;

    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 0.18 + 0.04;
    this.vx = Math.cos(angle) * spd;
    this.vy = Math.sin(angle) * spd;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpd = (Math.random() * 0.008 + 0.004) * (Math.random()<0.5?1:-1);
    this.rotAngle = Math.random() * Math.PI * 2;
    this.rotSpd = (Math.random() * 0.006 + 0.002) * (Math.random()<0.5?1:-1);
    this.pulse = 0;
    this.energy = 0;

    const modCount = opts.isPredator ? 0 : (opts.modules ?? [1,1,1,2,2,2,3,3][Math.floor(Math.random()*8)]);
    this.modules = [];
    for (let i = 0; i < modCount; i++) {
      const t = MODULE_TYPES[Math.floor(Math.random()*MODULE_TYPES.length)];
      const a = (i / modCount) * Math.PI * 2 + Math.random() * 0.5;
      this.modules.push({ type:t, angle:a, dist: this.r * 0.75 });
    }
    this.dragging = false;
    this.dragOffX = 0;
    this.dragOffY = 0;
  }

  update(t) {
    if (!this.dragging) {
      this.wobble += this.wobbleSpd;
      this.x += this.vx + Math.sin(this.wobble * 0.7) * 0.06;
      this.y += this.vy + Math.cos(this.wobble * 1.1) * 0.04;

      const pad = this.r + 40;
      if (this.x < pad) this.vx += 0.04;
      if (this.x > W - pad) this.vx -= 0.04;
      if (this.y < pad) this.vy += 0.04;
      if (this.y > H - pad) this.vy -= 0.04;

      const spd = Math.hypot(this.vx, this.vy);
      const maxSpd = this.isPredator ? 0.55 : 0.28;
      if (spd > maxSpd) { this.vx *= maxSpd/spd; this.vy *= maxSpd/spd; }
    }
    this.rotAngle += this.rotSpd;
    this.pulse = (Math.sin(t * 0.002 + this.wobble) + 1) * 0.5;
  }

  draw(t) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotAngle);

    const gEnergy = this.energy;
    const glowR = this.r * (1.8 + gEnergy * 1.2 + this.pulse * 0.15);

    if (this.isPredator) {
      const g = ctx.createRadialGradient(0,0,this.r*0.2, 0,0,glowR);
      g.addColorStop(0, 'rgba(255,80,80,0.15)');
      g.addColorStop(1, 'rgba(255,80,80,0)');
      ctx.beginPath(); ctx.arc(0,0,glowR,0,Math.PI*2); ctx.fillStyle = g; ctx.fill();

      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        const rr = this.r * (0.9 + Math.sin(a * 3 + t * 0.002) * 0.1);
        if (i===0) ctx.moveTo(Math.cos(a)*rr, Math.sin(a)*rr);
        else ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
      }
      ctx.closePath();
      ctx.fillStyle = '#1e0808';
      ctx.fill();
      ctx.strokeStyle = `rgba(255,90,90,${0.4 + this.pulse*0.2})`;
      ctx.lineWidth = 1.5; ctx.stroke();
    } else {
      const g = ctx.createRadialGradient(0,0,this.r*0.3, 0,0,glowR);
      const gc = gEnergy > 0.3 ? 'rgba(0,255,178,' : 'rgba(40,120,200,';
      g.addColorStop(0, gc + (0.12 + gEnergy * 0.15) + ')');
      g.addColorStop(1, gc + '0)');
      ctx.beginPath(); ctx.arc(0,0,glowR,0,Math.PI*2); ctx.fillStyle = g; ctx.fill();

      ctx.beginPath();
      for (let i = 0; i <= 7; i++) {
        const angle = (i / 7) * Math.PI * 2;
        const noise = Math.sin(angle * 2.3 + t * 0.001) * this.r * 0.12;
        const rr = this.r + noise;
        if (i === 0) ctx.moveTo(Math.cos(angle)*rr, Math.sin(angle)*rr);
        else ctx.lineTo(Math.cos(angle)*rr, Math.sin(angle)*rr);
      }
      ctx.closePath();
      ctx.fillStyle = '#0a1f35';
      ctx.fill();
      ctx.strokeStyle = gEnergy > 0.4 ? `rgba(0,255,178,${0.3 + gEnergy * 0.5})` : `rgba(100,200,255,0.2)`;
      ctx.lineWidth = 1.2; ctx.stroke();
    }

    for (const m of this.modules) {
      m.angle += 0.003;
      const mx = Math.cos(m.angle) * m.dist;
      const my = Math.sin(m.angle) * m.dist;
      const mr = this.r * 0.22 + this.energy * 2;

      ctx.save();
      ctx.translate(mx, my);
      ctx.rotate(t * 0.001 + m.angle);
      ctx.beginPath();
      ctx.moveTo(0, -mr); ctx.lineTo(mr, 0); ctx.lineTo(0, mr); ctx.lineTo(-mr, 0); ctx.closePath();
      ctx.fillStyle = m.type.color;
      ctx.globalAlpha = 0.85 + this.energy * 0.15;
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  hit(px, py) { return Math.hypot(px-this.x, py-this.y) < this.r + 10; }
}

class LaceConnection {
  constructor(a, b) { this.a = a; this.b = b; this.strength = 0; this.flowOffset = Math.random(); }
  update() {
    const dist = Math.hypot(this.a.x - this.b.x, this.a.y - this.b.y);
    const target = dist < 280 ? 1 - (dist / 280) : 0;
    this.strength += (target - this.strength) * 0.04;
    this.flowOffset += 0.004 + this.strength * 0.008; if (this.flowOffset > 1) this.flowOffset -= 1;
  }
  draw(t) {
    if (this.strength < 0.02) return;
    const mx = (this.a.x + this.b.x) / 2 + Math.sin(t * 0.0008 + this.a.x * 0.01) * 30;
    const my = (this.a.y + this.b.y) / 2 + Math.cos(t * 0.0006 + this.b.y * 0.01) * 25;

    ctx.beginPath();
    ctx.moveTo(this.a.x, this.a.y);
    ctx.quadraticCurveTo(mx, my, this.b.x, this.b.y);
    ctx.strokeStyle = `rgba(0,255,178,${this.strength * 0.35})`;
    ctx.lineWidth = this.strength * 1.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(this.a.x, this.a.y);
    ctx.quadraticCurveTo(mx, my, this.b.x, this.b.y);
    ctx.strokeStyle = `rgba(0,255,220,${this.strength * 0.7})`;
    ctx.lineWidth = this.strength * 0.5;
    ctx.stroke();
  }
}

const creatures = [];
const PRESETS = [
  { r:26, modules:2 }, { r:32, modules:1 }, { r:22, modules:3 },
  { r:30, modules:2 }, { r:20, modules:1 }, { r:36, modules:3 },
  { r:24, modules:2 },
  { r:42, isPredator:true }, { r:38, isPredator:true },
];

function scatter() {
  const cols = 3, rows = 3;
  PRESETS.forEach((p, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const x = (col + 0.5 + (Math.random()-.5)*0.6) * (W / cols);
    const y = (row + 0.5 + (Math.random()-.5)*0.6) * (H / rows);
    creatures.push(new Creature({ x, y, ...p }));
  });
}

const connections = [];
function buildConnections() {
  for (let i = 0; i < creatures.length; i++)
    for (let j = i+1; j < creatures.length; j++)
      if (!creatures[i].isPredator && !creatures[j].isPredator)
        connections.push(new LaceConnection(creatures[i], creatures[j]));
}

scatter();
buildConnections();

const particles = [];
let dragged = null;

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  for (let i = creatures.length-1; i >= 0; i--) {
    if (creatures[i].hit(x, y)) {
      dragged = creatures[i];
      dragged.dragging = true;
      dragged.dragOffX = x - dragged.x;
      dragged.dragOffY = y - dragged.y;
      return;
    }
  }
  if (creatures.filter(c => c.isPredator).length < 3) {
    creatures.push(new Creature({ x, y, r: 30 + Math.random()*12, isPredator:true }));
  }
});

canvas.addEventListener('mousemove', e => {
  if (!dragged) return;
  const rect = canvas.getBoundingClientRect();
  dragged.x = e.clientX - rect.left - dragged.dragOffX;
  dragged.y = e.clientY - rect.top - dragged.dragOffY;
});

canvas.addEventListener('mouseup', () => { if (dragged) { dragged.dragging = false; dragged = null; } });

const ui = document.getElementById('ui');
const minBtn = document.getElementById('minimize-btn');
const restoreBtn = document.getElementById('restore-btn');
const hint = document.getElementById('hint');

minBtn.addEventListener('click', () => {
  ui.classList.add('hidden');
  restoreBtn.classList.add('visible');
});
restoreBtn.addEventListener('click', () => {
  ui.classList.remove('hidden');
  restoreBtn.classList.remove('visible');
});

let lastPart = 0;
function frame(t) {
  requestAnimationFrame(frame);
  ctx.fillStyle = '#050810';
  ctx.fillRect(0,0,W,H);

  const vg = ctx.createRadialGradient(W*0.5, H*0.5, H*0.1, W*0.5, H*0.5, H*0.85);
  vg.addColorStop(0,'rgba(0,8,20,0)');
  vg.addColorStop(1,'rgba(0,4,12,0.55)');
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);

  for (const s of STARS) {
    const tw = Math.sin(t * s.speed + s.twinkle);
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200,230,255,${s.a + tw * 0.08})`;
    ctx.fill();
  }

  for (const c of connections) { c.update(); c.draw(t); }

  for (const c of creatures) { c.update(t); c.draw(t); }

  for (let i = particles.length-1; i >= 0; i--) {
    particles[i].update(); particles[i].draw();
    if (particles[i].dead) particles.splice(i,1);
  }

  if (t > 6000 && hint.style.opacity !== '0') hint.style.opacity = '0';
}
requestAnimationFrame(frame);
</script>
</body>
</html>
