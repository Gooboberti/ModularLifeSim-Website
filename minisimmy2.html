<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniSimmy2 • Phase 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-[#0a0a0f] text-[#e0e0ea]">
    <nav class="border-b border-white/10 bg-[#0a0a0f]/95 backdrop-blur sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-violet-400 to-indigo-500 flex items-center justify-center">
                    <i class="fa-solid fa-atom text-[#0a0a0f]"></i>
                </div>
                <div>
                    <span class="font-display text-2xl tracking-tighter">MiniSimmy2</span>
                    <span class="ml-2 text-xs px-2 py-0.5 rounded-full bg-violet-500/20 text-violet-400">Phase 3</span>
                </div>
            </div>
            <div class="flex items-center gap-x-4 text-sm">
                <a href="index.html" class="hover:text-white">Main Site</a>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 pt-6">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="font-display text-3xl tracking-tighter">MiniSimmy2 — Phase 3</h1>
                <p class="text-white/60 text-sm">Stronger evolution • Population stats • Module-driven behavior</p>
            </div>
            <div class="flex items-center gap-x-4 text-sm">
                <div id="stats" class="font-mono px-4 py-1.5 bg-white/5 rounded-2xl text-xs flex gap-x-4"></div>
                <button onclick="resetSim()" class="px-4 py-1.5 bg-white/10 hover:bg-white/20 rounded-2xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-undo"></i> <span>Reset</span>
                </button>
            </div>
        </div>

        <div id="canvas-container" class="rounded-3xl overflow-hidden border border-white/10 shadow-2xl"></div>

        <div class="mt-4 text-xs text-white/60 flex flex-wrap gap-x-6 gap-y-1">
            <div><span class="text-emerald-400">●</span> Harvester — Strong energy advantage</div>
            <div><span class="text-sky-400">●</span> Sensor — Precision movement</div>
            <div><span class="text-violet-400">●</span> Mover — Fast explorer</div>
            <div><span class="text-rose-400">●</span> Resistant — Zone survivor</div>
        </div>
    </div>

    <script>
        let creatures = [];
        let greenZone, blueZone;
        let timeOfDay = 0;
        let dayLength = 1200;
        let lastReproTime = 0;

        function setup() {
            let canvas = createCanvas(900, 620);
            canvas.parent('canvas-container');

            greenZone = { x: 280, y: 310, r: 160 };
            blueZone = { x: 620, y: 310, r: 160 };

            for (let i = 0; i < 11; i++) {
                creatures.push(new Creature(random(width), random(height)));
            }
        }

        function draw() {
            background(15, 18, 28);

            timeOfDay = (frameCount % dayLength) / dayLength;
            let isDay = timeOfDay < 0.5;

            if (isDay) fill(20, 38, 28, 35);
            else fill(15, 28, 48, 45);
            rect(0, 0, width, height);

            // Zones
            let greenAlpha = isDay ? 165 : 50;
            fill(16, 185, 129, greenAlpha); noStroke();
            circle(greenZone.x, greenZone.y, greenZone.r * 2);

            let blueAlpha = isDay ? 50 : 165;
            fill(56, 189, 248, blueAlpha);
            circle(blueZone.x, blueZone.y, blueZone.r * 2);

            fill(255, 255, 255, 170);
            textAlign(CENTER); textSize(11);
            text("GREEN", greenZone.x, greenZone.y - greenZone.r - 14);
            text("BLUE", blueZone.x, blueZone.y - blueZone.r - 14);

            // Update & draw
            for (let i = creatures.length - 1; i >= 0; i--) {
                let c = creatures[i];
                c.update(isDay);

                if (c.energy > 87 && frameCount - lastReproTime > 6 && random() < 0.014) {
                    let offspring = c.reproduce();
                    if (offspring && creatures.length < 30) {
                        creatures.push(offspring);
                        lastReproTime = frameCount;
                        c.energy -= 24;
                    }
                }

                if (c.energy <= 0) {
                    creatures.splice(i, 1);
                } else {
                    c.show();
                }
            }

            // Population control
            while (creatures.length > 26) {
                creatures.splice(floor(random(creatures.length)), 1);
            }

            // Stats panel
            updateStats();
        }

        function updateStats() {
            if (creatures.length === 0) return;

            let totalModules = 0;
            let typeCounts = { harvester: 0, sensor: 0, mover: 0, resistant: 0 };

            for (let c of creatures) {
                totalModules += c.modules.length;
                for (let m of c.modules) {
                    typeCounts[m.type]++;
                }
            }

            let avgModules = (totalModules / creatures.length).toFixed(1);

            // Find dominant type
            let dominant = Object.keys(typeCounts).reduce((a, b) => typeCounts[a] > typeCounts[b] ? a : b);
            let dominantName = dominant.charAt(0).toUpperCase() + dominant.slice(1);

            document.getElementById('stats').innerHTML = `
                <span>Creatures: <span class="text-emerald-400">${creatures.length}</span></span>
                <span>Avg Modules: <span class="text-violet-400">${avgModules}</span></span>
                <span>Dominant: <span class="text-rose-400">${dominantName}</span></span>
            `;
        }

        class Creature {
            constructor(x, y, parentModules = null) {
                this.x = x;
                this.y = y;
                this.vx = random(-1, 1);
                this.vy = random(-1, 1);
                this.energy = parentModules ? 62 : 72 + random(18);
                this.baseSize = 12.5;

                let types = ['harvester', 'sensor', 'mover', 'resistant'];
                let colors = {
                    'harvester': '#34d399',
                    'sensor': '#38bdf8',
                    'mover': '#a78bfa',
                    'resistant': '#f472b6'
                };

                if (parentModules) {
                    this.modules = parentModules.map(m => ({...m}));
                    if (random() < 0.5 && this.modules.length < 8) {
                        let newType = random(types);
                        let angle = random(TWO_PI);
                        let dist = random(9, 13);
                        this.modules.push({
                            type: newType,
                            color: colors[newType],
                            offsetX: cos(angle) * dist,
                            offsetY: sin(angle) * dist
                        });
                    }
                } else {
                    this.modules = [];
                    let count = floor(random(3, 6));
                    for (let i = 0; i < count; i++) {
                        let type = random(types);
                        let angle = (TWO_PI / count) * i + random(-0.25, 0.25);
                        let dist = random(9, 13);
                        this.modules.push({
                            type: type,
                            color: colors[type],
                            offsetX: cos(angle) * dist,
                            offsetY: sin(angle) * dist
                        });
                    }
                }
            }

            getModuleCount(type) {
                return this.modules.filter(m => m.type === type).length;
            }

            reproduce() {
                return new Creature(this.x + random(-20, 20), this.y + random(-20, 20), this.modules);
            }

            update(isDay) {
                let targetX, targetY, avoidX, avoidY;

                if (isDay) {
                    targetX = greenZone.x; targetY = greenZone.y;
                    avoidX = blueZone.x; avoidY = blueZone.y;
                } else {
                    targetX = blueZone.x; targetY = blueZone.y;
                    avoidX = greenZone.x; avoidY = greenZone.y;
                }

                // Stronger module effects
                let moverBonus = 1 + this.getModuleCount('mover') * 0.15;
                let sensorBonus = 1 + this.getModuleCount('sensor') * 0.1;

                let dx = targetX - this.x;
                let dy = targetY - this.y;
                let d = dist(this.x, this.y, targetX, targetY);

                if (d > 6) {
                    this.vx += (dx / d) * 0.09 * sensorBonus;
                    this.vy += (dy / d) * 0.09 * sensorBonus;
                }

                let db = dist(this.x, this.y, avoidX, avoidY);
                if (db < 155) {
                    let ax = this.x - avoidX;
                    let ay = this.y - avoidY;
                    this.vx += (ax / db) * 0.11;
                    this.vy += (ay / db) * 0.11;
                }

                this.x += this.vx * moverBonus;
                this.y += this.vy * moverBonus;
                this.vx *= 0.92;
                this.vy *= 0.92;

                this.x = constrain(this.x, 22, width - 22);
                this.y = constrain(this.y, 22, height - 22);

                this.energy -= 0.026;

                let inGreen = dist(this.x, this.y, greenZone.x, greenZone.y) < greenZone.r;
                let inBlue = dist(this.x, this.y, blueZone.x, blueZone.y) < blueZone.r;

                let harvester = this.getModuleCount('harvester');
                let resistant = this.getModuleCount('resistant');

                if (inGreen && isDay) this.energy = min(100, this.energy + 0.5 + harvester * 0.22);
                if (inBlue && !isDay) this.energy = min(100, this.energy + 0.5 + harvester * 0.22);

                let harmReduction = resistant * 0.1;
                if (inGreen && !isDay) this.energy -= (0.18 - harmReduction);
                if (inBlue && isDay) this.energy -= (0.18 - harmReduction);
            }

            show() {
                push();
                translate(this.x, this.y);

                let coreSize = this.baseSize + this.modules.length * 0.5;

                fill(250, 204, 21);
                stroke(255, 255, 220);
                strokeWeight(2.5);
                circle(0, 0, coreSize);

                noStroke();
                fill(255, 255, 255, 95);
                circle(-coreSize * 0.17, -coreSize * 0.17, coreSize * 0.36);

                for (let m of this.modules) {
                    fill(m.color);
                    stroke(255, 255, 255, 30);
                    strokeWeight(1);
                    circle(m.offsetX, m.offsetY, 7);

                    noStroke();
                    fill(255, 255, 255, 75);
                    circle(m.offsetX - 1.5, m.offsetY - 1.5, 2.5);
                }

                pop();
            }
        }

        function resetSim() {
            creatures = [];
            for (let i = 0; i < 11; i++) {
                creatures.push(new Creature(random(width), random(height)));
            }
        }

        function mousePressed() {
            if (mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
                creatures.push(new Creature(mouseX, mouseY));
            }
        }
    </script>
</body>
</html>
