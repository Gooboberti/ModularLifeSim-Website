<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniSimmy2 • Vortex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-[#0a0a0f] text-[#e0e0ea]">
    <nav class="border-b border-white/10 bg-[#0a0a0f]/95 backdrop-blur sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-violet-400 to-indigo-500 flex items-center justify-center">
                    <i class="fa-solid fa-atom text-[#0a0a0f]"></i>
                </div>
                <div>
                    <span class="font-display text-2xl tracking-tighter">MiniSimmy2</span>
                    <span class="ml-2 text-xs px-2 py-0.5 rounded-full bg-violet-500/20 text-violet-400">Vortex v0.6</span>
                </div>
            </div>
            <div class="flex items-center gap-x-4 text-sm">
                <a href="minisimmy2-roadmap.html" class="hover:text-white">Roadmap</a>
                <a href="index.html" class="hover:text-white">Main Site</a>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 pt-6">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="font-display text-3xl tracking-tighter">MiniSimmy2 — Vortex</h1>
                <p class="text-white/60 text-sm">Vortex field • Day/Night flow reversal • Waste blooms • Food deposition</p>
            </div>
            <div class="flex items-center gap-x-4 text-sm">
                <div id="stats" class="font-mono px-4 py-1.5 bg-white/5 rounded-2xl text-xs flex gap-x-4"></div>
                <button onclick="resetSim()" class="px-4 py-1.5 bg-white/10 hover:bg-white/20 rounded-2xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-undo"></i> <span>Reset</span>
                </button>
            </div>
        </div>

        <div id="canvas-container" class="rounded-3xl overflow-hidden border border-white/10 shadow-2xl"></div>

        <div class="mt-3 text-xs text-white/50">
            White particles = vortex flow. Touching them feeds creatures. Vortex reverses direction at day/night transition. Black sphere = vortex center.
        </div>
    </div>

    <script>
        let creatures = [];
        let vortexParticles = [];
        let greenZone, blueZone;
        let timeOfDay = 0;
        let dayLength = 1600;
        let lastIsDay = true;
        let globalReproCooldown = 0;
        let centerX, centerY;

        function generateSciFiName() {
            const prefixes = ['Kael','Vex','Thorne','Zyl','Ryn','Syl','Drak','Nyx','Korr','Vael','Sylas','Myr','Zor'];
            const suffixes = ['-9','-12','ara','ith','on','yx','ar','en','os','ix','ael','or'];
            return prefixes[Math.floor(Math.random()*prefixes.length)] + suffixes[Math.floor(Math.random()*suffixes.length)];
        }

        function setup() {
            let canvas = createCanvas(920, 640);
            canvas.parent('canvas-container');

            centerX = width / 2;
            centerY = height / 2;

            greenZone = { x: 200, y: 320, r: 120, food: 140 };
            blueZone  = { x: 720, y: 320, r: 120, food: 140 };

            for (let i = 0; i < 9; i++) {
                creatures.push(new Creature(random(width), random(height)));
            }

            // Initial vortex particles
            for (let i = 0; i < 60; i++) {
                vortexParticles.push(new VortexParticle());
            }
        }

        function draw() {
            background(12, 14, 22);

            timeOfDay = (frameCount % dayLength) / dayLength;
            let isDay = timeOfDay < 0.5;

            // Detect day/night transition for vortex reversal
            if (isDay !== lastIsDay) {
                lastIsDay = isDay;
            }

            // Background tint
            if (isDay) fill(18, 35, 26, 25);
            else fill(12, 25, 42, 35);
            rect(0, 0, width, height);

            // Vortex strength (peaks at noon and midnight, zero at transitions)
            let vortexPhase = (timeOfDay + 0.25) % 1; // shift so peaks align with noon/midnight
            let vortexStrength = sin(vortexPhase * TWO_PI) * 0.5 + 0.5; // 0 to 1, peaks twice per cycle
            let vortexDir = isDay ? 1 : -1; // clockwise during day, counter-clockwise at night

            // Draw vortex field lines (subtle)
            stroke(255, 255, 255, 12);
            strokeWeight(1);
            noFill();
            for (let r = 80; r < 420; r += 55) {
                ellipse(centerX, centerY, r * 2, r * 2);
            }

            // Shiny black sphere at center
            fill(20, 22, 30);
            stroke(60, 65, 80);
            strokeWeight(3);
            circle(centerX, centerY, 22);
            // Highlight
            noStroke();
            fill(80, 85, 95, 60);
            circle(centerX - 5, centerY - 5, 8);

            // Update and draw vortex particles
            for (let i = vortexParticles.length - 1; i >= 0; i--) {
                let p = vortexParticles[i];
                p.update(vortexDir, vortexStrength);
                p.show();

                // Feed creatures on contact
                for (let c of creatures) {
                    if (dist(p.x, p.y, c.x, c.y) < 11) {
                        c.energy = min(100, c.energy + 2.2);
                        p.life = 0; // consume particle
                    }
                }

                if (p.life <= 0) {
                    vortexParticles.splice(i, 1);
                }
            }

            // Spawn new particles from perimeter
            if (frameCount % 3 === 0 && vortexParticles.length < 75) {
                vortexParticles.push(new VortexParticle(true));
            }

            // Draw zones
            fill(16, 185, 129, isDay ? 135 : 38);
            circle(greenZone.x, greenZone.y, greenZone.r * 2);
            fill(255); textAlign(CENTER); textSize(10);
            text(`GREEN ${Math.floor(greenZone.food)}`, greenZone.x, greenZone.y - greenZone.r - 9);

            fill(56, 189, 248, isDay ? 38 : 135);
            circle(blueZone.x, blueZone.y, blueZone.r * 2);
            fill(255);
            text(`BLUE ${Math.floor(blueZone.food)}`, blueZone.x, blueZone.y - blueZone.r - 9);

            // Global reproduction cooldown
            if (globalReproCooldown > 0) globalReproCooldown -= 0.5;

            // Update creatures
            for (let i = creatures.length - 1; i >= 0; i--) {
                let c = creatures[i];
                c.update(isDay, vortexDir, vortexStrength);

                // Reproduction
                if (c.energy > 80 && globalReproCooldown <= 0 && random() < 0.0065) {
                    let offspring = c.reproduce();
                    if (offspring) {
                        creatures.push(offspring);
                        globalReproCooldown = 15;
                        c.energy -= 16;
                    }
                }

                if (c.energy <= 0) {
                    creatures.splice(i, 1);
                } else {
                    c.show();
                }
            }

            // High population energy drain
            let pressure = Math.max(0, (creatures.length - 16) * 0.009);
            for (let c of creatures) {
                c.energy -= pressure;
            }

            updateStats();
        }

        function updateStats() {
            if (creatures.length === 0) return;
            let totalModules = 0;
            let predators = 0;
            for (let c of creatures) {
                totalModules += c.modules.length;
                if (c.isPredator) predators++;
            }
            let avg = (totalModules / creatures.length).toFixed(1);
            document.getElementById('stats').innerHTML = `
                <span>Pop: <span class="text-emerald-400">${creatures.length}</span></span>
                <span>Predators: <span class="text-red-400">${predators}</span></span>
                <span>Avg Modules: <span class="text-violet-400">${avg}</span></span>
            `;
        }

        class VortexParticle {
            constructor(fromEdge = false) {
                if (fromEdge) {
                    let angle = random(TWO_PI);
                    let distFromCenter = random(380, 520);
                    this.x = centerX + cos(angle) * distFromCenter;
                    this.y = centerY + sin(angle) * distFromCenter;
                } else {
                    this.x = random(width);
                    this.y = random(height);
                }
                this.life = random(80, 160);
                this.size = random(2.2, 3.4);
            }

            update(vortexDir, vortexStrength) {
                let dx = this.x - centerX;
                let dy = this.y - centerY;
                let distToCenter = sqrt(dx*dx + dy*dy);

                if (distToCenter < 12) {
                    this.life = 0;
                    return;
                }

                // Vortex force (clockwise or counter-clockwise)
                let tangentX = -dy;
                let tangentY = dx;
                let len = sqrt(tangentX*tangentX + tangentY*tangentY);
                if (len > 0) {
                    tangentX /= len;
                    tangentY /= len;
                }

                let vortexForce = 0.9 * vortexStrength * vortexDir;
                this.x += tangentX * vortexForce;
                this.y += tangentY * vortexForce;

                // Pull toward center
                let pull = 0.45 * vortexStrength;
                this.x += (centerX - this.x) * pull / (distToCenter + 10);
                this.y += (centerY - this.y) * pull / (distToCenter + 10);

                this.life -= 1;
            }

            show() {
                fill(255, 255, 255, map(this.life, 0, 120, 0, 180));
                noStroke();
                circle(this.x, this.y, this.size);
            }
        }

        class Creature {
            constructor(x, y, parentModules = null) {
                this.x = x;
                this.y = y;
                this.vx = random(-0.6, 0.6);
                this.vy = random(-0.6, 0.6);
                this.energy = parentModules ? 50 : 62 + random(14);
                this.name = generateSciFiName();
                this.isPredator = false;
                this.honey = 0;

                let types = ['harvester', 'sensor', 'mover', 'resistant'];
                let colors = { 'harvester': '#34d399', 'sensor': '#38bdf8', 'mover': '#a78bfa', 'resistant': '#f472b6' };

                if (parentModules) {
                    this.modules = parentModules.map(m => ({...m}));
                    if (random() < 0.5 && this.modules.length < 7) {
                        let newType = random(types);
                        let angle = random(TWO_PI);
                        let dist = random(6, 10);
                        this.modules.push({ type: newType, color: colors[newType], offsetX: cos(angle)*dist, offsetY: sin(angle)*dist });
                    }
                } else {
                    this.modules = [];
                    if (random() < 0.5) {
                        let type = random(types);
                        let angle = random(TWO_PI);
                        let dist = random(6, 10);
                        this.modules.push({ type: type, color: colors[type], offsetX: cos(angle)*dist, offsetY: sin(angle)*dist });
                    }
                }
            }

            getModuleCount(type) { return this.modules.filter(m => m.type === type).length; }

            reproduce() {
                return new Creature(this.x + random(-12,12), this.y + random(-12,12), this.modules);
            }

            update(isDay, vortexDir, vortexStrength) {
                if (!this.isPredator && this.energy < 15) this.isPredator = true;

                // Increased idle energy drain
                this.energy -= 0.038;

                if (this.isPredator) {
                    // Target weakest (standard creatures first, then other predators)
                    let target = null;
                    let lowest = Infinity;
                    let hasPrey = false;

                    for (let other of creatures) {
                        if (other === this) continue;
                        if (!other.isPredator && other.energy < lowest) {
                            lowest = other.energy;
                            target = other;
                            hasPrey = true;
                        }
                    }
                    if (!hasPrey) {
                        // No standard prey left — target other predators
                        for (let other of creatures) {
                            if (other === this || !other.isPredator) continue;
                            if (other.energy < lowest) {
                                lowest = other.energy;
                                target = other;
                            }
                        }
                    }

                    if (target) {
                        let d = dist(this.x, this.y, target.x, target.y);
                        if (d > 5 && d < 180) {
                            let dx = target.x - this.x;
                            let dy = target.y - this.y;
                            this.vx += (dx / d) * 0.15;
                            this.vy += (dy / d) * 0.15;
                        }
                        if (d < 12) {
                            let stolen = Math.min(2, target.modules.length);
                            for (let i = 0; i < stolen; i++) if (target.modules.length > 0) this.modules.push(target.modules.pop());
                            this.energy = 90;
                            target.energy = 0;
                        }
                    }
                } else {
                    // Normal creatures + vortex influence
                    let target = isDay ? greenZone : blueZone;
                    let dx = target.x - this.x;
                    let dy = target.y - this.y;
                    let d = dist(this.x, this.y, target.x, target.y);

                    if (d > 7 && target.food > 2) {
                        this.vx += (dx / d) * 0.055;
                        this.vy += (dy / d) * 0.055;
                    }

                    // Wandering / exploration when not near food
                    if (d > 120) {
                        this.vx += random(-0.8, 0.8) * 0.6;
                        this.vy += random(-0.8, 0.8) * 0.6;
                    }

                    // Food deposition motivation
                    if (this.honey > 9 && random() < 0.006) {
                        this.honey -= 8;
                        // Create temporary food patch
                        if (random() < 0.5) {
                            greenZone.food = min(220, greenZone.food + 14);
                        } else {
                            blueZone.food = min(220, blueZone.food + 14);
                        }
                    }
                }

                // Apply movement
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.89;
                this.vy *= 0.89;
                this.x = constrain(this.x, 14, width-14);
                this.y = constrain(this.y, 14, height-14);

                // Zone feeding
                let inGreen = dist(this.x, this.y, greenZone.x, greenZone.y) < greenZone.r;
                let inBlue = dist(this.x, this.y, blueZone.x, blueZone.y) < blueZone.r;

                if (inGreen && isDay && greenZone.food > 0) {
                    let gain = 0.4 + this.getModuleCount('harvester') * 0.16;
                    this.energy = min(100, this.energy + gain);
                    greenZone.food = max(0, greenZone.food - 0.65);
                    if (this.energy > 88) this.honey = min(20, this.honey + 0.45);
                }
                if (inBlue && !isDay && blueZone.food > 0) {
                    let gain = 0.4 + this.getModuleCount('harvester') * 0.16;
                    this.energy = min(100, this.energy + gain);
                    blueZone.food = max(0, blueZone.food - 0.65);
                    if (this.energy > 88) this.honey = min(20, this.honey + 0.45);
                }
            }

            show() {
                push();
                translate(this.x, this.y);

                let coreSize = 10.5 + this.modules.length * 0.32;
                if (this.isPredator) {
                    fill(248, 113, 113);
                    stroke(255, 180, 180);
                } else {
                    fill(250, 204, 21);
                    stroke(255, 255, 220);
                }
                strokeWeight(2);
                circle(0, 0, coreSize);

                noStroke();
                fill(255, 255, 255, 80);
                circle(-coreSize * 0.17, -coreSize * 0.17, coreSize * 0.3);

                if (this.honey > 3) {
                    fill(245, 158, 11, 200);
                    circle(6, -6, 4.5 + this.honey * 0.1);
                }

                fill(255, 255, 255, 190);
                textAlign(CENTER);
                textSize(7);
                text(this.name, 0, -coreSize - 4);

                for (let m of this.modules) {
                    fill(m.color);
                    stroke(255, 255, 255, 18);
                    strokeWeight(0.6);
                    circle(m.offsetX, m.offsetY, 5.5);
                }

                pop();
            }
        }

        function resetSim() {
            creatures = [];
            vortexParticles = [];
            greenZone.food = 140;
            blueZone.food = 140;
            globalReproCooldown = 0;
            for (let i = 0; i < 9; i++) {
                creatures.push(new Creature(random(width), random(height)));
            }
            for (let i = 0; i < 55; i++) {
                vortexParticles.push(new VortexParticle());
            }
        }
    </script>
</body>
</html>
