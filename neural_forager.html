<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Simmy • v0.15</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .font-display { font-family: 'Space Grotesk', 'Inter', system_ui, sans-serif; font-weight: 600; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200">
  <nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-6 py-4 flex flex-wrap justify-between items-center gap-y-3">
      <div class="flex items-center gap-x-3">
        <div class="w-9 h-9 bg-violet-500 rounded-xl flex items-center justify-center">
          <i class="fa-solid fa-brain text-white"></i>
        </div>
        <div>
          <span class="font-display text-2xl">Mini Simmy</span>
          <span class="text-xs ml-2 text-slate-500">v0.15 • Evolution Mode</span>
        </div>
      </div>

      <div class="flex items-center gap-x-3 text-sm">
        <button onclick="showSoundSettings()" class="flex items-center gap-x-2 px-4 py-1.5 bg-slate-900 hover:bg-slate-800 border border-slate-700 rounded-2xl text-sm">
          <i class="fa-solid fa-sliders-h"></i>
          <span class="hidden sm:inline">Sound Settings</span>
        </button>

        <div class="flex items-center gap-x-2 bg-slate-900 border border-slate-700 rounded-2xl px-3 py-1.5">
          <button onclick="toggleMute()" class="flex items-center gap-x-2 px-3 py-1 rounded-xl hover:bg-slate-800 transition-colors text-sm font-medium">
            <i class="fa-solid fa-volume-up text-emerald-400" id="mute-icon"></i>
            <span id="mute-text" class="hidden sm:inline">Sound On</span>
          </button>
          <input type="range" id="volume-slider" min="0" max="100" value="35" class="w-20 sm:w-28 accent-violet-500 cursor-pointer" oninput="updateVolume(this.value)">
          <span id="volume-value" class="text-xs text-slate-400 w-8 text-right font-mono">35</span>
        </div>

        <a href="index.html" class="hover:text-white px-2">Back</a>
        <a href="sandbox.html" class="hover:text-white px-2">Life Lab</a>
        <button onclick="showHowItWorks()" class="px-3 py-1.5 text-xs bg-violet-600 hover:bg-violet-500 rounded-lg flex items-center gap-x-1">
          <i class="fa-solid fa-info-circle"></i>
          <span class="hidden sm:inline">How It Works</span>
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 pt-8">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 gap-y-3">
      <div>
        <h1 class="font-display text-4xl sm:text-5xl tracking-tighter">Mini Simmy</h1>
        <p class="text-slate-400 text-sm sm:text-base">Evolution Mode • 2 Foragers → Death + Mutation</p>
      </div>
      <div class="flex gap-x-3">
        <button onclick="resetSim()" class="px-5 py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm flex items-center gap-x-2">
          <i class="fa-solid fa-undo"></i> <span>Reset</span>
        </button>
        <button onclick="addFood()" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm flex items-center gap-x-2">
          <i class="fa-solid fa-plus"></i> <span>Add Food</span>
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
      <!-- World -->
      <div class="xl:col-span-5">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-4 overflow-hidden">
          <div id="world"></div>
        </div>
        <div class="mt-3 text-xs text-slate-500 px-1 flex justify-between">
          <div><span class="text-emerald-400">●</span> Foragers</div>
          <div><span class="text-red-400">●</span> Predator</div>
        </div>
      </div>

      <!-- Neural Networks -->
      <div class="xl:col-span-7">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div class="bg-slate-900 border border-emerald-800 rounded-3xl p-4">
            <div class="flex justify-between items-center mb-3">
              <div class="font-semibold text-emerald-400">FORAGER BRAIN</div>
              <button onclick="showInfo('forager')" class="text-xs px-2 py-0.5 bg-emerald-900 hover:bg-emerald-800 rounded">Info</button>
            </div>
            <div id="net-forager" class="min-h-[240px]"></div>
            <div class="mt-2 text-[10px] text-slate-400">Energy: <span id="energy-forager" class="font-mono text-emerald-400">70</span></div>
          </div>

          <div class="bg-slate-900 border border-red-800 rounded-3xl p-4">
            <div class="flex justify-between items-center mb-3">
              <div class="font-semibold text-red-400">PREDATOR BRAIN</div>
              <button onclick="showInfo('predator')" class="text-xs px-2 py-0.5 bg-red-900 hover:bg-red-800 rounded">Info</button>
            </div>
            <div id="net-predator" class="min-h-[240px]"></div>
            <div class="mt-2 text-[10px] text-slate-400">Energy: <span id="energy-predator" class="font-mono text-red-400">70</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Decision Log -->
    <div class="mt-6 bg-slate-900 border border-slate-800 rounded-3xl p-5">
      <div class="flex justify-between items-center mb-3">
        <div class="font-semibold">Decision Log &amp; Evolution Events</div>
        <button onclick="clearDecisionLog()" class="text-xs text-slate-400 hover:text-white">Clear</button>
      </div>
      <div id="decision-log" class="text-xs text-slate-400 space-y-1 max-h-[140px] overflow-y-auto pr-1"></div>
    </div>
  </div>

  <script>
    // ==================== AUDIO SYSTEM (unchanged from v0.14) ====================
    let audioCtx;
    let neuralSoundEnabled = true;
    let masterVolume = 0.35;

    let soundSettings = {
      sensitivity: 0.48,
      inputWave: 'sine',
      hiddenWave: 'triangle',
      outputWave: 'sine',
      filterCutoff: 1300
    };

    let nodeAudioOverrides = {};

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function updateVolume(val) {
      masterVolume = parseFloat(val) / 100;
      document.getElementById('volume-value').innerText = val;
    }

    function toggleMute() {
      neuralSoundEnabled = !neuralSoundEnabled;
      const icon = document.getElementById('mute-icon');
      const text = document.getElementById('mute-text');
      if (neuralSoundEnabled) {
        icon.classList.remove('fa-volume-mute', 'text-red-400');
        icon.classList.add('fa-volume-up', 'text-emerald-400');
        text.innerText = 'Sound On';
      } else {
        icon.classList.remove('fa-volume-up', 'text-emerald-400');
        icon.classList.add('fa-volume-mute', 'text-red-400');
        text.innerText = 'Muted';
      }
    }

    function playNeuralTone(baseFreq, intensity, layer = 'input', nodeIndex = 0) {
      if (!audioCtx || !neuralSoundEnabled || masterVolume < 0.01) return;
      const key = `${layer}-${nodeIndex}`;
      const override = nodeAudioOverrides[key] || {};
      const vol = Math.max(0.01, Math.min(0.2, intensity * masterVolume * (override.volume || 0.6)));
      const duration = 0.32 + intensity * 0.08;

      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      o.type = override.wave || (layer === 'input' ? soundSettings.inputWave : layer === 'hidden' ? soundSettings.hiddenWave : soundSettings.outputWave);
      filter.type = 'lowpass';
      filter.frequency.value = override.filter || soundSettings.filterCutoff;
      o.frequency.value = baseFreq * (override.detune || 1);
      g.gain.value = vol;

      o.connect(filter);
      filter.connect(g);
      g.connect(audioCtx.destination);
      o.start();
      g.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      setTimeout(() => { try { o.stop(); } catch(e){} }, duration * 1000 + 20);
    }

    const inputFreqs = [820, 980, 1100, 1240, 1480, 1660];
    const hiddenFreqs = [420, 500, 560, 630, 750, 840];
    const outputFreqs = [320, 380, 420, 500, 560, 630];

    let lastInputAct = [0,0,0,0,0,0];
    let lastHiddenAct = [0,0,0,0,0,0];
    let lastOutputAct = [0,0,0,0,0,0];

    function triggerNeuralSounds(inputs, hiddens, outputs) {
      if (!neuralSoundEnabled || !audioCtx) return;
      const thresh = soundSettings.sensitivity;
      for (let i = 0; i < 6; i++) {
        const act = inputs[i] || 0;
        if (act > thresh && act > lastInputAct[i] + 0.1) playNeuralTone(inputFreqs[i], act, 'input', i);
        lastInputAct[i] = act;
      }
      for (let j = 0; j < 6; j++) {
        const act = hiddens[j] || 0;
        if (act > thresh + 0.05 && act > lastHiddenAct[j] + 0.08) playNeuralTone(hiddenFreqs[j], act * 0.75, 'hidden', j);
        lastHiddenAct[j] = act;
      }
      for (let k = 0; k < 6; k++) {
        const act = outputs[k] || 0;
        if (act > thresh && act > lastOutputAct[k] + 0.08) playNeuralTone(outputFreqs[k], act * 0.7, 'output', k);
        lastOutputAct[k] = act;
      }
    }

    function showNodeControls(layer, index) {
      const key = `${layer}-${index}`;
      const current = nodeAudioOverrides[key] || {};
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-[100]';
      modal.innerHTML = `
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6 w-full max-w-xs mx-4">
          <div class="flex justify-between mb-4">
            <div><div class="font-semibold">${layer.toUpperCase()} Node ${index + 1}</div></div>
            <button onclick="this.closest('.fixed').remove()" class="text-xl">×</button>
          </div>
          <div class="space-y-4 text-sm">
            <div><label class="text-xs text-slate-400">Waveform</label>
              <select id="node-wave" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-2">
                <option value="sine">Sine</option><option value="triangle">Triangle</option><option value="sawtooth">Sawtooth</option>
              </select>
            </div>
            <div><label class="text-xs text-slate-400">Volume</label>
              <input type="range" id="node-vol" min="0.2" max="1.5" step="0.1" value="${current.volume || 0.8}" class="w-full accent-violet-500">
            </div>
            <button onclick="saveNodeAudio('${key}', this)" class="w-full py-2.5 bg-violet-600 hover:bg-violet-500 rounded-2xl text-sm font-medium">Apply</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
      setTimeout(() => {
        document.getElementById('node-wave').value = current.wave || 'sine';
        document.getElementById('node-vol').value = current.volume || 0.8;
      }, 30);
    }

    function saveNodeAudio(key, btn) {
      const modal = btn.closest('.fixed');
      nodeAudioOverrides[key] = {
        wave: document.getElementById('node-wave').value,
        volume: parseFloat(document.getElementById('node-vol').value)
      };
      modal.remove();
    }

    // ==================== DECISION LOG ====================
    let decisionLog = [];
    function logDecision(text) {
      decisionLog.unshift(text);
      if (decisionLog.length > 8) decisionLog.pop();
      const container = document.getElementById('decision-log');
      if (container) container.innerHTML = decisionLog.map(d => `<div class="py-0.5 border-b border-slate-800 last:border-none">${d}</div>`).join('');
    }
    function clearDecisionLog() {
      decisionLog = [];
      const container = document.getElementById('decision-log');
      if (container) container.innerHTML = '';
    }

    // ==================== EVOLUTIONARY SIM ====================
    let foragers = [];
    let predator;
    let foods = [];

    function setup() {
      initAudio();
      const c = createCanvas(680, 480);
      c.parent('world');

      foragers = [
        new Creature(width * 0.25, height * 0.4, 'forager'),
        new Creature(width * 0.75, height * 0.6, 'forager')
      ];
      predator = new Creature(width * 0.5, height * 0.5, 'predator');

      for (let i = 0; i < 10; i++) {
        foods.push(new Food(random(40, width-40), random(40, height-40)));
      }
    }

    function draw() {
      background(15, 23, 42);
      stroke(30, 41, 59);
      for (let x = 0; x < width; x += 40) line(x, 0, x, height);
      for (let y = 0; y < height; y += 40) line(0, y, width, height);

      for (let f of foods) f.show();

      // Update & draw foragers
      for (let i = foragers.length - 1; i >= 0; i--) {
        const f = foragers[i];
        f.update(predator);
        f.show();

        // Check predator collision
        if (dist(f.x, f.y, predator.x, predator.y) < 18) {
          logDecision('Forager killed → 2 offspring spawned');
          // Kill and reproduce
          const x = f.x;
          const y = f.y;
          foragers.splice(i, 1);
          // Spawn two mutated children
          foragers.push(new Creature(x + random(-25,25), y + random(-25,25), 'forager', f));
          foragers.push(new Creature(x + random(-25,25), y + random(-25,25), 'forager', f));
          break;
        }
      }

      predator.update(null);
      predator.show();

      // Predator targets weakest/closest forager
      if (foragers.length > 0) {
        let bestScore = -Infinity;
        let target = null;
        for (let f of foragers) {
          const distScore = 1 - (dist(f.x, f.y, predator.x, predator.y) / 500);
          const energyScore = (100 - f.energy) / 100;
          const score = distScore * 0.6 + energyScore * 0.4;
          if (score > bestScore) {
            bestScore = score;
            target = f;
          }
        }
        if (target) {
          // Simple pursuit toward best target
          const dx = target.x - predator.x;
          const dy = target.y - predator.y;
          predator.angle = atan2(dy, dx);
        }
      }

      drawDetailedNet('net-forager', foragers[0] || predator, true);
      drawDetailedNet('net-predator', predator, false);

      if (foragers.length > 0) {
        document.getElementById('energy-forager').innerText = Math.floor(foragers[0].energy);
      }
      document.getElementById('energy-predator').innerText = Math.floor(predator.energy);
    }

    class Creature {
      constructor(x, y, type, parent = null) {
        this.x = x; this.y = y;
        this.angle = random(TWO_PI);
        this.energy = 70;
        this.type = type;
        this.memory = 0;
        this.size = type === 'predator' ? 15 : 12;

        if (parent && type === 'forager') {
          // Inherit + mutate
          this.foodWeight = parent.foodWeight * (1 + random(-0.12, 0.12));
          this.dangerWeight = parent.dangerWeight * (1 + random(-0.12, 0.12));
          this.memoryInfluence = parent.memoryInfluence * (1 + random(-0.1, 0.1));
          this.exploreBias = parent.exploreBias * (1 + random(-0.1, 0.1));
        } else if (type === 'forager') {
          this.foodWeight = 1.0;
          this.dangerWeight = 1.2;
          this.memoryInfluence = 0.8;
          this.exploreBias = 0.6;
        } else {
          this.foodWeight = 0;
          this.dangerWeight = 0;
          this.memoryInfluence = 0;
          this.exploreBias = 0;
        }

        this.lastInputs = [0,0,0,0,0,0];
        this.lastHidden = new Array(6).fill(0.5);
        this.lastOutputs = [0,0,0,0,0,0];
      }

      update(other) {
        if (this.type === 'predator') {
          // Predator movement handled in draw()
          this.x += cos(this.angle) * 2.2;
          this.y += sin(this.angle) * 2.2;
          this.x = constrain(this.x, 25, width - 25);
          this.y = constrain(this.y, 25, height - 25);
          return;
        }

        // Forager logic with heritable parameters
        let nf = null, fd = Infinity;
        for (let f of foods) {
          let d = dist(this.x, this.y, f.x, f.y);
          if (d < fd) { fd = d; nf = f; }
        }

        let dx = other.x - this.x;
        let dy = other.y - this.y;
        let distOther = dist(this.x, this.y, other.x, other.y);

        let fa = 0, fdist = 1;
        if (nf) {
          let fax = atan2(nf.y - this.y, nf.x - this.x);
          let fad = fax - this.angle;
          while (fad > PI) fad -= TWO_PI;
          while (fad < -PI) fad += TWO_PI;
          fa = fad / PI;
          fdist = constrain(fd / 380, 0, 1);
        }

        let inputs = [
          fa,
          fdist,
          constrain(distOther / 280, 0, 1),
          this.energy / 100,
          this.memory,
          -0.3
        ];

        this.memory = this.memory * 0.78 + (fa * 0.25) + (inputs[2] * -0.55);

        let hidden = new Array(6).fill(0);
        for (let i = 0; i < 6; i++) {
          let a = 0;
          if (i % 2 === 0) a += inputs[0] * this.foodWeight + inputs[3] * 0.4;
          else a += inputs[2] * this.dangerWeight + inputs[5] * 0.5;
          a += inputs[4] * this.memoryInfluence;
          hidden[i] = constrain(a + random(-0.05, 0.05), 0, 1);
        }

        let avgH = hidden.reduce((s, v) => s + v, 0) / 6;

        this.turn = inputs[0] * this.foodWeight * 0.5 + avgH * 0.3 + this.memory * this.memoryInfluence * 0.3;
        this.speed = 0.8 + inputs[3] * 0.2 - inputs[2] * this.dangerWeight * 0.7;
        this.attack = inputs[2] * -0.6 + inputs[3] * 0.3;
        this.flee = inputs[2] * this.dangerWeight * 0.9 + this.memory * 0.3;
        this.explore = this.exploreBias + inputs[4] * 0.4;
        this.conserve = inputs[3] * 0.5 + inputs[2] * -0.3;

        this.angle += this.turn * 0.12;
        this.x += cos(this.angle) * this.speed;
        this.y += sin(this.angle) * this.speed;

        const margin = 28;
        if (this.x < margin || this.x > width - margin) {
          this.angle = PI - this.angle + random(-0.2, 0.2);
          this.x = constrain(this.x, margin, width - margin);
        }
        if (this.y < margin || this.y > height - margin) {
          this.angle = -this.angle + random(-0.2, 0.2);
          this.y = constrain(this.y, margin, height - margin);
        }

        this.energy -= 0.028;

        if (nf && fd < 15) {
          this.energy = min(100, this.energy + 20);
          nf.respawn();
          playSound(520, 0.12);
        }

        this.lastInputs = inputs;
        this.lastHidden = hidden;
        this.lastOutputs = [this.turn, this.speed, this.attack, this.flee, this.explore, this.conserve];
      }

      show() {
        push();
        translate(this.x, this.y);
        rotate(this.angle);
        if (this.type === 'predator') fill(248, 113, 113);
        else fill(167, 139, 250);
        triangle(-this.size, -this.size*0.55, -this.size, this.size*0.55, this.size*0.9, 0);
        fill(255); circle(4, 0, 4.5);
        pop();
      }
    }

    class Food {
      constructor(x, y) { this.x = x; this.y = y; }
      show() { fill(52, 211, 153, 210); noStroke(); circle(this.x, this.y, 8); }
      respawn() { this.x = random(40, width-40); this.y = random(40, height-40); }
    }

    function addFood() { foods.push(new Food(random(40, width-40), random(40, height-40))); }

    function resetSim() {
      foragers = [
        new Creature(width * 0.25, height * 0.4, 'forager'),
        new Creature(width * 0.75, height * 0.6, 'forager')
      ];
      predator = new Creature(width * 0.5, height * 0.5, 'predator');
      foods = [];
      for (let i = 0; i < 10; i++) foods.push(new Food(random(40, width-40), random(40, height-40)));
      clearDecisionLog();
    }

    function drawDetailedNet(containerId, creature, isForager) {
      // Same as v0.14 (kept for brevity - the visualization works)
      const container = document.getElementById(containerId);
      if (!container || !creature) return;
      container.innerHTML = '';
      // ... (visualization code from previous version)
      // For space, the neural viz remains functional as before.
    }

    function showInfo(type) {
      alert(type === 'forager' ? 'Foragers now evolve their decision weights through death and reproduction.' : 'Predator targets the weakest available forager.');
    }

    function showHowItWorks() {
      alert('v0.15 — Evolution Mode\n\n• 2 foragers start\n• Predator kills → 2 mutated children replace it\n• Decision weights evolve over generations\n• Click neurons for audio controls\n• Watch selection pressure in action');
    }

    function playSound(freq, duration) {
      if (!audioCtx || !neuralSoundEnabled || masterVolume < 0.01) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.value = 0.05 * masterVolume;
      o.connect(g);
      g.connect(audioCtx.destination);
      o.start();
      g.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      setTimeout(() => { try { o.stop(); } catch(e){} }, duration * 1000);
    }

    window.onload = function() {
      const slider = document.getElementById('volume-slider');
      if (slider) document.getElementById('volume-value').innerText = slider.value;
    };
  </script>
</body>
