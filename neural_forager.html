<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Forager • Modular Life Sim</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .font-display { font-family: 'Space Grotesk', 'Inter', system_ui, sans-serif; font-weight: 600; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200">
  <nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-screen-xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-x-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-400 to-purple-400 flex items-center justify-center">
          <i class="fa-solid fa-brain text-slate-950"></i>
        </div>
        <div>
          <span class="font-display text-2xl tracking-tighter">Neural Forager</span>
          <span class="ml-2 text-xs text-slate-500">v0.3 • Closer to Main Sim</span>
        </div>
      </div>
      <div class="flex items-center gap-x-3">
        <a href="index.html" class="text-sm px-3 py-1.5 hover:text-white">Back</a>
        <a href="sandbox.html" class="text-sm px-3 py-1.5 hover:text-white">Life Lab</a>
        <button onclick="showInfo()" class="px-4 py-1.5 text-sm bg-violet-600 hover:bg-violet-500 rounded-xl flex items-center gap-x-2">
          <i class="fa-solid fa-info-circle"></i>
          <span>Architecture</span>
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-screen-2xl mx-auto px-6 pt-8">
    <div class="flex justify-between items-end mb-6">
      <div>
        <h1 class="font-display text-5xl tracking-tighter">Neural Forager</h1>
        <p class="text-slate-400">3 creatures with parallel pathways + recurrent memory</p>
      </div>
      <div class="flex gap-x-3">
        <button onclick="resetSim()" class="px-5 py-2 rounded-2xl bg-slate-800 hover:bg-slate-700 text-sm flex items-center gap-x-2">
          <i class="fa-solid fa-undo"></i> <span>Reset</span>
        </button>
        <button onclick="addFood()" class="px-5 py-2 rounded-2xl bg-emerald-600 hover:bg-emerald-500 text-sm flex items-center gap-x-2">
          <i class="fa-solid fa-plus"></i> <span>Add Food</span>
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
      <!-- World -->
      <div class="xl:col-span-7">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-4">
          <div id="world"></div>
        </div>
      </div>

      <!-- Neural Net -->
      <div class="xl:col-span-5">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-5">
          <div class="font-semibold mb-1">LIVE NEURAL NETWORK</div>
          <div class="text-xs text-slate-400 mb-4">Inputs → Parallel Pathways + Recurrent Memory → Outputs</div>
          <div id="net-viz" class="flex justify-center"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let creatures = [];
    let foods = [];
    let dangers = [];

    let inputs = [0,0,0,0];
    let hidden = new Array(8).fill(0);
    let outputs = [0,0];
    let memory = 0;

    function setup() {
      let c = createCanvas(720, 520);
      c.parent('world');

      for (let i = 0; i < 3; i++) {
        creatures.push(new Creature(random(width), random(height)));
      }
      for (let i = 0; i < 15; i++) foods.push(new Food(random(40, width-40), random(40, height-40)));
      for (let i = 0; i < 5; i++) dangers.push(new Danger(random(80, width-80), random(80, height-80)));
    }

    function draw() {
      background(15, 23, 42);
      stroke(30,41,59);
      for (let x = 0; x < width; x += 40) line(x, 0, x, height);
      for (let y = 0; y < height; y += 40) line(0, y, width, y);

      for (let d of dangers) d.show();
      for (let f of foods) f.show();

      for (let c of creatures) {
        c.update();
        c.show();
      }

      if (creatures.length > 0) updateNetViz(creatures[0]);
    }

    class Creature {
      constructor(x, y) {
        this.x = x; this.y = y;
        this.angle = random(TWO_PI);
        this.energy = 70 + random(15);
        this.memory = 0;
      }

      update() {
        let nf = null, nd = null, fd = Infinity, dd = Infinity;
        for (let f of foods) { let d = dist(this.x, this.y, f.x, f.y); if (d < fd) { fd = d; nf = f; } }
        for (let d of dangers) { let distd = dist(this.x, this.y, d.x, d.y); if (distd < dd) { dd = distd; nd = d; } }

        let fa = 0, fdist = 1, en = this.energy / 100, ddist = 1;
        if (nf) {
          let dx = nf.x - this.x, dy = nf.y - this.y;
          let ta = atan2(dy, dx);
          let ad = ta - this.angle;
          while (ad > PI) ad -= TWO_PI; while (ad < -PI) ad += TWO_PI;
          fa = ad / PI;
          fdist = constrain(fd / 380, 0, 1);
        }
        if (nd) ddist = constrain(dd / 200, 0, 1);

        inputs = [fa, fdist, en, ddist];

        // Recurrent memory
        this.memory = this.memory * 0.8 + (fa * 0.3) + (ddist * -0.45);

        // Hidden layer (parallel pathways + memory)
        for (let i = 0; i < 8; i++) {
          let a = 0;
          if (i % 2 === 0) a += fa * 0.9 + en * 0.4;        // Pathway A
          else a += fdist * 1.05 + ddist * 0.65;            // Pathway B
          a += this.memory * 0.5;
          hidden[i] = constrain(a + random(-0.08, 0.08), 0, 1);
        }

        let avgH = hidden.reduce((s, v) => s + v, 0) / 8;

        // Outputs
        outputs[0] = constrain(fa * 0.7 + avgH * 0.35 + this.memory * 0.4, -1, 1);
        outputs[1] = constrain(0.65 + en * 0.35 - ddist * 0.8, 0, 1);

        // Movement
        this.angle += outputs[0] * 0.14;
        let spd = 1.4 + outputs[1] * 1.1;
        this.x += cos(this.angle) * spd;
        this.y += sin(this.angle) * spd;

        this.x = constrain(this.x, 25, width - 25);
        this.y = constrain(this.y, 25, height - 25);
        this.energy -= 0.026;

        // Eat
        if (nf && fd < 16) {
          this.energy = min(100, this.energy + 22);
          nf.respawn();
        }
        // React to danger
        if (nd && dd < 14) {
          this.energy = max(15, this.energy - 10);
          this.angle += PI * 0.7;
        }
      }

      show() {
        push();
        translate(this.x, this.y);
        rotate(this.angle);
        fill(167, 139, 250);
        triangle(-12, -7, -12, 7, 11, 0);
        fill(255); circle(4, 0, 5);
        pop();
      }
    }

    class Food {
      constructor(x, y) { this.x = x; this.y = y; }
      show() { fill(52, 211, 153, 210); noStroke(); circle(this.x, this.y, 8); }
      respawn() { this.x = random(40, width-40); this.y = random(40, height-40); }
    }

    class Danger {
      constructor(x, y) { this.x = x; this.y = y; }
      show() { fill(248, 113, 113, 180); noStroke(); circle(this.x, this.y, 11); fill(185, 28, 28); circle(this.x, this.y, 5); }
    }

    function addFood() { foods.push(new Food(random(40, width-40), random(40, height-40))); }
    function resetSim() {
      creatures = []; foods = []; dangers = [];
      for (let i = 0; i < 3; i++) creatures.push(new Creature(random(width), random(height)));
      for (let i = 0; i < 15; i++) foods.push(new Food(random(40, width-40), random(40, height-40)));
      for (let i = 0; i < 5; i++) dangers.push(new Danger(random(80, width-80), random(80, height-80)));
    }

    function updateNetViz(c) {
      memory = memory * 0.82 + (inputs[0] * 0.28) + (inputs[3] * -0.4);

      for (let i = 0; i < 8; i++) {
        let a = 0;
        if (i % 2 === 0) a += inputs[0] * 0.88 + inputs[2] * 0.38;
        else a += inputs[1] * 1.05 + inputs[3] * 0.6;
        a += memory * 0.5;
        hidden[i] = constrain(a + random(-0.07, 0.07), 0, 1);
      }

      let avg = hidden.reduce((s, v) => s + v, 0) / 8;
      outputs[0] = constrain(inputs[0] * 0.72 + avg * 0.32 + memory * 0.38, -1, 1);
      outputs[1] = constrain(0.62 + inputs[2] * 0.38 - inputs[3] * 0.7, 0, 1);

      drawNet();
    }

    function drawNet() {
      let el = document.getElementById('net-viz');
      el.innerHTML = '';

      let svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("width", "370");
      svg.setAttribute("height", "280");
      svg.setAttribute("viewBox", "0 0 370 280");

      const ix = 50, hx = 165, ox = 290;
      const iy = [65, 120, 175, 230];
      const hy = [35, 68, 101, 134, 167, 200, 233, 266];
      const oy = [90, 190];

      // Recurrent memory (dashed)
      for (let j = 0; j < 8; j++) {
        let l = document.createElementNS("http://www.w3.org/2000/svg", "line");
        l.setAttribute("x1", hx); l.setAttribute("y1", hy[j]);
        l.setAttribute("x2", hx + 22); l.setAttribute("y2", hy[j]);
        l.setAttribute("stroke", `rgba(167,139,250,${memory * 0.75})`);
        l.setAttribute("stroke-width", memory * 2.8 + 1);
        l.setAttribute("stroke-dasharray", "3 3");
        svg.appendChild(l);
      }

      // Connections
      for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 8; j++) {
          let l = document.createElementNS("http://www.w3.org/2000/svg", "line");
          l.setAttribute("x1", ix); l.setAttribute("y1", iy[i]);
          l.setAttribute("x2", hx); l.setAttribute("y2", hy[j]);
          let w = hidden[j] * 0.6 + 0.3;
          let col = (j % 2 === 0) ? "167,139,250" : "129,140,248";
          l.setAttribute("stroke", `rgba(${col}, ${w * 0.9})`);
          l.setAttribute("stroke-width", w * 2.1);
          svg.appendChild(l);
        }
      }

      for (let j = 0; j < 8; j++) {
        for (let k = 0; k < 2; k++) {
          let l = document.createElementNS("http://www.w3.org/2000/svg", "line");
          l.setAttribute("x1", hx); l.setAttribute("y1", hy[j]);
          l.setAttribute("x2", ox); l.setAttribute("y2", oy[k]);
          let w = hidden[j] * 0.55 + 0.35;
          l.setAttribute("stroke", `rgba(167,139,250, ${w * 0.95})`);
          l.setAttribute("stroke-width", w * 2.3);
          svg.appendChild(l);
        }
      }

      // Neurons
      for (let i = 0; i < 4; i++) {
        let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", ix); c.setAttribute("cy", iy[i]); c.setAttribute("r", 11);
        c.setAttribute("fill", "#475569"); c.setAttribute("stroke", "#94a3b8"); c.setAttribute("stroke-width", "2");
        svg.appendChild(c);
      }

      for (let j = 0; j < 8; j++) {
        let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", hx); c.setAttribute("cy", hy[j]); c.setAttribute("r", 10);
        c.setAttribute("fill", "#475569"); c.setAttribute("stroke", "#94a3b8"); c.setAttribute("stroke-width", "2");
        svg.appendChild(c);
      }

      for (let k = 0; k < 2; k++) {
        let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", ox); c.setAttribute("cy", oy[k]); c.setAttribute("r", 12);
        c.setAttribute("fill", "#475569"); c.setAttribute("stroke", "#94a3b8"); c.setAttribute("stroke-width", "2");
        svg.appendChild(c);
      }

      document.getElementById('net-viz').appendChild(svg);
    }

    function showInfo() {
      alert("Main sim uses: Structural Evolution + Parallel Pathways (A/B) + Recurrent Memory + Emotional Sensitivities.\n\nThis demo approximates parallel pathways + recurrent memory with 8 hidden neurons.");
    }
  </script>
</body>
</html>
