<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Simmy • v0.24</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .font-display { font-family: 'Space Grotesk', 'Inter', system_ui, sans-serif; font-weight: 600; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200">
  <nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-x-3">
        <div class="w-9 h-9 bg-violet-500 rounded-xl flex items-center justify-center">
          <i class="fa-solid fa-brain text-white"></i>
        </div>
        <div>
          <span class="font-display text-2xl">Mini Simmy</span>
          <span class="text-xs ml-2 text-slate-500">v0.24 • Fixed Rendering</span>
        </div>
      </div>

      <div class="flex items-center gap-x-3 text-sm">
        <button onclick="showAudioPanel()" class="flex items-center gap-x-2 px-4 py-1.5 bg-slate-900 hover:bg-slate-800 border border-slate-700 rounded-2xl text-sm">
          <i class="fa-solid fa-sliders-h"></i>
          <span>Audio Panel</span>
        </button>

        <div class="flex items-center gap-x-2 bg-slate-900 border border-slate-700 rounded-2xl px-3 py-1.5">
          <button onclick="toggleMute()" class="flex items-center gap-x-2 px-3 py-1 rounded-xl hover:bg-slate-800 transition-colors text-sm font-medium">
            <i class="fa-solid fa-volume-up text-emerald-400" id="mute-icon"></i>
            <span id="mute-text" class="hidden sm:inline">Sound On</span>
          </button>
          <input type="range" id="volume-slider" min="0" max="100" value="3" class="w-20 accent-violet-500 cursor-pointer" oninput="updateVolume(this.value)">
          <span id="volume-value" class="text-xs text-slate-400 w-8 text-right font-mono">3</span>
        </div>

        <a href="index.html" class="hover:text-white px-2">Back</a>
        <button onclick="resetSim()" class="px-4 py-1.5 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm flex items-center gap-x-2">
          <i class="fa-solid fa-undo"></i> <span>Reset</span>
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 pt-6">
    <div class="flex justify-between items-center mb-4 px-1 text-sm">
      <div class="flex items-center gap-x-6">
        <div><span class="text-slate-400">Time:</span> <span id="running-time" class="font-mono text-emerald-400">00:00</span></div>
        <div><span class="text-slate-400">Foragers:</span> <span id="forager-count" class="font-mono text-emerald-400">2</span></div>
      </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
      
      <!-- Game Map -->
      <div class="xl:col-span-5">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-4 overflow-hidden">
          <div id="world"></div>
        </div>
        <div class="mt-2 text-xs text-slate-500 px-1 flex justify-between">
          <div><span class="text-emerald-400">●</span> Foragers</div>
          <div><span class="text-red-400">●</span> Predator</div>
        </div>
      </div>

      <!-- Brains -->
      <div class="xl:col-span-7">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          
          <!-- Forager 1 -->
          <div class="bg-slate-900 border border-emerald-800 rounded-3xl p-4">
            <div class="flex justify-between items-center mb-2">
              <div>
                <span id="forager1-name" class="font-semibold text-emerald-400">Kael-9</span>
                <span id="forager1-gen" class="text-xs text-slate-400 ml-1.5">Gen 1</span>
              </div>
              <span class="text-xs text-emerald-400">Energy: <span id="energy-forager1">70</span></span>
            </div>
            <div id="net-forager1" class="min-h-[210px]"></div>
          </div>

          <!-- Forager 2 -->
          <div class="bg-slate-900 border border-emerald-800 rounded-3xl p-4">
            <div class="flex justify-between items-center mb-2">
              <div>
                <span id="forager2-name" class="font-semibold text-emerald-400">Vexara</span>
                <span id="forager2-gen" class="text-xs text-slate-400 ml-1.5">Gen 1</span>
              </div>
              <span class="text-xs text-emerald-400">Energy: <span id="energy-forager2">70</span></span>
            </div>
            <div id="net-forager2" class="min-h-[210px]"></div>
          </div>

          <!-- Predator -->
          <div class="bg-slate-900 border border-red-800 rounded-3xl p-4">
            <div class="flex justify-between items-center mb-2">
              <div>
                <span class="font-semibold text-red-400">PREDATOR</span>
                <span class="text-xs text-slate-400 ml-1.5">Hunter</span>
              </div>
              <span class="text-xs text-red-400">Energy: <span id="energy-predator">70</span></span>
            </div>
            <div id="net-predator" class="min-h-[210px]"></div>
          </div>

          <!-- Legend -->
          <div class="bg-slate-900 border border-slate-700 rounded-3xl p-4 text-sm">
            <div class="font-semibold mb-3">Legend &amp; Lineage</div>
            <div class="text-xs text-slate-400 space-y-1.5">
              <div><span class="text-emerald-400">●</span> Forager — Evolves survival traits</div>
              <div><span class="text-red-400">●</span> Predator — Targets weakest target</div>
              <div class="pt-1">Use the <strong>Audio Panel</strong> to shape the sounds.</div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script>
    // ==================== AUDIO ====================
    let audioCtx;
    let neuralSoundEnabled = true;
    let masterVolume = 0.03;

    let audioSettings = {
      sensitivity: 0.45,
      inputWave: 'sine',
      hiddenWave: 'triangle',
      outputWave: 'sine',
      filterCutoff: 1400,
      harmonicRichness: 0.08
    };

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function updateVolume(val) {
      masterVolume = parseFloat(val) / 100;
      document.getElementById('volume-value').innerText = val;
    }

    function toggleMute() {
      neuralSoundEnabled = !neuralSoundEnabled;
      const icon = document.getElementById('mute-icon');
      const text = document.getElementById('mute-text');
      if (neuralSoundEnabled) {
        icon.classList.replace('fa-volume-mute', 'fa-volume-up');
        text.innerText = 'Sound On';
      } else {
        icon.classList.replace('fa-volume-up', 'fa-volume-mute');
        text.innerText = 'Muted';
      }
    }

    function playEatSound() {
      if (!audioCtx || !neuralSoundEnabled || masterVolume < 0.005) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = 920;
      g.gain.value = 0.12 * masterVolume;
      o.connect(g);
      g.connect(audioCtx.destination);
      o.start();
      g.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + 0.16);
      setTimeout(() => { try { o.stop(); } catch(e){} }, 200);
    }

    function playDeathSound() {
      if (!audioCtx || !neuralSoundEnabled || masterVolume < 0.005) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      o.type = 'sawtooth';
      o.frequency.value = 180;
      filter.type = 'lowpass';
      filter.frequency.value = 650;
      g.gain.value = 0.2 * masterVolume;
      o.connect(filter);
      filter.connect(g);
      g.connect(audioCtx.destination);
      o.start();
      o.frequency.linearRampToValueAtTime(55, audioCtx.currentTime + 0.65);
      g.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + 0.7);
      setTimeout(() => { try { o.stop(); } catch(e){} }, 750);
    }

    function playBirthSound() {
      if (!audioCtx || !neuralSoundEnabled || masterVolume < 0.005) return;
      [720, 960, 1200].forEach((freq, i) => {
        setTimeout(() => {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.type = 'sine';
          o.frequency.value = freq;
          g.gain.value = 0.09 * masterVolume;
          o.connect(g);
          g.connect(audioCtx.destination);
          o.start();
          g.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + 0.38);
          setTimeout(() => { try { o.stop(); } catch(e){} }, 420);
        }, i * 55);
      });
    }

    function playNeuralTone(baseFreq, intensity, layer = 'input') {
      if (!audioCtx || !neuralSoundEnabled || masterVolume < 0.005) return;
      const vol = Math.max(0.01, Math.min(0.18, intensity * masterVolume * 0.7));
      const duration = 0.26 + intensity * 0.09;

      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      let wave = audioSettings.inputWave;
      if (layer === 'hidden') wave = audioSettings.hiddenWave;
      if (layer === 'output') wave = audioSettings.outputWave;

      o.type = wave;
      filter.type = 'lowpass';
      filter.frequency.value = audioSettings.filterCutoff;
      o.frequency.value = baseFreq;

      if (audioSettings.harmonicRichness > 0) {
        o.detune.value = (Math.random() - 0.5) * audioSettings.harmonicRichness * 35;
      }

      g.gain.value = vol;
      o.connect(filter);
      filter.connect(g);
      g.connect(audioCtx.destination);
      o.start();
      g.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      setTimeout(() => { try { o.stop(); } catch(e){} }, duration * 1000 + 20);
    }

    // ==================== MASTER AUDIO PANEL ====================
    function showAudioPanel() {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-[100]';
      modal.innerHTML = `
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8 w-full max-w-md mx-4">
          <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-semibold">Master Audio Panel</h3>
            <button onclick="this.closest('.fixed').remove()" class="text-2xl">×</button>
          </div>

          <div class="space-y-6 text-sm">
            <div>
              <label class="block text-slate-400 mb-1">Trigger Sensitivity</label>
              <input type="range" id="sens" min="0.2" max="0.8" step="0.05" value="${audioSettings.sensitivity}" class="w-full accent-violet-500">
            </div>

            <div class="grid grid-cols-3 gap-4">
              <div>
                <label class="text-xs text-slate-400">Inputs</label>
                <select id="wave-input" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-2">
                  <option value="sine">Sine</option>
                  <option value="triangle">Triangle</option>
                  <option value="sawtooth">Sawtooth</option>
                </select>
              </div>
              <div>
                <label class="text-xs text-slate-400">Hidden</label>
                <select id="wave-hidden" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-2">
                  <option value="sine">Sine</option>
                  <option value="triangle">Triangle</option>
                  <option value="sawtooth">Sawtooth</option>
                </select>
              </div>
              <div>
                <label class="text-xs text-slate-400">Outputs</label>
                <select id="wave-output" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-2">
                  <option value="sine">Sine</option>
                  <option value="triangle">Triangle</option>
                  <option value="sawtooth">Sawtooth</option>
                </select>
              </div>
            </div>

            <div>
              <label class="block text-slate-400 mb-1">Filter Cutoff</label>
              <input type="range" id="filter" min="400" max="2800" step="50" value="${audioSettings.filterCutoff}" class="w-full accent-violet-500">
            </div>

            <div>
              <label class="block text-slate-400 mb-1">Harmonic Richness</label>
              <input type="range" id="richness" min="0" max="0.25" step="0.01" value="${audioSettings.harmonicRichness}" class="w-full accent-violet-500">
            </div>

            <div class="flex gap-3 pt-2">
              <button onclick="applyAudioSettings(this)" class="flex-1 py-3 bg-violet-600 hover:bg-violet-500 rounded-2xl font-medium">Apply</button>
              <button onclick="applyAudioPreset('soothing', this)" class="flex-1 py-3 bg-emerald-600/20 hover:bg-emerald-600/30 text-emerald-400 rounded-2xl font-medium">Soothing</button>
              <button onclick="applyAudioPreset('bright', this)" class="flex-1 py-3 bg-sky-600/20 hover:bg-sky-600/30 text-sky-400 rounded-2xl font-medium">Bright</button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(modal);

      setTimeout(() => {
        document.getElementById('sens').value = audioSettings.sensitivity;
        document.getElementById('wave-input').value = audioSettings.inputWave;
        document.getElementById('wave-hidden').value = audioSettings.hiddenWave;
        document.getElementById('wave-output').value = audioSettings.outputWave;
        document.getElementById('filter').value = audioSettings.filterCutoff;
        document.getElementById('richness').value = audioSettings.harmonicRichness;
      }, 30);
    }

    function applyAudioSettings(btn) {
      const modal = btn.closest('.fixed');
      audioSettings.sensitivity = parseFloat(document.getElementById('sens').value);
      audioSettings.inputWave = document.getElementById('wave-input').value;
      audioSettings.hiddenWave = document.getElementById('wave-hidden').value;
      audioSettings.outputWave = document.getElementById('wave-output').value;
      audioSettings.filterCutoff = parseFloat(document.getElementById('filter').value);
      audioSettings.harmonicRichness = parseFloat(document.getElementById('richness').value);
      modal.remove();
    }

    function applyAudioPreset(preset, btn) {
      const modal = btn.closest('.fixed');
      if (preset === 'soothing') {
        audioSettings.sensitivity = 0.5;
        audioSettings.inputWave = 'sine';
        audioSettings.hiddenWave = 'triangle';
        audioSettings.outputWave = 'sine';
        audioSettings.filterCutoff = 1100;
        audioSettings.harmonicRichness = 0.03;
      } else if (preset === 'bright') {
        audioSettings.sensitivity = 0.38;
        audioSettings.inputWave = 'triangle';
        audioSettings.hiddenWave = 'sine';
        audioSettings.outputWave = 'triangle';
        audioSettings.filterCutoff = 1800;
        audioSettings.harmonicRichness = 0.12;
      }
      modal.remove();
    }

    // ==================== GAME ====================
    let foragers = [];
    let predator;
    let foods = [];
    let startTime = Date.now();
    let lastKillTime = 0;
    const KILL_COOLDOWN = 3000;

    function setup() {
      initAudio();
      const c = createCanvas(680, 480);
      c.parent('world');

      foragers = [
        new Creature(width * 0.3, height * 0.4, 'forager'),
        new Creature(width * 0.7, height * 0.6, 'forager')
      ];
      predator = new Creature(width * 0.5, height * 0.5, 'predator');
      for (let i = 0; i < 10; i++) foods.push(new Food(random(40, width-40), random(40, height-40)));
      startTime = Date.now();

      // Force initial render of neural nets
      setTimeout(() => {
        try {
          if (foragers.length > 0) drawDetailedNet('net-forager1', foragers[0], true);
          if (foragers.length > 1) drawDetailedNet('net-forager2', foragers[1], true);
          drawDetailedNet('net-predator', predator, false);
        } catch(e) {}
      }, 80);
    }

    function draw() {
      background(15, 23, 42);
      stroke(30, 41, 59);
      for (let x = 0; x < width; x += 40) line(x, 0, x, height);
      for (let y = 0; y < height; y += 40) line(0, y, width, height);
      for (let f of foods) f.show();

      for (let i = foragers.length - 1; i >= 0; i--) {
        const f = foragers[i];
        f.update(predator);
        f.show();

        if (dist(f.x, f.y, predator.x, predator.y) < 17 && Date.now() - lastKillTime > KILL_COOLDOWN) {
          lastKillTime = Date.now();
          playDeathSound();
          const deathX = f.x, deathY = f.y;
          foragers.splice(i, 1);
          if (foragers.length < 5) {
            foragers.push(new Creature(deathX + random(-18,18), deathY + random(-18,18), 'forager', f));
            foragers.push(new Creature(deathX + random(-18,18), deathY + random(-18,18), 'forager', f));
            playBirthSound();
          }
          break;
        }
      }

      if (foragers.length > 0 && Date.now() - lastKillTime > KILL_COOLDOWN) {
        let best = null, bestScore = -Infinity;
        for (let f of foragers) {
          const d = dist(f.x, f.y, predator.x, predator.y);
          const score = (100 - f.energy) * 0.5 + (450 - d) * 0.5;
          if (score > bestScore) { bestScore = score; best = f; }
        }
        if (best) {
          const dx = best.x - predator.x;
          const dy = best.y - predator.y;
          predator.angle = atan2(dy, dx);
        }
      }

      predator.x += cos(predator.angle) * 2.0;
      predator.y += sin(predator.angle) * 2.0;
      predator.x = constrain(predator.x, 25, width-25);
      predator.y = constrain(predator.y, 25, height-25);
      predator.show();

      updateUI();

      // Render neural nets safely
      try {
        if (foragers.length > 0) drawDetailedNet('net-forager1', foragers[0], true);
        if (foragers.length > 1) drawDetailedNet('net-forager2', foragers[1], true);
        drawDetailedNet('net-predator', predator, false);
      } catch(e) {}
    }

    function updateUI() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const min = String(Math.floor(elapsed / 60)).padStart(2,'0');
      const sec = String(elapsed % 60).padStart(2,'0');
      document.getElementById('running-time').innerText = `${min}:${sec}`;
      document.getElementById('forager-count').innerText = foragers.length;

      if (foragers.length > 0) {
        document.getElementById('forager1-name').innerText = foragers[0].name;
        document.getElementById('forager1-gen').innerText = `Gen ${foragers[0].generation}`;
        document.getElementById('energy-forager1').innerText = Math.floor(foragers[0].energy);
      }
      if (foragers.length > 1) {
        document.getElementById('forager2-name').innerText = foragers[1].name;
        document.getElementById('forager2-gen').innerText = `Gen ${foragers[1].generation}`;
        document.getElementById('energy-forager2').innerText = Math.floor(foragers[1].energy);
      }
      document.getElementById('energy-predator').innerText = Math.floor(predator.energy);
    }

    class Creature {
      constructor(x, y, type, parent = null) {
        this.x = x; this.y = y;
        this.angle = random(TWO_PI);
        this.energy = 70;
        this.type = type;
        this.memory = 0;
        this.size = type === 'predator' ? 15 : 12;

        if (parent && type === 'forager') {
          this.name = generateSciFiName();
          this.generation = parent.generation + 1;
          this.foodWeight = parent.foodWeight * (1 + random(-0.12, 0.12));
          this.dangerWeight = parent.dangerWeight * (1 + random(-0.12, 0.12));
          this.memoryInfluence = parent.memoryInfluence * (1 + random(-0.1, 0.1));
          this.exploreBias = parent.exploreBias * (1 + random(-0.1, 0.1));
        } else if (type === 'forager') {
          this.name = generateSciFiName();
          this.generation = 1;
          this.foodWeight = 1.0;
          this.dangerWeight = 1.2;
          this.memoryInfluence = 0.8;
          this.exploreBias = 0.6;
        } else {
          this.name = "Hunter";
          this.generation = 0;
        }

        this.lastInputs = [0,0,0,0,0,0];
        this.lastHidden = new Array(6).fill(0.5);
        this.lastOutputs = [0,0,0,0,0,0];
      }

      update(other) {
        if (this.type === 'predator') return;

        let nf = null, fd = Infinity;
        for (let f of foods) {
          let d = dist(this.x, this.y, f.x, f.y);
          if (d < fd) { fd = d; nf = f; }
        }

        let dx = other.x - this.x, dy = other.y - this.y;
        let distOther = dist(this.x, this.y, other.x, other.y);
        let fa = 0, fdist = 1;
        if (nf) {
          let fax = atan2(nf.y - this.y, nf.x - this.x);
          let fad = fax - this.angle; while (fad > PI) fad -= TWO_PI; while (fad < -PI) fad += TWO_PI;
          fa = fad / PI; fdist = constrain(fd / 380, 0, 1);
        }

        let inputs = [fa, fdist, constrain(distOther / 280, 0, 1), this.energy / 100, this.memory, -0.3];
        this.memory = this.memory * 0.78 + (fa * 0.25) + (inputs[2] * -0.55);

        let hidden = new Array(6).fill(0);
        for (let i = 0; i < 6; i++) {
          let a = 0;
          if (i % 2 === 0) a += inputs[0] * this.foodWeight + inputs[3] * 0.4;
          else a += inputs[2] * this.dangerWeight + inputs[5] * 0.5;
          a += inputs[4] * this.memoryInfluence;
          hidden[i] = constrain(a + random(-0.05, 0.05), 0, 1);
        }

        let avgH = hidden.reduce((s, v) => s + v, 0) / 6;

        this.turn = inputs[0] * this.foodWeight * 0.5 + avgH * 0.3 + this.memory * this.memoryInfluence * 0.3;
        this.speed = 0.8 + inputs[3] * 0.2 - inputs[2] * this.dangerWeight * 0.7;

        this.angle += this.turn * 0.12;
        this.x += cos(this.angle) * this.speed;
        this.y += sin(this.angle) * this.speed;

        const margin = 28;
        if (this.x < margin || this.x > width - margin) { this.angle = PI - this.angle + random(-0.2, 0.2); this.x = constrain(this.x, margin, width - margin); }
        if (this.y < margin || this.y > height - margin) { this.angle = -this.angle + random(-0.2, 0.2); this.y = constrain(this.y, margin, height - margin); }

        this.energy -= 0.028;

        if (nf && fd < 15) {
          this.energy = min(100, this.energy + 20);
          nf.respawn();
          playEatSound();
        }

        this.lastInputs = inputs;
        this.lastHidden = hidden;
        this.lastOutputs = [this.turn, this.speed, this.attack || 0, this.flee || 0, this.explore || 0, this.conserve || 0];
      }

      show() {
        push();
        translate(this.x, this.y);
        rotate(this.angle);
        if (this.type === 'predator') fill(248, 113, 113);
        else fill(167, 139, 250);
        triangle(-this.size, -this.size*0.55, -this.size, this.size*0.55, this.size*0.9, 0);
        fill(255); circle(4, 0, 4.5);
        pop();
      }
    }

    class Food {
      constructor(x, y) { this.x = x; this.y = y; }
      show() { fill(52, 211, 153, 210); noStroke(); circle(this.x, this.y, 8); }
      respawn() { this.x = random(40, width-40); this.y = random(40, height-40); }
    }

    function resetSim() {
      foragers = [new Creature(width * 0.3, height * 0.4, 'forager'), new Creature(width * 0.7, height * 0.6, 'forager')];
      predator = new Creature(width * 0.5, height * 0.5, 'predator');
      foods = []; for (let i = 0; i < 10; i++) foods.push(new Food(random(40, width-40), random(40, height-40)));
      startTime = Date.now();
      lastKillTime = 0;
    }

    function drawDetailedNet(containerId, creature, isForager) {
      const container = document.getElementById(containerId);
      if (!container || !creature) return;

      // Clear previous content
      container.innerHTML = '';

      try {
        const accent = isForager ? '#34d399' : '#f87171';
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('width', '100%');
        svg.setAttribute('height', '210');
        svg.setAttribute('viewBox', '0 0 420 210');

        const ix = 78, hx = 210, ox = 342;
        const iy = [38, 72, 106, 140, 174, 208];
        const hy = [38, 72, 106, 140, 174, 208];
        const oy = [38, 72, 106, 140, 174, 208];

        const inputs = creature.lastInputs || [0,0,0,0,0,0];
        const hiddens = creature.lastHidden || new Array(6).fill(0.5);
        const outputs = creature.lastOutputs || [0,0,0,0,0,0];

        function activationFill(act) {
          const t = Math.max(0.15, Math.min(1, act || 0));
          if (isForager) return `rgb(${Math.floor(16 + t*120)}, ${Math.floor(185 + t*50)}, ${Math.floor(129 + t*40)})`;
          else return `rgb(${Math.floor(239 + t*20)}, ${Math.floor(68 + t*80)}, ${Math.floor(68 + t*30)})`;
        }

        // Headers
        const headers = [{x:ix,label:'Inputs'},{x:hx,label:'Hidden'},{x:ox,label:'Outputs'}];
        headers.forEach(h => {
          const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          t.setAttribute('x', h.x); t.setAttribute('y', 16);
          t.setAttribute('fill', '#64748b'); t.setAttribute('font-size', '9'); t.setAttribute('text-anchor', 'middle');
          t.textContent = h.label;
          svg.appendChild(t);
        });

        // Connections
        for (let i = 0; i < 6; i++) {
          for (let j = 0; j < 6; j++) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', ix); line.setAttribute('y1', iy[i]);
            line.setAttribute('x2', hx); line.setAttribute('y2', hy[j]);
            const intensity = Math.max(0.1, (inputs[i]||0)*0.55 + (hiddens[j]||0)*0.45);
            line.setAttribute('stroke', '#475569');
            line.setAttribute('stroke-width', (0.55 + intensity * 2.3).toFixed(1));
            line.setAttribute('stroke-opacity', (0.28 + intensity * 0.55).toFixed(1));
            svg.appendChild(line);
          }
        }

        for (let j = 0; j < 6; j++) {
          for (let k = 0; k < 6; k++) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', hx); line.setAttribute('y1', hy[j]);
            line.setAttribute('x2', ox); line.setAttribute('y2', oy[k]);
            const intensity = Math.max(0.1, (hiddens[j]||0)*0.5 + (outputs[k]||0)*0.5);
            line.setAttribute('stroke', '#475569');
            line.setAttribute('stroke-width', (0.55 + intensity * 2.3).toFixed(1));
            line.setAttribute('stroke-opacity', (0.28 + intensity * 0.55).toFixed(1));
            svg.appendChild(line);
          }
        }

        // Neurons
        const inputLabels = ['F.∠','F.Dist','Danger','Energy','Mem','Bias'];
        for (let i = 0; i < 6; i++) {
          const act = inputs[i] || 0;
          const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          c.setAttribute('cx', ix); c.setAttribute('cy', iy[i]);
          c.setAttribute('r', (6.5 + act * 3).toFixed(1));
          c.setAttribute('fill', activationFill(act));
          c.setAttribute('stroke', accent); c.setAttribute('stroke-width', '2');
          svg.appendChild(c);

          const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          lbl.setAttribute('x', ix - 42); lbl.setAttribute('y', iy[i] + 3);
          lbl.setAttribute('fill', '#94a3b8'); lbl.setAttribute('font-size', '7');
          lbl.setAttribute('text-anchor', 'end');
          lbl.textContent = inputLabels[i];
          svg.appendChild(lbl);
        }

        for (let j = 0; j < 6; j++) {
          const act = hiddens[j] || 0;
          const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          c.setAttribute('cx', hx); c.setAttribute('cy', hy[j]);
          c.setAttribute('r', (5 + act * 2.2).toFixed(1));
          c.setAttribute('fill', activationFill(act));
          c.setAttribute('stroke', '#64748b'); c.setAttribute('stroke-width', '1.5');
          svg.appendChild(c);
        }

        const outputLabels = ['Turn','Speed','Attack','Flee','Expl','Cons'];
        for (let k = 0; k < 6; k++) {
          const act = outputs[k] || 0;
          const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          c.setAttribute('cx', ox); c.setAttribute('cy', oy[k]);
          c.setAttribute('r', (6.5 + act * 3).toFixed(1));
          c.setAttribute('fill', activationFill(act));
          c.setAttribute('stroke', accent); c.setAttribute('stroke-width', '2');
          svg.appendChild(c);

          const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          lbl.setAttribute('x', ox + 13); lbl.setAttribute('y', oy[k] + 3);
          lbl.setAttribute('fill', '#94a3b8'); lbl.setAttribute('font-size', '7');
          lbl.textContent = outputLabels[k];
          svg.appendChild(lbl);
        }

        container.appendChild(svg);
      } catch(e) {
        // Fail silently so it doesn't break the draw loop
        console.log('drawDetailedNet error (non-critical):', e);
      }
    }

    window.onload = function() {
      const slider = document.getElementById('volume-slider');
      if (slider) document.getElementById('volume-value').innerText = slider.value;
    };
  </script>
</body>
</html>
